北渚通詩社日落前村歸釣航門外别開花竹塢沙頭時見鷺鷗行君恩未報愁方劇莫向畫圖思故鄉泉州朱都憲挽詩名鑑學職起家曽聞譜牒出莆田徙去泉南世益綿梟食上林分教日烏啼柏樹立朝年溫公姓字人皆識道輔勳階世共傳千里平蕪寒日暮依依馬首認髙阡入九仙觀訪黃未軒讀丁郡守所寄詩次韻二首卷阿遙想鳳凰聲漢室何人識賈生四海治安心獨計百年得喪髮同輕滄波白鳥甘遺世緑樹黃鸝正滿城天子履元消息好知君未得謝浮名十年不聽禁鐘聲坐對南山野趣生有道也知當世重無官應覺此身輕石臺晚嘯雲歸樹仙觀夜吟月過城文物傳中勞去取幾人筆下可全名過洞庭湖得風寄李使君洞庭午前湖水平洞庭午後風浪生片帆出沒樹葉小一身恍惚鴻毛輕浮雲黯黯結新暝白日杲杲籠微晴故人飲我酒未醒回頭不見巴陵城過桃源有懷避秦諸君子知君原不是神仙避地偶尋山水偏世去只聞秦用法客來方識晉編年桑麻翳翳連平野村落依依帶暮煙種得桃花翻自悔春風勾引釣魚船辰州道中用提學沈仲律韻辰州道路比褒斜遊子行行無怨嗟山鳥盡情啼别樹野棠隨分吐幽花時平猶結防苗寨嵗晚誰收逃稅家聖主憂民方側席寬書早晚到桑麻賀守備夏都閫府第成新開帥府浪城東此日登臨賀客同六月涼颸來細細四􅐼香霧濕濛濛旌旗影裏貔貅靜金鼓聲中豺虎空欲為江陵成短賦疏材深愧少陵翁豫有事平冒通判髙君鑑推官楊君欽繼至因相與泛舟為樂百尺巖下停詩船溪聲帶雨寒濺濺攜壺過江覔村酤掃葉傍石烹溪鮮水雲浩蕩不成醉天地寥濶欲登仙毋怪當時柳州柳鈷潭袁碣留殘篇早春出郭呈祁石阡侵晨出郭喜聨鑣馬首人家入望遙雲暝孤城微見堞雪消春水欲平橋山田鳴雉麥猶短野箔初蠶桑未條經國有謀勞相度議將封事上清朝演武亭小酌和石阡韻二首百年懷抱此時開野酌山歌傍將臺村落無期留客醉管絃有意送春來雪消波影侵詩筆雲破山光落酒杯最喜四郊無戰壘共追周雅賦臺萊簫鼓聲中又此年客邊情况只依前梅癯竹瘦何曽俗水膩山柔還自妍一覺未成猶是夢萬緣若了亦成禪琵琶不識此何淚我欲停杯問樂天貴藩聘修實録府衛諸公皆出祖石阡有作次韻紛紛簮組滿江湄裊裊東風吹鬢絲春草緑波南浦路輕塵細雨渭城詩投荒萬里愁無伴傾蓋片時逢故知麗澤此行知有益子雲識字喜多竒晚宿清平衛和石阡午發重安寺韻十里長亭五里橋太平道路不知遙人家處處皆桑樹山隴重重盡麥苗巖雪逢春猶自結林霏過午未全消平生慣作江湖夢紙帳梅花又此宵次石阡韻寄興隆周方伯場屋疑名記昔年白頭相見兩茫然權知避處應為福官到休時却是仙林下看雲間倚杖樓頭過雪每開筵别來何處相思憶月在梅梢滿意縣平越曉發麾使林錦與祁石阡同鄉忽以酒殽至因相與盡歡石阡有作和韻時寓按察分司滿道風霜照此堂夜來偶爾寄行裝還家有夢應嫌短聽漏無眠却恨長人為故鄉情轉劇酒因好况手頻將風萍聚散原無據回首雲山又夕陽平越道上喜晴次韻天開羣物露洪纎春事應知日日添梅蕚柳梢爭著眼草芽菜甲盡抽尖酒中愁陳猶迎敵雪後寒圍未解嚴帝録鋪陳憐我拙三長何幸得君兼倒用前韻二首自從騎馬出莆陽倒指流光二載將華髮每驚人世短黃塵無奈客途長酒沽竹葉排新悶詩賦梅花添舊裝回首故鄉轉迢遞何時戲綵向髙堂客中幽興二人兼和盡新詩韻轉嚴山雪撲衣春後薄溪風吹面晚來尖帶圍舊眼頻頻换鬢腳新霜故故添何處人家堪買醉近橋楊柳緑纎纎貴州即事好山明媚映晴川貴省誰言聲教偏路逺輪蹄皆入貢時平民物不知邊華夷普照無雙日雨露覃敷共一天最喜南來諸逐客寒爐次第死灰然纂修薑進士麟以詩相慰問次韻奉答手和丹青愧未勻繆於清廟繪犧樽虞廷事業鳳來舞周室太平鷖在亹謨典篇章勞點竄春秋義例熟評論君材自極中朝選燈火相依幾夜分纂修竣事自貴藩東歸路逢京使次石阡韻問君何日出京畿馬上相逢話轉遲朝野喜聞多善政廟堂誤説有相知病軀只合淮陽卧散木何煩匠石推四海和平宗社固鹽梅不必問伊誰次石阡曉發新添韻山脊如鋩半插空西南道路此時通汲書王會今初見周禮職方舊不同目送孤雲天際白手遮初日馬頭紅宦情羈思相催促因笑浮生太遽匆東歸至清平陳憲副王都閫相與遣使迎勞用祁石阡韻奉謝堂陛多年形勢分臺臣閫帥兩殷勤舊時宰相不輕士今日將軍能好文馬首青山情戀戀路旁草木意欣欣來宵有夢落何處月照梅花疑見君歸至鎮逺次祁石阡答家人相慰藉韻一官飄泊共遐荒文事驅人偏自忙藜杖逺分天祿火梅詩旋入鎮陽裝形骸莫逆憐同道萍水相逢忘異鄉為語家人莫驚訝鬢毛原帶去時霜和祁石阡雪後感懷宦業何須更乞靈半齋燈火自熒熒浮蹤聚散鴻留爪瘦骨稜嶒鶴化形月下梅花輸爾白雨中山色為誰青幽懷萬斛難輸寫莫惜行囊買酒金荀麾使座上得報原謫鎮逺府通判髙君鑑量移青州府賦此為别玉樹丰姿初識韓别離頗覺此情難煙含山色孤城晚雨挾溪聲兩鬢寒黔郡詩篇收舊稿青州邸報有新歡臨行贈處無他説忠孝相期此肺肝除夕聞雷時在鎮逺嵗事闌珊氣候分雷聲忽向枕邊聞隔墻疑是鄰燒竹入耳驚為野聚蚊啓蟄不應先夏令警聾似欲破酋氛劉家父子多同異傳志災祥説正紛題卧羲軒郡中無事自開荒小作軒居接北廊天地清風來枕簟湖山白日卧羲皇意當適處功名薄心到虛時道義光彭澤有魂招不起憑誰接膝與商量諱日夢見先考音容如昨既覺不勝悲感而作湖海奔波三十春嵗逢諱日倍思親雲霄事業憐沉晦風雨詩書記苦辛腸斷獨揮千里淚恩深難報百年身半􅐼燈火齋房靜謦咳分明入夢新謁諸葛武侯廟萬樹鴉聲送夕曛孤祠寂寂倚江濆霸途獨識炎綱正國藝終成鼎足分伊傅襟懷明日月軒黃行陳結風雲相材將略寡儔侣一瓣心香特地焚偏橋分司與王少參讀陳簡齋詩感而有作簡齋居士詩中仙胸懷不著火與煙京洛數椽家已破湖湘萬里春無邊天髙地迥見孤鶴風清露冷開芳蓮前途泥淖不可往與子相逐蓬壺顛覺衰形神日日覺支離此事到頭吾自知鵩賦不須傷賈誼鈴歌試自學桓伊卦分離坎勞收拾藥煮參苓空護持渴飲飢餐惟待盡古云知命有何疑哭祁致和方伯乘雲何處去登仙老淚雙揮袖欲穿執紼謾懷千里外修書猶記十年前𢎞治己酉在貴藩會修憲宗實録中州孤鳳東夷識公奉使朝鮮朝鮮人敬慕之郢下陽春海內傳多少情懷談不盡憑誰傳報到黃泉天人感應吟人心才動老天知誰道天髙人可欺暗漏屋中神亦格髙明家裏鬼常窺是非有路終須審禍福無門只自祈點檢人間興廢事毫釐應付不差移五言絶句書東園屋壁志感太山拔不動流水激不回萬古青天在此心安可摧題畫龍虎蹤迹謝塵泥精神動寰宇我為蒼生憂呼爾作霖雨文采蔚斑斑爪牙利如琢白晝舞狐狸待爾出林壑簡齋太羮有餘味大樂無繁音茅齋坐白日冥契千古心成化丁未聞解郡作解郡復解郡解郡乃吾志談笑離别間行我心上事馭世既濶疏賦性復粗梗聖恩天地寬使我全首領母老兒亦老何幸得生全故鄉有敝廬菽水盡餘歡拂袖歸田園閉門謝卿相白雲有去來青山本無恙繼聞改郡重作青山城郭靜白日文書稀百拜謝君恩臣職此其宜廣成住崆洞庚桑居畏壘一鞭山色中吾道無成毁母恩不可割君命不敢辭舍母以就君白首成歔欷人生天地間俯仰無百年天風吹遊絲隨處成罣牽過嘉魚縣贈薑希廣大尹二首作縣憐今日讀書記昔年相逢江上雨十日為停船去矜師上蔡做信學乖崖德進業同進民心誰不懷讀惻隱書寄廣德過俊翔豫知廣德日嘗著戒殺女歌及定諸條約教讀過俊翔乃和此歌及添注腳名惻隱書薑尹為之梓行偶過嘉魚縣因觀惻隱書雲山千里外為此一停車題林仰止齋居青山原有約黃屋本無期獨坐雲生榻間吟月到池答魏竹溪多病厨中藥消間枕上書青山當老屋此興近何如入納溪二首兩岸青山合一溪春水深蘭橈須慢撥處處可娛心六堡風塵息千山草木深賈船隨處宿日夜不驚心好竒平生性好竒作字亦如之老去歸平淡時人應未知幽懷健犢常僨駕驚魚不上鈎幽懷落何處煙月滿滄洲俟軒二首為陳玉光賦萬數皆無著一心長自虛涼風吹短鬢看到有生初塞馬風塵暗海鷗煙浪深虛舟泛天地無用更勞心題石泉清隱六合紅塵滿幽人何處居飛泉迸石面清韻落郊墟題有竹軒半畝翠雲濕一簾蒼雨涼分明闤闠裏舉目見瀟湘題鎮逺何二守東巖四咏用林見素韻雞鳴桑樹深犬卧苔花濕何處課春耕獨倚斜陽立右南畝春耕長江春水滿瀰瀰緑如苔行人過江急江濶船不來右藍江晚渡石濕雲不起石晴雲亦逗對石間觀雲蒼翠落衫袖右古石堆雲江暖雪初作江寒雪漸飛一竿潭水上雪深猶未歸右寒江釣雪雜咏四首珠藏澤自媚玉藴山含輝憑君細調護至寶人間希抑奢以從儉去偽以返淳咀嚼六經髓呵為天下春海晏河清日風調雨順時大家惜元氣保此萬年基帝德乾坤大親恩江海深勉修忠與孝莫負此生心哭樞姪喪婦豫攜樞姪入蜀為娶婦不幸乳死夫弱子幼賦此以泄豫哀妻沒夫誰助母亡兒失依兩行生死淚都上老人衣桐川儒學雜詠有引成化辛卯豫承乏廣德州又明年癸巳乃遷學宫既為山亭池館以護形勝以補學制之所未及因擇其有關於化理者以定名稱而使來遊諸君子得以維持心身於不放之地文學椽賈君汝易乃取而歌咏之一時過從諸君子又從而和之裒輯成卷持以語豫曰學制新備此可以存故實矣執事宜有言豫思在昔諸公補郡縣日於政事之暇多有文章流落山水間心竊慕之因和汝易所歌咏者而并識其略他日由是學而出者必有識豫懷云覆土為此山欲以種芳樹山成樹轉多相呼掇芳去右萬桂山山在學宫正北髙四丈長一十三丈皆築土為之有峰如玉笋其勢髙插雲我欲招諸生引手排天閽右凌雲峰在萬桂山正中山頭日漸上山下日漸明遲爾五色鳥來為吾道鳴右朝陽嶺在萬桂山左臂揭衣登西嶺風葉寒颼颼極目望天際有鶚橫清秋右橫秋嶺在萬桂山右臂心清見肝膽水清見毛髮一私無所容聖功由是作右澄心池在山下退省軒前偏左形直影亦直形曲影亦曲曲直各有自吾當慎吾獨右顧影池在山下退省軒前偏右人世少知遇百年懷抱孤山亭坐虛敞邈與天為徒右天遊亭在凌雲峰下周禮久不作澤宫變荒圃開亭集賓佐觀者日盈堵右觀德亭在龍首峰下髙堂絃誦息呼童撤臯比開軒望北山靜以省吾私右退省軒在學宫後山房白日靜左右列圖書哲人久不作掩卷空欷歔右萬桂山房在橫秋嶺下有池大如斗瀰瀰北山下朝拾五色羽鳳凰浴初罷右浴鳳池在朝陽嶺下山坳最深處遊人慎莫入曉來雲氣腥中有神龍蟄右蟠龍窟在橫秋嶺下北山有危坡都植蘭與蕙平生性好修掇拾以為佩右蘭坡在山前少東開徑入松林松香滿冠屨行行細護持茯苓在深處右松徑在山前少西開園種修竹竹實生何遲玄雲閉白日鳳凰正苦飢右竹圃在萬桂山後山勢何糾紛龍頭突然起蛇蟲走其足竄伏莫敢視右龍首峰在萬桂山正東憶昔侍金鑾顧瞻龍尾道今日登髙岡倣佛夢中到右龍尾岡在萬桂山正西寧國道中書所見七首匹馬赴寧川靡靡行不止水色與山光一百二十里聽泉如聽琴看山如看畫佳趣滿眉睫應接都不暇樹罅天光漏山坳雲氣深遙遙聞犬吠人家無處尋野曠路縈紆山轉林斷續長歌者誰子隔溪聞伐木懸崖危欲墮急湍嚙其趾世路多險巇君子慎所履小民飾虛詐水燥而火濕呵之不肯起猶向馬前泣山人生計拙種桐滿山樾春來風雲多桐花開不結醉中題畫扇四首輕飇拂涼樹明月浸清波酒醉呼不醒萬物將吾何青山雲去後古樹鶴來初安得結茆屋閉門觀古書青山日未上緑樹雲猶濕溪回路轉深扁舟何處入山前去路賒江上片帆逺家鄉在何處一日腸九轉題松鶴軒階下蒼松立階前白鶴行軒中何所有終日此雙清松外見白鶴鶴外見青松小軒終日坐清氣落重重題畫山水四首開軒望長野迢迢芳草緑持竿彼何人冒雨驅黃犢雲影蒼樹涼雨候黃梅過明月入西軒照見幽人卧秋水池塘深落葉亭臺晚柴門閉西日山人猶未返風髙海水立雪厚山岡折小院無人來梅花自娟潔又四首萬里長江水春深可染衣天涯何處客遙逐北鴻歸青山夜對坐默默無一語天風動林薄明月生洲渚山髙白日下野濶孤帆遲故鄉在何處欲歸未有期天機常自契妙趣向誰説嵗晚無人來獨釣寒江月又四首青山見孤塔緑樹空茆亭畫師不解意欠我六尺藤山到江邊盡洲當水面橫鳴榔歸浦慢回首夕陽明天地鬢毛短鳬鷗心事間五湖風月好都上釣魚竿山雨洗蒼樹江風吹緑波小亭人不到詩思晚來多遊廣德東山寺三首地窄剛容寺山深不見人回頭望城郭無處不紅塵屋外山雲濕門前溪水寒禪心安未穩明月上蒲團山髙日易下地滑雪初消共説前途險溪深獨木橋題畫鶴夜露滴松梢秋聲退殘暑不知九霄夢凌風髙幾許海上風露寒羽毛半零落短日修疏翎去去翔寥廓黃巖謝孝子遺事七首奉母避亂為軍士所執以死衛母母死兒亦死母生兒亦生兵刀是何物門外自縱橫避亂母病無醫藥刲股以愈母疾持刀刲股肉股痛兒不知豈不戒毁傷母病兒若癡亂定奉母歸自昌國自製小竹兜舁母取母便適日行數里輒止翳翳白日靜遲遲青山行心兜試寬窄恐母坐不寧春日負母出嬉茆簷春日溫兒背穩如几問母欲何之行行過東里種蔬養母每本各置篐以防不潔種蔬屋東頭供母朝夕需母性最好潔兒蔬敢自汚往昌國取資夜夢母盛妝以為不祥遂棄歸取資東海上夢母為盛妝今日在路上明日在母旁葬母廬墓十年始歸親魂歸室廬親體托林巒如何謝孝子守墓久不還哭羅一峰五首天地不為小一身無所容荆榛是何物往返迷行蹤漆室發長嘯杞國懷深憂淚灑綱常疏十年未全收人心皆孔孟世道皆商周此意無人會西風吹古丘白日金牛洞青雲丹鳳樓思君不可見新月上簾鈎百年夢不起千古懷獨醒西湖煙雨外零落一峰青送孫常州仁入覲宦情長淡泊行槖轉蕭條獨有秋山色相隨逺入朝贈徐生二首開田種嘉禾禾根須著土君看丹青家爛漫竟何補得喪非無自操縱原有由明珠在方寸象罔難與求次丁鳳儀見懷六首坐君白石崖君號彈我秋雲根琴名幽興不可極欲説難為言靈芝固無種仙藥寧有根至寶在人心六經不盡言陰生為月窟陽生乃天根陰陽互相長天地寂無言草堂近翠微霧靄撲人衣乘興欲相見到門翻有違浮雲掩少微蒼狗變白衣世態正如此孰從將孰違寒林煙火微掩脛無全衣世非不我用我道與世違董子仁少參出中流砥柱圖求題狂瀾撼風雷砥柱屹不動根腳茍未固豈能排澒洞題海雲卷朝看海雲出暮看海雲歸而我亦海雲出入淡忘機題吳冬官淮南别意卷江館三年夢雲山萬里秋欲知相别意淮水向東流逸老堂為謝太守題鳴治先生之叔萬里江天迥冥鴻獨向東草堂寬幾許可以著清風題日出扶桑圖虞淵路最逺憑誰取紅日引手抉層雲清輝流八極題月沉西海圖碧海最西處懸知物象幽魚龍見明月應作白日遊題伊秋官三秋岐路話别卷世路苦多岐問君欲何往吳鈎三尺長光射斗牛上題孫氏映雪軒銀燈照華屋寶鼎薰金埒念此苦心人獨映寒窗雪題孫孟獻𢎞毅齋萬里程途逺一肩負荷難藕溪溪上路風雪見蒼顔金溪車節推挽詩氣結芝蘭馥胸蟠錦繡紋大廷吐不盡散作冶溪雲挽吳下王處士二首車馬閶門路生前多故知青山映疏雨有客為書碑里巷誦遺德縉紳思舊遊太湖春水濶不復見歸舟七言絶句題歸隱圖青山緑樹舊時家宦况何如隱趣賒料想西湖明月下夢魂先已到梅花紙帳紗厨罩暑籠香霧錦幔圍寒擁綵霞曾似道人養清素白雲洞裏夢梅花與同年熊騰霄分舟之任臨别賦此賦分不嫌蟲臂小居官曽笑繭絲非六經自有安民術莫向勞門苦著機喜姻友林貴實侍御得告霄漢冥冥見羽毛秋飇涼月送詩豪長安回首渺何許一任雲臺萬丈髙夜宿東坡寺與李天瑞論學興國寺中談道日鵝湖山下論心時百年公案今宵合接得乾坤真化機為葉左參題寫騷亭藝苑開荒歲月勞幽蘭香芷雜江臯白頭心事無人識風雨滿庭自寫騷酬同年談君憲章惠筆吳筒細剪南山竹韓頴精收東郭㕙多謝故人有佳貺興來揮斷楚江雲送羅應魁內弟歸永豐客館西風布被單百年心事惠夷間也知內弟能相信萬里輕舟自去還送謝元吉御史赴南陵丞二首風雪飄搖滿帝城老鴉臺上噤無聲南陵草色春長滿匹馬徐行好問耕楊子江中白鷺洲淡煙疏雨布帆秋到時為問賦詩者南逐年來共幾舟送賀克恭黃門得告歸遼左二首故國溪山病裏還半生心事語人難牀頭舊有匡時疏不許旁人來借看牢作根基築室廬此中真樂世應無間來舉目平鋪看雲滿青山水滿湖贈羅明仲內翰二首流水奔馳出亂山千條萬𣲖落人間箇中些子纎洄處我欲煩君盡日看湖海茫茫一葉舟四時風浪拍天浮煩君牢守梢頭舵滿載行人入坦流送丁克明歸常州省親萬里雲山秋獨歸為憐堂上旨甘違天涯亦有思親者相送不堪淚滿衣題劉先主三顧草廬圖吳魏有兵窺社稷荆襄無地著英雄將軍識得人中傑自把旌旄起卧龍題山水圖茆廬三五野人家路入青松更轉斜城市收書歸去晚山風吹落一庭花挽陳菊菴生平原不愛繁華滿院西風種菊花今日江州想遺德白衣送酒入誰家哭陳生煌絳帳曽施種德門兩階玉樹吐清芬重來不見凌霄幹淚濕青山幾片雲題梅月圖孤山處士舊時家門巷深深一徑斜惆悵詩魂呼不醒只留明月照梅花客中逢燕江上曽逢燕子飛淚痕三濕逺遊衣小樓此日重看燕人在客中猶未歸題友人張汝弼天趣軒石鼎初分陽羡茶翠盤又試邵平瓜當時頗笑淵明俗都把俸錢付酒家神樂觀張道士號體圓軒乞詩金爐火暖養丹砂滿院靈光含紫霞野鶴不鳴春晝永玉笙吹落碧桃花送丘大尹知黟縣二首匹馬南行去路賒青山迤邐到官家地圖試問寬多少剩種桑麻莫種茶黟中風俗近如何雀角鼠牙知不多君到山城無别事棠隂滿地聽絃歌寄東陽二教黃亨仲二首燈火窮經二十年一官嬴得守青氊近聞浙水推師席盡道東陽有鄭虔客窗風雨夜蕭蕭曽剔銀缸共寂寥别後逢君何處所夢魂時落浙江潮送友人丘時雍遼東省親緑酒紅亭正夕暉問君東去幾時歸路過山海秋風早莫待馬頭黃葉飛題亡弟敬叔畫菊一花一葉盡天機趣到無言識漸稀遼鶴不歸霄漢逺只留秋色照巖扉威州分司夢還家覺而賦此時𢎞治甲寅歲二月初五夜亭上青燈照雨寒亭中孤客鬢毛斑髙堂歲晚無消息萬里關山一夜還題陳摶大睡圖蟻鬬狼爭滿世間傳聞牛耳屬齊桓洞門深鎖華山月黃屋不如茆屋安題圯上授書圖天地機藏一束書幾回欲授又躊躇漢家四百年天下都在雞聲未唱初山齋為鄭民部嶽賦樓閣空中避打乖文辭場裏恥為俳山人自有山人學翠竹蒼梧深著齋贈方松崖擢湖南憲副正氣驅人呼不回兩年看遍故山梅洞庭春水連天碧又見危檣破浪來送黃伯望知肇慶府幾度傷心憶嶺南民刳兵燹喪田蠶黃堂此去看經濟千里春回雨露酣贈陳石峰入京謁選名琳先以提學御史言事左遷雪霰初消道路平馬頭紅日照行旌丹山毛羽非凡鳥擬作朝陽第一鳴贈陳惇賢黃門應詔北上煙霞自分卧方壺詔使忽從門外呼五色石花烹煉慣補天應不費枝梧贈郡推鄭公宣改亷州經歷自將綱鐵鑄吳鈎一道風霜凍不流日暮滿天風雨惡不知何處是亷州挽程孝亷二首洪武初樂平程閲以孝亷舉為絳州儒學訓𨗳其父為平陽府學教授以撰表得罪當死閲棄官求代詔並戮之旋奉旨釋縛則已殊矣其孫會元楷乞詩為賦此戴此頭顱贖父刑誰知不得比緹縈斷魂化作雙飛鳥飛薄青霄日月明霄漢雲深雨腳纎難將隻手引龍髯西風吹斷萊衣夢空使人間哭孝亷翠渠摘稿卷七
