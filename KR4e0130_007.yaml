body:
  text: 翠渠摘稿卷七明周瑛撰五言律詩題湛菴為戴陳州作此菴有佳士物我兩相忘人世紅爐熱渠心秋水涼綺羅無㺯著藜藿有餘香晚路行猶逺煩君更自防訪仙遊鄭東園和翰林諸公留别韻賜告下蓬萊山居亦樂哉開窗邀翠巘掃石護蒼苔冗泛謝塵事清夷飬道胎學充還出去鸞閣正需才邵武道中夜宿半山鋪邵武城頭路行行重苦辛髙山雙倦足空館一愁人涼月照華髮西風吹敝巾長安一萬里何處問通津清明節寄諸弟疏雨清明節客中思不禁荒山一抔土孝子百年心竟嵗身南北終天悲古今薦蘩託諸弟揮涕滿衣襟題慈節卷為蕭給事璿賦內則讀遺篇持循自昔年從夫念一醮教子學三遷絡緯秋燈館叉鈿曉爨煙平生慈與節太史費摩編送友人丘安重知瑞安縣論交三十載此日歎分離海濶飛鳬迥雲深過鴈遲近民宜直易作事貴操持莫以纎毫纍翻為負所知和陳公甫神樂觀夜坐韻蟲聲秋院靜木榻自來憑細數千年事間挑五夜燈子房真學道王旦謾為僧湖水渺無際寒魚不受罾題謝侍御乃兄石溜鳴琴圖幽人結屋處石溜響潺潺桐木不須削梅花能自彈鶴鳴山月小魚躍水天寒安得脫塵屣從君坐夜闌到廣德作東園書室東園有餘地可以作書齋千古聖賢學百年經濟懷庭松雲外鶴池草雨中蛙五色石堪煉吾將師女媧西壇即事夜半壇頭路露華寒襲衣樹深燈影亂野曠珮聲稀精意無人會豐年祗自祈周家聲教逺幽雅更重吹白雲寺午炊樓閣四簷合松蘿一徑分微風傳夕磬疏雨引朝薰人世幾滄海青山自白雲午炊猶未熟騶從復紛紛南湖夜發時往見巡按御史白疑獄扁舟發初夜渺渺入平湖水滿天上下雲深山有無琴聲人共逺燈影客同孤借問柏臺樹春鳴何處烏世美堂為戴提學侍御作世美堂前事人間能幾何一門三執法二世十登科袍笏牀頭滿勳名宇內多曉來看山色佳氣正峩峩自題畫像對此丹青筆今吾始識吾秋江片石瘦冬嶺一松孤不是廟堂器真成草澤癯行當返初服歸以讀吾書山亭晚坐獨坐山亭晚蕭然一徑開雨聲驚醉夢山色護詩胎愛靜應逃俗養髙成廢材城闉才咫尺未許世人來自警告諸僚友腳下程途逺鏡中毛髮絲治狂須止酒醫瘦莫吟詩勿謂性多僻須知聖可師忍將錦繡段白日棄泥淄書滿南歸同年屠元勳邀李西涯諸公十有二人餞别分韻賦詩豫得魚字湖海多年别衣冠此夜俱可因同緑醑更復唱驪駒去路青山外層城白雪初他時相慰問萬里只雙魚夜渡淮河望西湖嘴作孤舟發深夜歸路屬殘秋野曠星辰近江空霜月浮得風帆力徑順水櫓聲柔遙望西湖嘴青燈映小樓夢中賦登金山寺髙閣逼霄漢客邊望眼開鴈將秋色去潮帶夕陽回天地雙蓬鬢興亡一酒杯此懷不可極倚檻獨徘徊過蘇州與丘時雍李應禎夜話今夕是何夕長歌朋盍簪參商照天角風雪滿山隂衣袂秋陰薄簾櫳燭影深情長嫌夜短一刻比千金姑孰道中采石孤帆落青山一騎歸朔風吹短鬢疏雨濕征衣野火漁歸市林鐘僧掩扉可憐江上鴈入夜更南飛夏日建平道中天時早晚異地氣夏秋同雨腳青山外雷聲白日中馬飢頻嚙勒人乏半扶笻薄暮到城郭月華生樹東冬夜和賈汝陽韻獨坐不成寐夜深天欲霜爐薰生細縷燈暈結寒光世事鬢毛短客懷更漏長引杯聊自酌非是為詩狂橫山與吳水部珵晚酌公餘幽興發並轡入林巒雲暝鳥將盡雨深僧未還簷花落鄭館野韭薦蘇盤水部原能賦令人屢解顔次韻酬蔣宗誼節推見寄二首蔣君年最少真是謫仙人才美應無敵詩成若有神玉堂曽借稿紫府賸留春虞網何時下東山有鳳麟别君未數載倐忽將衰人學未究天地行多慚鬼神徘徊海上夢寂寞江南春况聞左車子西狩踣祥麟橫山燕集二首小甕藏天地大杯揮古今宦情秋夢短世事海波深北枕淵明卧南耕梁父吟官卑多抑畏慚愧昔賢心一鞭寒日裏弔古復傷今鳥背秋陰薄馬頭山色深朱絃方斷絶白屋正呻吟安得范司理同攄經濟心與陳二守酌别下馬何村廟霜清木落時行人千里去故國一年期水色照衣袖山光落酒巵離懷難盡遣惆悵為題詩新嵗枕上作讀書三十載此日得為州世路行來險官居輕若浮名髙思自抑福淺戒深求天道有盈歇吾心當熟謀暮春山中風雪如臘春光憐欲盡氣候未全平屋霰激寒響簷風吹朔聲蠶登何處箔牛廢此時耕嵗計知無賴憑誰達聖明遊石溪寺二首細數頭陀路縈紆十八盤外疑無處入中覺有餘寬猛水擘山出奔雲拏石還誰能謝塵鞅來此共盤桓四面峰巒合有僧深處居舊廬甲乙在廢殿丙丁餘水色侵衣桁山光入鉢盂小詩吟未就斜日滿軒車入宣州落日滿宣州馬頭春事幽山佳多入郭潮漲欲平疇戛竹農驚鹿吹蘆僮牧牛澄江與疊嶂掩映謝公樓出郭騎馬出東郭茅簷遍拊循吏需寧復急民俗可曾淳簫鼓雲中社桑麻雨後村漢家循吏傳原不録劉昆歸舟至毗陵阻凍懷老母在官所作一上歸舟日便為見母期誰知咫尺地翻作逗遛悲冰合河流斷雪深山路危髙堂念遊子正是倚門時宣州夜坐閲公案有作二首少學屠龍技晚收劾鼠名深情數日辨弊牘幾番更自古雀無角方今蠅善鳴就中生死路不敢負神明鄒公述仁義申子説刑名俯仰人千古徘徊夜二更燈寒花不結􅐼破紙常鳴聽盡階前雨東方未肯明成化辛卯聞長樂縣平地涌成山阜天地人身體如何生贅疣昔年傳息壤今日見浮丘陰下何居上陽剛不制柔五行精義隱孰為獻宸旒過田家午炊午炊猶未熟坐向野人家為愛青山好都忘白日斜山糧收橡子野菜拾株花偶聽老農語因知桑與麻有所思目斷天涯路春深有所思亭臺花落後簾幕燕歸時洛浦煙初瞑巫山雲正癡夫君縱忘妾妾意比芳絲曝背和賈汝陽韻四海誰同曝半簷吾自分背溫如挾纊氣暖欲蒸雲瘦影傍梅見鼾聲隔竹聞愛君思有獻點竄列生文壬辰重見彗星有彗起東北光芒天際浮三年忽兩見十日未全收自是人心玩誰言天道幽魯婺不恤緯涕泗欲橫流懷季弟敬叔三嵗不見汝悲歡各一方書成仍契濶夢覺每淋浪舐犢懷偏惡鼓盆悲正長郊原風日滿怕上脊令岡過薌溪懷五宜翁就徵一應詔擇退五稱宜古道甘藏拙長謀曽出竒閩中新郡縣江上舊旌旗落日薌溪路令人有所思弔吳聘君富貴路方熾山林迹漸稀誰能甘白屋君獨謝黃扉學古難為用名髙易嫁非百年泉壤下全璞有光輝理陸象山祠堂祠堂無多地令人起歎吁鄭田侵蝕後祊邑質交餘白髮啼孫子青山式里閭公庭今得理契券有明書重到府第有感初鶴洲族兄握符臨汝豫嘗遊焉今豫復來而兄已下世矣俯仰疇昔重為凄然府第最深處重來感歎并臨川雙郡守閩海兩書生風雨情何限池塘夢不成坐觀循吏傳收拾此家聲過吳草廬墳停車官路左遙認草廬墳古木無繁蔭殘碑有斷紋大道近來隱微言今益紛九原不可作誰為啓昌聞雙流遺愛祠為孔都憲乃翁題郎官皆百里遺愛獨雙流畫壁丹青古芳祠花木稠田疇僑與殖禮樂偃曽修血灑麗牲石民心春復秋豫改郡聶雲章許時髦送至江滸夜宿豫舟賦此為别二君憐逺别為我此宵留風雨城南路波濤江上舟竒材慚賈馬絶技笑屠牛功業吾何有輕雲天際浮玉臺除夜閩路此時驛越王前日臺嵗從今夜盡人自故鄉來萬里程初試百年節自催東皇漏消息春意到庭梅次曹時中曉發雞關韻路同函谷險江比渭川雄月白雞聲早天寒木葉空客途方浩渺夷落少光融獨有朝宗念隨流日夜東往平冒觀府基呈祁石阡衛府夾江立分明是壯謀出竒相掎角據險扼襟喉官有藩籬固民無兵革憂國家修逺略敢為借前籌老姊自鎮海至小兜千里至相見喜還悲燈火憐今夕儀容異昔時家貧供億薄行苦鬼神知煮粥吾應會焚鬚不敢辭簡陳太守以代面語林下知心少使車歸頗遲未分半席語已是一年期臂痛難成拜頭風久廢詩回看府門路依舊隔天涯巡按賀御史言事待罪次韻四首䎒䎒鷹隼操藹藹鳳鸞儀去國八千里懷君十二時孤忠原自信直論不能移史傳多英傑應知有宿期柏府瞻風裁天家惜羽儀六經非駕説三代是今時闕失應思補災祥或可移夜來有封事默與鬼神期聖祖功勳大多方奠兩儀誰云全盛世乃是諱言時筆短謀猷逺坐孤更漏移臣非愛多事法祖以為期不學古賢哲謾修封禪儀但於匡主處便是致身時媧聖天曽補公愚山可移宸聰蒙省覽會見太平期竹澗書舍為林壻雲從侍御題愛子讀書處澗邊竹萬竿森森蒼玉立滴滴翠雲寒節苦風霜徑心虛宇宙寬靜中思往事今喜得平安七言律詩送何郎中宜赴浙江督糧參政福清縣人聖主龍飛重養民催科特遣老儒紳汲將兩浙通潮水散作全吳潤物春劉晏材髙勞用智陽城政拙可書仁吾閩文物舊來好重看聲光接古人送陳方伯亹致政歸漳浦字尚勉奧學古行角巾斜折舊烏紗南望鄉園趣轉賒白髮無人堪結社青山有地可為家石湖晚釣收殘雨野徑春行礙落花不識廟堂諸故老幾人清夢到煙霞送宋經歸蔚州經領鄉薦復從豫治經後同登進士手折蟾宫丹桂枝那曽滿假更從師青由藍造藍應讓冰自水生水不知去路西風飛葉早故山疏雨出關遲上林春到花如錦正是都門待子時送項主事澄還南京福清人從豫治經杯酒都門送獨歸不堪臨别思依依一霜薊北衣全薄八月淮南鴈正飛官列部曹無抑畏班聨鵷鷺有光輝丈夫樹立應須早毛髮鏡中容易稀喜翁冰崖擢方伯冰崖初以工侍左遷衡州府守轉官白璧含輝不染泥除書忽下大江西衡州事業南山近工部聲名北斗齊霄漢丹心回日月郊原赤子望雲霓懸知早晚推賢相又築長沙十里堤謁文丞相廟海上干戈百戰中孤舟夜夜泣英雄八千里外邉塵合三百年來宋厯終崖嶺被俘真倉卒燕山就義太從容西風吹雨過柴市獨向祠前撫翠松挽劉主事母太安人一片貞心鐵石堅淚痕揮盡縞衣穿傳觀列女幾千字身事良人三十年慈竹蕭疏南畝雨諼花零落北堂煙母看季世豪男子誰似深閨劉母賢送黃君仲昭左遷湘潭朝把封章叩帝家夕驅羸馬赴長沙江湖萬里孤臣逺燈火九重春意賒湘水無情休作賦賈生有廟可停車也知昭代多恩典試聽庭前半夜鴉送濮守乃姪歸省二首千里移舟下濮陽黃堂有叔鬢將霜竹林風月留人易椿府旨甘入夢長亭上鳥聲喧客席馬頭山色映詩囊料知宦邸無餘物帶得清風歸故鄉曽聞大阮久專城小阮讀書亦有聲作客三年依濮上還家幾日到昌平樓頭疏雨此時夢馬首青山到處情莫戀故鄉風景好雲霄萬里看飛鳴初到廣德州馬蹄六月到山州獨上桐川第一樓城外有山皆北向郡中無水不西流士風質朴猶存古民舍蕭條欲近秋多少濟時心上事夜來默與鬼神謀立春觀擡杠有作羣擡長杠逐春來紅緑參差照草萊巖岫上頭走車馬樹林深處見樓臺百家技巧重重作諸史幽竒色色裁莫道東風快人意東風容易耗民財久雨作成化乙未秋三月全無一日晴密雲疏雨滿山城公家正放輸糧榜民舍不聞打稻聲草色欲將官廨沒溪流直與野橋平壇祈廟禱渾間事恤政多端先薄征學書四十年來始學書墨華長自滿衫裾枯藤礌砢火焚後繡鐵稜層土蝕餘豪氣稍充成老健中心才放轉粗疏曹公去後朱公死千載何人尋後車廣德書滿留别僚友獨隨琴鶴下江東嵗月催人似轉蓬路出南陽慚説召馬辭渤海愧談龔數莖白髮宦情薄滿目青山歸興濃相别不堪重相語茆簷殘日有疲癃弔葉文莊先生名盛崑山人官終吏部左侍郎憶昔分符出牧時先生欲我置曹司本為枯朽溝中斷看作珊瑚海底枝半世行藏原自信百年心事荷相知生