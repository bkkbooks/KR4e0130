body:
  text: 翠渠摘稿卷三明周瑛撰記溫明堂記豫知廣德州既三月婦吳氏夜夢過于祠堂之下見先祖困翁在座婦瞻拜成禮翁問曰瑛何在曰在堂翁曰此二大字可付瑛此甚善婦展視之乃玉鏡字也夙興婦述以告豫豫曰此宗廟神靈有以告我矣夫玉欲吾溫也鏡欲吾明也使吾溫以接人明以處事兹固所謂甚善者乎婦曰子於溫明何如曰吾接人未嘗為悻悻容然嫉惡太甚見不善則怒怒則疾言遽色而不自知此有害於溫處事未嘗挾私心然每别白是非或參以已見時於民情物理容有未合此有害於明婦曰溫不足而人惡之明不足而人怨之惡且怨禍所集也子其愼之豫曰氣平則貌溫心虛則理明自今以往吾當養吾氣而使之平庶不害於溫廓吾心而使之虛庶不害於明不然是豫勇於悖祖訓而貪禍于州之人也因以溫明扁吾堂且記其事以自警考功司題署記成化甲午冬瑛奉州政入吏部以聽黜陟時考功長佐吏若楊君宗器陳君朝用閻君光甫邵君日昭皆舊識也初相見言不及私及考課畢乃進豫言曰衆於考功署共扁曰居敬窮理豫為嚮裏之學幸有以告我豫謝以不敏諸君固請豫曰吏部為六曹之統而考功乃吏部之要司也易稱否泰由於君子小人之進退蓋內君子外小人為泰外君子內小人為否考功定黜陟乃君子小人進退之門也惟居敬則心常惺惺始可以窮理惟窮理則君子小人决擇精審而不至於混淆昔有宋諸君不足以成三代之治而追議之者皆致憾於秉軸諸君子也然則考功署扁曰居敬窮理知所本哉諸君皆曰周君言是也請書于是以聽羣吏以禆庶政以佐于邦治而觀厥成功扁作於諸君入署之始記作於擬獻績入部之始王修撰墓記去廣德城西五里許王修撰墓在焉修撰故台州人姓王氏名叔英字原采仕建文朝為文字官素有氣節未幾文皇帝南巡原采募丁壯廣德後自經死死時嘗自為贊曰生既已矣未有補於當時死固徒然庶無慚於來世又賦詩曰人生穹壤間忠孝貴克全嗟豫事君父自省多過愆有志未及竟竒疾忽見纒肥甘空在案對之不能咽意者造化神有命歸九泉嘗念夷與齊餓死首陽巔周粟豈不佳所見良獨偏髙蹤邈難繼偶爾無足傳千秋史臣筆慎勿稱希賢尋有詔治姦黨其二女赴井死其妻繫獄死人為上其所賦詩上曰彼食其祿自盡其心耳乃置不問初原采將死以書抵祠山道士盛希年曰可葬我祠山之麓希年卒收葬之蓋原采同希年台州人故託以後事正統中少師楊公士竒始題其墓曰嗚呼故翰林修撰王公原采之墓又為文以祭之曰嗚呼先生之學聖賢是師先生之行綱常是持先生之心金石其貞先生之志霜雪其明浩浩歸全乘雲翩翩我懷先生崇山長川桐川之藏既固且深遙致觴奠神其來歆蓋原采嘗薦士奇建文朝事定故及此原采死無後墳墓鞠為丘莽所可識别者僅有楊公之碑而已瑛為進士時嘗聞其事於其鄉縉紳及官兹土乃以特羊祭於墓訪諸故老得其遺事為詳云原采入廣德未久車駕渡江羣臣出走原采募丁壯畨上遇兵部尚書齊泰來奔遂潰歸原采死時年未四十蓋其見義之明殺身之勇處事之不亂殆由素養非若一時忙迫失據計出無聊自經於溝瀆者之比也困念其行義之篤固有聖朝所不諱者乃為修治其墓并述其事以告後之人或議曰天命已定人心已歸子表章先朝舊臣非罪耶瑛曰凡忠臣義士皆各為其主耳原采仕建文朝故忠於建文若仕太宗朝則忠於太宗也必矣况兩朝天下皆太祖髙皇帝所經營之天下兩朝臣子皆髙皇帝所培養之人物也辟如天地分為四時凡禽鳥應候而鳴者雖有春秋之異要皆造化中物未可舍此而取彼也議者謝曰子言是也麗牲有石其鑱諸醫隱記凡仕與隱要皆有所挾無所挾則易動易動均之為喪己矣成化辛卯豫知廣德州念醫學無傳乃開藥局以延醫師以訓子弟將以濟夫州之夭札者餘姚呂克正挾其所有以來豫問之克正曰醫之道大矣難以口舌爭請以州喻夫子之為州也創制立法以明治體所以正綱紀也選材任能分理庶務所以備佐使也以醫言之脉譬則紀綱也藥譬則用人也故吾為醫不先視病而先視脉蓋脉有隂陽其行有紀度手三隂自臟走之手手三陽自手走之顛足三隂自顛走之足足三陽自足走之腹陽脉有六而其綱曰督督起于下極之俞循脊裏上至風府入屬於腦㑹於顛終於額中隂脉有六而其綱曰壬壬起於中極之下循腹裏上至關元衝於咽喉是八脉者醫經有成說矣吾晝焉而考之夜焉而思之或按其井而知其所出或指其榮而知其所流或審其俞而知其所注或察其經而知其所行或䆒其合而知其所入故五臟病吾審諸陽脉五腑病吾審諸隂脉臟腑皆病吾於隂陽脉交審焉或攻其表或攻其裏或治其上或治其下抗者抑之沉者舉之數者緩之遲者疾之不實實不虛虛不損不足不補有餘故吾之視病也固非泛然無所指也其治病也亦非妄投以劑而姑以試人也竊怪世之為醫者往往不先視脉而先視病脉病矣而身無恙彼詫於衆曰是可以無醫一朝病作而身斃悲夫豫曰子之說其醫國之道乎夫治國者必先正紀綱以立基本然後擇賢材以備佐使故社稷奠安天下無事所謂脉病而身無恙者其宋元之季世乎所謂一朝病作而身斃其航海而南委城而北者乎甚矣子之說醫國之道也子盍不仕吾且薦子矣克正曰楩楠鬱森斧斤聚矣犧牲文繡湯鑊具矣吾利吾鄉吾何有於仕乎乃東棹帆以去豫曰是隱者也彼蓋有所挾矣雪樓記錫山陳君朝用家燬于火乃起瓦礫而棟宇之復閣于重簷臨于闤閈既成天大雪中外晃白君隱几啞然曰是所謂雪樓者耶遂以雪樓名其堂且以自號他日君官吏部豫有廣德之命既領符南君諉豫記之豫曰是樓非一木所就也蓋大者為棟小者為桷修者為梁短者為欂正枅斜栱橫楣直楔衆美咸具而樓成焉若夫雪者則斯樓一時之竒觀耳方其雪時天地無聲禽鳥絶跡拂幌霑帷灑垣侵璧窪者以平緇者以白縱目而觀萬里一色然則樓得雪而益竒哉夫樓髙也雪白也髙則易撓白則易涅髙而不撓其衆美具乎白而不涅其剛氣足乎君所以名樓及所以自號而人所以望君者其不以是耶或曰元程巨夫嘗以雪樓自號君蓋有慕於巨夫而云也豫曰巨夫受知世祖嘗以文學名世矣然而清髙潔白之操豫未之許也方元兵南下巨夫投建昌其季父飛卿者攝建昌守謀舉城以降巨夫不能出一言以救正之方且為質於元取美官焉是可謂髙而不撓白而不涅者乎君號雪樓未必有企於巨夫而云也雖然豫將諗之他日泛吳江抵錫山登于雪樓之上君必有以告我當相與陳君臣之道而極論之放鹿記成化甲午夏豫臨州堂以聽政暑甚舍堂而門門聽察近有譟于野者問之曰逐鹿耳頃而州人執鹿母來獻繼又執鹿子來獻蓋野人逐鹿鹿窮奔入城州人因并執之也鹿被縶在地倔起復仆跌蹼不止州人曰是可飲之酒乃取酒飲之鹿得酒醉皆伏不動有讀本草者曰是可以補羸益弱於兩角間取血飲之尤效因勸豫殺鹿豫曰若誠愛我矣然豫有所不忍也此鹿所謂窮獸也獸窮投人將以逃生也知其逃生而又殺之仁者不為也州治後有廣園命畜之園鹿母子得以遨嬉它日其母為犬所斃其子日嘎嘎而鳴若有思焉者豫悲之秋七月豫有事建平縣道過白茅山見是山南入于廣野北枕于洄溪泉甘而草肥形髙而勢阻以為鹿處是山得其所哉乃繫鹿頸以鐵牌刻其上曰捕者有罰告者有賞引于白茅山而放之嗟夫豫放是鹿哀其窮也且憫其母思有以活其子不知夫操弓挾矢者亦同豫心乎否也然惻隱之心人皆有之又安知夫人之不同豫心也使人皆同豫心鹿其免哉因為之記知恩堂記邵君日昭領鄉書入試春官擢進士第又以才美聞于天官卿氏拜吏部考功司主事考功吏部要司也凡官于是者實操黜陟幽明之典以臨百僚日昭乃曰是父鞠我師教我君擢用我此恩不可忘也因以知恩名其堂而諉豫記之於戲君父師之恩大矣是固不可以不知也知之又不可不思所以為報也吾嘗稽諸古矣昔晉武公伐翼殺哀侯止其大夫欒成以無死成謝曰民生於三事之如一惟其所在則致死焉是致死者其報君父師之道乎日昭讀古書思服古人之道且以知恩名其堂則於事君事父事師固有不愛其死者矣若夫敬恭職業愛奉顔色周旋函丈三擲杯而無愠者皆未足為日昭言也日昭宜興人世居雙塘里堂作於某年月日成於某年月日而知恩次第則日昭有别録云怪石記豫嘗得石髙尺許怪竒特甚既閲嵗墮地以毁豫惜之因記其狀石出寧國府山洞中水土滴積而成其崔嵬而下覆者為巖巖下窈深而不可測者為洞洞前有穹而入者為門其後蔽虧以通乎明者為竇其上聳者為峯下夷者為坂中闕者為崖兩崖之間虛而有容者為谷其尤怪者有巾服鬚眉全具如老人者有昂首岐角如卧鹿者有隤背如龜而穴處者有引首如蛇而欲出者有警而革如鳥欲下者一屬目之頃百怪咸集因為盆池以處之石燥外虛中得水滲濕而上如吸引然乃植花卉竹木不數日生意蔚然如栽培經嵗月云者吁石怪竒至此可謂極矣而卒毁者豈天惡之耶天誠惡夫怪竒則持正守常者可無事矣因為之記抄衍極記衍極五篇元延祐中莆鄭子經氏所著至治中同邑劉能靜氏所注釋其書雜考古今書法而求其所謂中者泰定初龍溪知縣趙敬叔嘗梓行于其邑中矣今刻本已不可見江西吳聘君與弼得抄本令門生饒燁輩録之訛謬頗多上饒婁克貞學于聘君之門初請弗與固請乃得之成化辛卯婁君游南京與豫論古人問學不輕授受談及張長史授顔魯公鍾書十二法因出以示豫豫觀未終版輒收去時行人司副周近仁方購異書豫以告近仁近仁固請以歸期以達旦奉復周君因解釋原帙羣手抄録中間轉益訛謬此本就周君得之其卷帙仍舊但後序并附録移置卷末此其少異耳始豫年四十乃學書苦無師承所及見者姜氏夔書譜李氏溥光書法趙氏撝謙學範陶氏九成書史會要及翰苑菁華諸書然反覆推尋未得要領意者羲獻微論或藏山隂㑹稽諸故家而博學舊識或有能誦其法於千載之下者往往訪而未得詎意正言竒論出自故鄉而他郡博識顧先得之此豫微不足於克貞之獨善而有感於近仁之多能使豫得以出於徑途之迷也蓮溪書屋記蔡君仲韶讀書蓮溪之上因名其屋曰蓮溪書屋蓋思所以世其業也蔡氏為豫章巨族世居豐城豐城諸蔡數百家門閭相向成市號南街仲韶祖以宋嘉祐二年徙蓮溪蓮溪四分南街族之一然而詩禮之澤至今未衰也仲韶蚤喪父能刻苦為學自立於其鄉以亢于其宗豫知廣德時仲韶自豫章來州大姓王氏胡氏交致之以訓其家子弟仲韶撰長書來謁豫方念是州學校廢弛人材放落文事不興凡能助豫化理者皆禮遇之以故仲韶嘗往返豫門間嘗問經義豫亦不之辭焉嵗癸卯仲韶謁豫南都豫方與繕部吳君守愚謀欲得師以教諸子因館榖仲韶吳君所他日民部郎中韓君文亮王君信之吳君文瓉員外郎達君仕𢎞主事王君德安車君明理皆相繼遣子以來諸子有留者有去者仲韶於來者不之拒去者不之追茍留在門者其業皆可觀也今者嵗云暮矣仲韶其將尋舊業乎豫聞讀書將以窮理也將以修行也將以濟時也讀書而不窮理自愚也窮理而不修行自誣也可以仕而不仕絶物也不可以仕而仕狥物也自愚非智也自誣非實也絶物非仁也狥物非義也凡此皆非所以讀書也仲韶往矣溪山如昨書屋無恙吾他日於豫章見有智而通行而立審時而為進止者其仲韶乎姑記其屋以俟之西園記成化庚子冬豫以廣德知州遷南京禮部郎中明年春抵官買屋獅子橋西屋去官路逺而左右人家皆部處如展兩翼然御溝水自前來注之繞吾屋轉而北去豫以其地邃深因治堂以靜虛名既數月豫步自靜虛堂入廢園以觀御溝之流語從者曰此可以為吾西園矣乃具畚鍤鋤荒穢出瓦礫實坎窞因窪為池臨流為磯經其地以為畦雜植菘韭葱芥諸𬞞其不可畦者則植竹木沿堤植栁栁下植槿植葵以及諸刺木宜為籬者水首尾為柵柵下為小門以時啓閉已乃開徑入竹間結茅為亭以臨夫池池中植蓮上為土臺以植花因命其園曰西園亭曰此君亭臺曰留春臺磯曰滄浪磯灣曰清泠灣每春夏水長江潮且入上下相灌注成巨浸加以樹木扶踈䕃覆前後而春纎秋芳濯濯可掬白日坐其中如入深山巨林而不知身在闤闠中豫既得園之勝因記用功次第與夫命名所以異者小山記豫既治西園而刑部談君綱工部吳君昭錦衣衛鎮撫尹君臯及隆平侯張公祐皆遺豫以怪石豫嘗讀晦翁集見翁汲清泉漬竒石置罏熏其後以成江山雲物之趣竊謂翁於山水之癖最深也因除地此君亭北取所得石而跂纍之虛其中以受水穴其下以通煙注水焚香則瀑飛煙布雖平居不出户庭而林巒景物之勝皆映帶几席上矣因擇其有名者各賦小詩以攄幽思客有同豫癖者皆從而和之豫無事時取所得詩置諸左右瓦盆濁酒按節而歌之雖秦人擊筑趙人起舞亦自以為不以彼易此也季弟敬叔曰此無定主兄何樂之深也豫曰天壤間凡可樂者何限而亦何有定主吾於介然之頃而有得焉則其中之甚適有非言語所可諭者方其樂時吾將合四海以同歸又何私焉重修儀真甎厰記儀真有甎厰南京工部主之厰有治事堂歷嵗既久旁穿上漏其餘子舍亦漸就傾圯加以獻議者謂江南諸窰冶並作可大得甎於是舊厰隘不能容甎甎漫積民間榖菽地民納賦如故不得食成化壬寅開化施君勉仁以南京工部主事來始視事見是堂風雨不支歎曰是不可不為也及廉得甎所置地皆民産又曰是不忍為也時孝感張公以都御史巡撫淮揚得專制境內君言狀公報曰聽厰自為計君念民有訟于官罪得贖乃以贖法處分是事於是民雜出竹木甎瓦灰石麻鐡粟米夫役以聽乃建正堂一儀門一書房一因其舊而新之則左右廂各一寢室一外門一又視民間有旁隙地其在厰之東者二可置甎三百萬在厰之西者一可置甎二百萬皆以贖法購得之於是治事有堂燕處有室甎入于厰者不漫積民間地凡此皆關于厰政之大者君又以其餘力去厰門北三百步建亭于河之漘以迎使客以聮艫舳效陶公領荆州事扁曰運甓又東去治事堂三十步結茅為亭下臨深池上臨廣園而大江諸形勝可盡覽而得扁曰望亭此雖在所後然記謂張而不弛文武不能此又君所以弛也豫聞器大者有深容力大者有重荷君以進士起家於筮仕之初即知重政恤民如此使他日當大任臨大事其所施為又何如耶豫又聞君於財計所入收掌有人給領有籍日但稽其入出盈縮以督其成功而已此尤見君慮事之審操已之慎而凡建功立業者所當取法云始事以某年月日告成以某月日其所購地及所置什物則皆備勒諸碑隂云續騷亭記騷何為而作也古者詩言志歌永言而騷詩之變也其趣逺其聲希徘徊曲折而求以達其志焉者也屈宋至矣西漢而下其侈辭乎先族兄諱瑩字次玉號鶴洲主人少有文名天順成化間握符臨汝以寬得民而章甫逢掖士多從之游平生著述頗冨而臨汝人所刻郡齊新稿特其見於作郡者耳初為南京工部主事時與蘇人劉君昌同官昌字欽謨號棕園先生博學髙才與鶴洲兄相友善每公暇輒相與寫騷為樂劉君曰朝寫騷兮亭中暮寫騷兮亭中騷兮寫兮古人與同以日以月兮以泄豫𠂻兄和之曰朝寫騷兮亭中暮寫騷兮亭中騷兮寫兮伊誰與同攄賈之思兮揆原之𠂻兄少愛瑛嘗屬瑛修文以紹述家學瑛謝以不敏成化甲辰豫重握符臨汝因讀騷辭而續和之曰朝寫騷兮亭中暮寫騷兮亭中騷兮寫兮兄弟與同釀太和以為府兮抱眀月以為𠂻士人陳嘉謀見而謂曰騷久絶響今倡而和和而續其為楚辭添後語乎豫曰不敢也棕園鶴洲皆作者而豫識趣凡近聲韻俚俗安敢自附于為騷蓋亦言其志焉而已豫聞太和養萬物而物無不養明月照萬物而物無不照枯根之腐萌蘖弗生焉覆缶之下月光不照焉蓋太和能為養而不能養於所不養明月能為照而不能照於所不照能為養者公於為和也其有不養者物取之也太和無容心焉能為照者公于為明也其有不照者物取之也月無容心焉無容心即所謂虛也虛者天之道也豫少為學見人急恩讎快私念心竊薄之及為郡以虛視之而已以虛為郡宜乎物我合一恩怨兩忘其有不然者習為虛而未盡所以虛也敢不自省乎嘉謀作而曰騷云乎哉吾乃今而知夫子之志也請備書之豫初到官嘗節縮稍入為讀書屋於私第西南偏既又為小屋以庋書及因地之窪而池之以滌筆硯創畫多時名號未備至是題書屋為臨汝書院池曰浴雲池改小屋為續騷亭而備書倡和之語於亭之南楣以待夫同志者昔子夏曰百工居肆以成其事君子學以致其道又曰仕而優則學學而優則仕後之君子必不以豫為無事而勤民云洗心亭記姚江之上有華氏世以讀書聞華氏佳子弟曰福福字廷禧少讀易乃取易大傳語名其亭曰洗心成化甲辰舉進士丙午出知臨川縣臨川撫屬邑也豫時為撫長吏廷禧每以政事相咨禀道術相訪問有相成之義焉明年丁未豫改郡鎮逺因請記其所謂洗心亭者嗟夫自九師說興而易道以晦學者遂不識心亦孰知所以洗夫心哉夫易天道也其有迹可見者曰蓍曰卦曰爻蓋圓而神者蓍之德也方以知者卦之德也易以貞者六爻之義也此三者潔净精微之至也聖人以此洗心退藏於密蓋寂焉而莫窺其有感焉而莫測其用隱之至也學者要必先有以探隂陽之藴通神明之德窺見天下之至隱以其潔净精微之教洗吾穢濁雜亂之私然後用神以合蓍用知以合卦用易以貞以合六爻之變而於天道無不合矣是知聖人所謂洗心者不待洗而洗也學者洗心要必有以洗之而天道乃得也華君勉乎哉三古四聖之心其緒微矣王輔嗣韓康伯輩岐天人而兩之而以茫昧荒忽談易遂使經生學子無所依據以為所自入之地識者恨之程子曰體用一源顯微無間朱子曰用應始有體該本無吁至矣微程朱氏吾誰與歸亭在華氏居第之左偏髙若干廣若干無雕刻藻繪之飾作於某年月日成於某年月日記作於豫改郡之明年三月二十有八日石崖書室記成化甲辰豫自南京禮部郎中出守撫州丁未改鎮逺鎮逺在古荒服之外是為蠻獠出沒之衝蓋夷郡也豫來既治邸舍以居乃别作室于石崖之上以為讀書所讀書而别作室以圖靜也作室而依石崖據形勝也室前跂石而臺之題曰讀騷臺懷古也臺左鑿崖石以登曰雲根嶺書僻也石崖書室總據形勝而臺與嶺皆書室所有也居夷作事囏故規制皆就簡室為崇僅盈丈修視崇尺有二廣倍于崇加尺有三臺之崇之修皆與室同廣不及室七尺嶺自平地至臺凡五折其崇與臺等其修視崇倍之夷民寡詞訟平居夷獠受約束木契箭刻不馳皆暇日暇則坐室中讀吾行厨所有書或挾楚騷讀臺上時上下往來于嶺甚適也客問曰子年邁矣尚占畢未己乎豫曰天道備於聖人聖人心術寓於書而易詩書禮樂春秋皆書之大者讀書則有以探聖人心術精微之藴而天道可得以是而立三綱以是而秩五常以是而酬庶務天地所以位萬物所以育皆是物也惡可不讀書客曰騷之為辭風雅之變也昔人嘗謂醇儒莊士或羞稱之子何以為騷為哉豫曰騷之辭怨懟激發可議騷之心可與日月爭光也當時懷王不知原矣襄王又不知原矣後世因讀其辭而得其心固有為原流涕者此豫所以深悲之也客曰先生之言有以破豫荒哉吾乃今始知室與臺不虛作也客退因取所以立名以鐫于石以樹于臺于嶺復備述其事以記于室壺中丘壑記鎮陽有怪石禹貢所不載者𢎞治庚戌夏季弟敬叔來視豫一日入後圃循讀騷臺而東見有礌砢伏莽中者發之皆怪石也告豫曰兄癖類桞州性好山水藉此為山凡諸形勝可不騖逺陵危而得之矣豫曰善乃稍稍為正中峯分左右麓伏者起之滿者虛之對峙者差互之直往者迂廽之於是立者為峰側者為崖深者為洞空者為谷復取蘭菊竹木分植上下然後歐陽子所謂鬱然而深秀者次第而成山成復杵地而窪之覆水其中命曰勺湖豫曰此非誣耶季弟曰世固有以小為大者越人賈汝昜嘗言其郡有祕圖湖僅大如碗此之為湖孰曰不然復命家僮縳茅為亭取蔽風雨告豫曰昔王龜齡嘗記其第所謂笠亭者此得無近耶他日豫登焉見夫所謂山者微尖寸碧掩映林麓宛然如對泰山華嶽又見夫所謂湖者輕瀾淺波拍滿涯岸恍然如臨震澤洞庭因題曰壺中丘壑進季弟而告之曰夫天下事有實體可據者是謂之真無實體可據者是謂之幻世有以幻為真者亦有以真為幻者以真為幻此妙識也妙識入於無故不有其有以幻為真此俗識也俗識膠於有故不知夫所謂無者然此二者為說皆非也是蓋有所纒繞強自排遣耳君子則不然君子之於天下也不離物以自髙不嬰物以自病以天下之理應天下之事其中廓如也季弟作曰因丘壑之談而得處世之說請書以為記貴藩重修後堂記古者國君居室之制其前曰路寢其後曰燕寢路寢公也治事之所也燕寢私也退休之所也今制官府有前堂其古之路寢耶有後堂其古之燕寢耶作前堂以治事所以致勞也作後堂以退休所以就逸也一勞一逸古之制也我太祖高皇帝統一寰宇建十三布政司分理天下事其軍馬其財賦其刑辟各置大僚以掌之勢相頡頏而不相下所以矯前代方鎮尾大不掉之弊而躋天下於乂寧之域也貴州本夷部髙皇帝時以宣慰使田氏分領其地永樂十一年田氏違命治兵相攻無臣子禮文皇帝惡之削其官乃籍其家建布政司以僃一藩之制初諸宣慰頗暴慢無禮至是皆俯首帖服惴惴不敢動百年來諸賢良相繼為治其政漸敷其俗漸移官府次舍以漸修理𢎞治六年吳興張公廉由貴州按察使擢本司左布政使一日徘徊廊署顧參政劉君肅參議韓君鏞陳君奐謂曰吾藩財賦人民視中州諸藩不及三之一然而掎角形勢控制苗獠以通西南朝貢道路其地至要也今前堂如制而後堂隘弊殊甚其何以集謀議廣忠益而合籌䇿之公又何以布筵席舉觴酌而伸燕好之私某不敏願相與圗之諸君皆曰魯叔孫婼訟于晉所館雖一日猶修葺其墻屋及去如始至焉今吾人實官于此而衙宇不治宜如公所言者時方聚兵境內以討都勻諸夷公念使司財賦所出朝檄暮輸不暇以為既而羣凶授首境土廓清公喜曰乃今可以有為矣因以其事告于撫按諸公皆曰宜如制公乃約稍入而節縮之取彼與此計工授程陶土為瓦煆石為灰取棟梁榱桷于羣木所宜建後堂若干楹東西廂若干當庭之中而屋之以通前後往來又若干楹後堂之廣與前堂稱髙視前堂為不及而修過之其制雅雅言言坐以談公列以序私無不可者初居民十數家漫入省垣與羣吏雜處公曰民與吏淆奸慝曷去乃授之直俾擇便地以居即其處為左右二參政廨舍又分其餘以為吏舍至是以堂言之則前後之制備以居處言之則內外之分嚴公又命築長垣環繞于司如古所謂牙城為者其垣下甃石上覆以瓦髙厚長大牢不可拔經始於𢎞治七年夏五月告成於是嵗秋八月凡縻白金若干兩粟若干石邦人皆若不知公有所為焉者既落成衆謂古人興作皆有所表志况此工最巨惡可以無述乃走使蜀藩屬瑛紀其事始瑛待罪鎮逺府於公為屬真各有過吾郡者談方今人物謂公威而不暴明而不察簡而不煩有古人風度則其所抱負深矣抱負深者則發泄大然則今之事業其昔日之素藴耶探公所有而推之厥施未艾也豈但制一藩而已哉請以是刻諸石用以紀前緒且以卜後勳教諭黃先生祠堂記君子居官而人愛之既去而人思之思之不置又從而尸祝之吁此可以觀德矣豫參知蜀藩政事因巡厯下邑見廣元縣有教諭黃先生祠竊欣慕焉先生姓黃氏名韺字聲叔同豫興化府莆田縣人先生兄龍官户部主事兄子綸官順德府教授今孫顒登進士第為户部主事先生講學家庭兄弟叔姪自相師友宣德中以明經薦授本府仙遊縣學訓導丁內外囏更無錫麗水青田三縣學訓導天順中以教有成績升廣元縣儒學教諭廣元為蜀北鄙軍士荷戈而立編民鮮少學久廢師生倚席不講先生來以義倡率廣元人士廣元人士翕然趍之乃相與修學舍建文廟塑聖賢像每日衣冠坐堂上呼諸生使前授以經書背誦覆講如法其教舉子業務識體裁不剽竊陳腐如所謂活套為者諸生苦貧無資以為學先生曰汝第為學吾當思以給汝乃察其貧甚者解衣推食以授之諸生至為泣下其或恃財怙勢不循軌度則嚴呵之呵之不從施以朴教務從善乃止故廣元人樂從先生之教而畏先生之嚴明及其久也而心安之皆曰先生真愛我者矣先生既歸諸生指其所修廟學曰此先生之遺緒也其可忘乎見所改課程曰此先生之遺澤也又可忘乎乃即學宮之旁立祠肖像以祀先生焉吁此豈可以力致哉蓋先生學問淵懿勇於為義而加以至誠故能感人若是其深且久也豫所謂君子居官而人愛之思之尸祝之而可以觀德者先生真是矣然先生行義不但施於廣元而已嘗聞在仙遊時知縣王彛以白金二百兩寄先生所雖愛妾莫之知也彛病死先生呼其子來授之人服先生之義在麗水時浙冦張甚衆以先生有材略推以捍賊先生部署既定乃諭以忠義衆感激效死鼓之而進賊奔北境土以平人服先生之勇其入蜀時與僉事董公應軫同時濟江公船覆呼近岸諸小舟莫肯前先生曰是欲得財耳乃自取囊中金分授之衆乃亂流而渡董公獲免人服先生之仁且知處事之變凡此豫聞諸先生之孫顒而熟焉者先生之祠在故學宮之內近學遷而祠毁參議喬公廷儀分守川北道命重立之此見喬公秉彛好德之心亦廣元人愛先生之未己也瑛既備書先生教廣元事復以其平生行義而類書之使廣元人并刻于室中他日讀者必有感慕興起願為先生之所為者矣是為記揚子雲書院記蜀讀書稱揚子雲氏子雲鄭夾漈通志謂蜀成都人班固漢書謂郫人按子雲自序謂其先出周伯僑氏食菜於晉河汾號楊侯晉六卿爭權逼之乃去晉逃楚家于巫山既而遡江處巴繼又遡江處岷山之陽曰郫則子雲固郫人而成都縣中有洗墨池意其讀書僑寓之所也子雲仕漢當成哀平間官不過為郎其學師承未有所考或謂參摹四方渾天之事得諸嚴君平未知是否其所著書有太𤣥法言訓纂州針解嘲及有反騷廣騷畔牢愁甘泉河東較獵長楊等賦子雲沒後法言盛行於漢其太𤣥至宋司馬公始為之注外此未有好之者皇明繼宋而興以儒術治天下其教學者以易書詩春秋禮樂為宗以語孟庸學為要以濓洛關閩諸論說為羽翼若太𤣥經等皆不列於學官故揚氏之學益微子雲於西土豪傑之士也漢武帝好辭賦司馬相如輩挾其所業以進大見寵幸子雲初雖有所慕羡終覺其非是乃退而自守寂寞清靜留心太𤣥以成一家學可謂髙出等夷矣惜其擇義不精失身所事綱目以為貶君子雖重加愛護而終不能掩其失也豫每見韓昌黎氏以孟軻楊雄荀卿並稱間又曰孟氏醇乎醇荀與楊大醇而小疵則楊氏之學當在孟氏下與荀氏並駕至於司馬相如輩則非所論也子雲沒千餘載郫人張伯明氏為作書院於郫書院前為堂堂左右為夾室夾室之南為廡廡南為門堂之北為樓樓制髙亢𢎞敞每開軒四望則岷嶓諸山左右環繞而汶江前水交流其中而子雲所著益州針厯厯可考既又多購書庋置樓上將使其族與其鄉子弟講習讀誦遡子雲舊緒仄諸醇而益大之其用心良厚矣張氏在郫為族最蕃先白河南徙郫至伯明委身蜀王府為承奉正王以其忠誠呼曰宋景故又别稱宋景平日樂為義事雖費巨萬無靳惜意如宋潜溪謫死于蜀乃以其所營夀藏處潜溪秦李氷鑿離􅕞引江水內注其經于郫雖資灌溉未免病涉乃伐石為梁極其壯麗行者稱便至是復作子雲書院其表章先賢之心勸率後學之意至矣豫在蜀時嘗識伯明及奔母喪東歸伯明遣人來索記因述豫所見並為之書莆城闢郡學記莆城中有梅峯焉梅峯東翥如鳯凰展翼形郡學在其下考前志宋咸平二年始建郡學其地天子所豫而學則邑人方儀陳詡相與出私錢為之為之不足乃請官錢以益之也自宋厯元以及我明纍政君子屢加修治間亦嘗改作矣然而去宮墻不尋咫居民纍數百家聫薨接棟不見首尾君子恆病其阻閡厄塞欲撤去而不可得者𢎞治乙丑進賢饒公榶為御史來按閩前是宜興杭公濟為按察副使來提學又前是南陵陳公效來為莆郡守御史主治提學主教郡守兼承治教而致之民是數公者陽噓隂吸化軸轉移人曰宋咸平已亥建學至是五百有餘嵗矣學運其當興乎我明正統乙丑修學至是六十甲子數周矣學事其伊始乎乃者丙寅嵗是為正德初元御史按莆既謁文廟退升明倫堂聼講已乃徘徊顧瞻若欲有所修治焉者及出門顧謂太守曰莆以科甲文章名天下而學宮前僅容旋馬此非所當治耶幸為我圖之太守退與通守汪侯鳯朝節推沈侯欽謀盡買學前地二侯曰此善政也宜决成之又曰是地軍民雜處屋在民者府平其直屋在軍者衛平其直太守曰善乃謀衛帥丁侯賢丁侯欣然以從相與處分定乃圖上方略于御史于提學御史提學交報曰可命下軍民以得價平爭拆屋他徙以其地歸之學舊時訓導衙舍與民居錯至是并撤之共得地六畝一分七釐其縱也東為修二十丈有六尺西為修一十四丈有七尺其衡也南為廣三十丈北為廣二十七丈有九尺乃繚以周垣中為垣而亘之以分南北北為明堂如其衡之廣縱六廣之一兩端為綽楔以通往來用宋舊扁東曰達材西曰成德南為齊房二十有六間為㕔十有二為穿堂四前有院落後有蔬圃以處諸生之治行業者却立而望之壺山前峙天馬西列榖城五侯諸山自東暗拱之形勝之佳前此未有也始事於正德丙寅八月乙已終事於其年十一月癸酉僅三閲月而功告成焉是役也財不取於官帑力不起於丁夫地價木價工價太守皆取裁於御史區畫用之可謂善於建功立業者矣其他若汪侯之提督沈侯之贊襄知縣周侯廣之維持文學椽夏君鐖趙君階戴君檟相與周旋不怠至於府檄義官曽崇賢監護屬功曲盡其道衛檄知事楊文千户假志賢平定屋價豫奪得中皆可書也夫以數百年之事功而成於一旦十數人之集事同出於一心誰之力也御史之力也人謂事關於氣運果然哉太守將紀功所自而徴記於瑛瑛既直書之矣竊謂學校由氣運而興則人材當應氣運而出願我人士學宗孔孟業式伊周以此酬御史作興我學校之意以此副提學教養我人士之意幸甚是為記重修蔡忠惠祠記出莆城南三里許為蔡宅有忠惠祠焉忠惠名襄字君謨宋端明殿學士考宋史及郡縣志皆謂公仙遊人豈後徙居莆田故此有公宅歟嵗久宅廢弛漸入人家而祠亦傾倚不立明成化初都御史滕公昭行部過城南見路左廢祠有蔡忠惠字問曰豈作四賢一不肖詩者耶從者曰然公下車瞻拜吁嘻命郡守潘侯本愚重作祠屋三間奉祀唯謹𢎞治七年今郡守王侯弼以為祠隘不足以稱神棲乃拓而大之作正堂三間髙若干廣若干修若干復作寢堂三間髙廣修殺之旁翼以兩房又殺之近祠有荔枝龍眼園王守曰此故蔡宅地宜贖之以益嵗供於是郡人御史林君誠之子近龍通判陳君瓉之子鉞各持劵以來曰蔡忠惠後學典型也公崇祠以祀之近龍請割地六分鉞請割地三分并所有樹木入于祠堂庶仰承公敬事先賢之意與直皆辭焉王守曰賢哉二生也可與共為義矣祠成王守率僚屬饗諸其室牲豐酒馨禮儀明備鄉人來觀皆相與嘆曰忠惠沒數百年今廟貌如是人固不可不知所以樹立也考公傳公舉進士調西京留守推官時范仲淹權知開封府以言事侵宰相去國余靖論救之尹洙請與同貶司諌髙若訥獨以仲淹為當黜歐陽修以其不知耻移書責之由是三人者皆坐譴公作四賢一不肖詩都人爭相傳寫契丹使市歸張諸幽州别館慶厯中知諌院直氣凛凛凡所言皆切中時弊匡益甚多以母老求知福州開古塘溉民田奏减五代丁口稅之半入修起居注救唐介得貶近地進知制誥三御史論梁適解職公不草制遷龍圖閣學士知開封府開封京郡吏緣為姦公摘伏如神吏不能欺以樞密直學士再知福州禮聘郡士周希孟陳烈陳襄鄭穆等以經學誨諸生禁郡人不得破産飯僧以供喪繼知泉州架海為梁長三百六十丈又植松七百里以䕃行道之人召為翰林學士權三司使較天下盈虛出入以制國用其姦弊剗剔殆盡綱紀纎悉可法英宗不豫皇太子立人謂公有間言公不安求外拜端明殿學士出知杭州丁毋憂去尋卒贈吏部侍郎淳熙中賜諡忠惠其為文章也詩辭清粹淵永制誥醇正典重至於序記諸作往往雅馴多變化不襲舊作讀之有意味蓋公在當時以善書名天下故文有所掩也於戲士生於世氣節足以動縉紳勳業足以被黎庶文章足以軌範後人則尸祝於其鄉也冝矣丙辰嵗豫抱憂家居公十四世孫宗計曰郡守加惠我先人至矣而二公子髙義亦不可忘也若不有所紀識恐後世湮沒無稽乃具其事本末以來且録公文為贄豫曰是固所當記矣因諦書之且書公事使郡人有所考覽以為勸云翠渠摘稿卷三
