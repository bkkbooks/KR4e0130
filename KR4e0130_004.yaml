body:
  text: 翠渠摘稿卷四明周瑛撰銘楷木笏銘豫為進士時人遺豫以楷木笏且告曰此孔林遺植也其理赤其節密可以直拄不可以橫擊也及為知州官五品笏用牙豫以楷木之訓不可違也乃函以入州製之銘曰孔林遺植千八百嵗直擊則堅橫擊則碎凡我君子靖共爾位視斯式斯庶幾無愧屏風銘廣德州公署後有屏風焉黝外素中豫題其前曰視民如傷復製之銘以自警銘曰損上益下是謂之益損下益上是謂之賊彼損下者見利而甘搗骨椎脂一何其饞惟彼損上貞固自守謂他人肉敢入豫口損下既多人莫豫何神明惡之時或見呵君子損上固無所為心公理得庶幾無愧二者之間其幾至微取舍向背天不可欺巽言于前法言于後汝茍違之又將誰咎撫州府正義堂銘太守私第在羊角山下此為前門嵗久將壓豫來易為廳事扁曰正義堂而製之銘曰以理處物是謂之義以心徇物是謂之利卓哉董相為漢儒宗發正義言以破昏蒙我聞求仁惟公為近惟公之至斯理之盡顧豫不敏叨守大邦力綿負重如鼎斯扛事有萬殊精粗巨細載謀載度從心之制獄有五訊絞斬杖笞維明維慎惟罪之宜義所當為豫何敢止禍耶福耶誰其恤彼義所當止豫何敢為愛耶憎耶豫其誰知孟言熊掌視魚為美我當舍魚熊掌是以又言盜跖與舜異趨我不為跖而舜與居是非殊途生死異路毋或徘徊竟爾迷誤明有禮樂幽有鬼神出入視兹求仁得仁洮硯銘王節判贈豫以洮石豫謂硯譜洮石色緑此色黃如何王曰固洮石也因治為硯而製之銘曰維洮含英維奎降精色幻黃緑五行攸屬不駁而淳不燥而溫敦之琢之久相斯文瓦瓶銘豫陶瓦為瓶其制朴雅製之曰匪銅匪錫孰為斯器不雕不鏤孰為斯制枯枝素葩淡藏春意置我茆茨與我心契木瓜杖銘園有木瓜樞姪取以製杖按本草云木瓜為杖利筋脛銘曰偏而豫正曲而豫直子受豫鞭䇿危而爾持顛而爾扶豫賴子枝梧贊宋户部侍郎李公紳遺像贊宋溧陽李公紳仕髙宗朝為户部侍郎遺像至今猶存其裔孫某持入南京禮部謁侍郎李公本公命瑛為之贊曰肌膚玉琢色何溫也眉宇春盎氣何醇也廟廊佐政官亦尊也雲雷搆難時方屯也損上益下偉事業之經綸也於戲世代逺矣人物更矣載瞻遺像耿聲光之猶存也鈍齋先生遺像贊瑛少受學于鈍齋朱先生深荷教愛先生既捐館舍其子南京户部主事愷屬瑛為真像贊俯仰疇昔泣下沾襟贊曰金玉其相敦琢其章業專學精言直行方太山嶷嶷北斗有翼入此里閭孰敢不式井菴先生遺像贊井菴監察御史林君誠號也君為御史時豫嘗為君以數起卦遇井其用爻九三豫曰井以利濟為功九三未及為用而體已具遇王明而汲則施者受者并受其福也君曰吾喻之矣乃以井菴自號今君已即世而像存焉謹為之贊曰維材爾礱維璞爾斫扼而後騫伏而乃作其登進士也克紹父烈其為御史也不負君托激雷霆之怒不震不懾遭市朝之撻何愧何怍學政修明鹽策簡約章疏稠疊言論謇諤若夫繳還敕書歸卧林壑白壁無瑕清風如昨此則公剛斷自許非若常情旅進而旅郤也韋提學先生畫像贊先生名斌字尚質淮人也將致事去以畫像屬豫為贊豫謹稽輿論而贊之曰吾持吾剛孰得而摧吾行吾公孰得而回參苓溲勃既勞於收拾松柏桃李亦慎於栽培蓋所恃者天知所不避者人猜此公行已之大槩也若夫相貌尊嚴衣冠岌嵬雖丹青能肖像其侊佛亦何足以盡其中之所存也哉畫像自贊豫守廣德日嘗以事詣姑孰姑孰有繪豫像者面部不甚類但衣冠朴野風神拓落全類豫醉中因自為贊曰勢不可摧利不可媒一見是處如山斯頺知我者謂我自信不知我者謂我執迷不回傳瞿谷子傳正統末車駕北巡皇太后命太子攝國郕王為輔而郕王信佞者言遂即真繼又信佞者言廢太子而立已子吏科都給事中林聰監察御史鍾同禮部郎中章綸南京大理寺少卿廖莊皆冒死以諫天下韙之豫亦竊加歎賞然頗惜其後時焉蓋羣公之諫宜在郕王謀即真之時即真事寢則易儲之事自寢矣時家有鸜鵒圖因隱約其事為瞿谷子傳以告後之為諫者貴知幾也傳曰瞿谷子不知何許人或曰其先嘗仕於少昊氏之世左傳凡為旋三百六十九苞氏其長也格物論世居濟以北考功記黑衣髙幘性慧而善語所居之室不過峭壁層崖頺然一穴而已魯昭公三年嘗踰濟水公不能用春秋傳及五行志晉桓豁領荆州有參軍愛其辨羅而致之幕下終亦無所委聼幽冥録唐貞元初四方厭亂與青烏先生變而服縞或見而異之以為吉祥強邀之以獻于天子入關東西行者避路昌黎集自計曰吾其遇乎比至京師天子不尚口辨為同類者譏侮乃曰吾其行矣吾不行人將臘吾庖人之肆矣遂逸去而以告于九苞氏九苞氏曰子來矣吾得以語子蓋智者能用世不智者為世用能用世者而世制于我不能用世者而我制于世世制于我者得其幾之謂也我制于世者失其幾之謂也我用世而得其幾則世之從我也如轉丸然故世為我用我失其幾而強與世合譬如謀以方軌而走坦塗一起而一仆矣何謂幾蓋善惡已形而未著焉者非至明不足以知此幾非至勇不足以用此幾自古謀人家國未有不知幾而有濟焉者子必勉之瞿谷子起謝曰丈人有以教我矣丈人有以教我矣辨柳子宥蝮蛇辨柳子家僮得蝮蛇將殺之柳子宥其死而遣之其説以為蝮蛇為毒甚非得已緣形役性不可自止且未即人而人即彼執而殺之則益暴矣蒙中子曰柳子之見其駁哉夫以蝮蛇為毒非得已則天地生蝮蛇豈得已乎天地生蝮蛇非得已則人所以治蝮蛇者惡可已乎蓋天地生物氣化不齊伸縮盈虛錯綜雜揉故其偏駁乖戾之甚必生而為毒螫饞噬之物蓋非天地欲生此物也氣之所至不得不生之也有聖人者出明大中至正之道凡非天地之得已者皆從而治之若禹鑄鼎而治神姦益烈山澤而治禽獸周公相武王誅紂伐奄而治虎豹犀象之屬是數聖人者豈過用其心哉誠以物害不去民生不安也今夫蝮蛇為毒嚙草則草枯嚙木則木瘁嚙人不死則亦肢體拘攣而不能伸縮其毒甚矣乃歸於氣化之偏而可以無殺推是心也設有人焉如古越椒氏生而豺狼之聲長而傷人害物乃委曰氣化之偏使然而可以無殺刑政不亦頗乎且天地生萬物人為貴故王者養萬民亦以人為主若夫水土之産昆蟲草木鱗介之屬皆惟人之用不可與人論輕重也故先王制刑凡人殺人者其罪死若折一木戮一獸踐踏一螻蟻先王豈罪之乎今以蝮蛇為未傷人而罪不至死則將俟殺一人而後戮一蝮蛇是視人之命與蝮蛇等也輕重失倫甚矣鳴呼栁子之説行則民姦物怪之害興生人族類之滅久矣豫偶讀其文病其見之駁且懼其禍也故不辭夫僣而為之辨題跋題薑氏雙槐堂王氏植槐以卜公輔而公輔應薑氏植槐以卜科第而科第應何天人相去之逺而可以責報如是之速耶蓋天人為理一而已矣人能順理則合乎天矣人能順天則天與之矣故以人責天而天無不應者其幾在此也王氏事載宋史後世能道之矣薑氏今為廣德州人其先曰克銘者自四明來分教廣德州庠遂占藉于州至是四世矣克銘之孫有諱韶者嘗植雙槐于庭祝曰子孫有以科第顯槐其盛乎既而東一株盛其從子洪果登進士第拜監察御史未幾西一株復盛其子溥亦登進士第今為嘉魚縣知縣蓋薑氏在廣德治産修業後于鄉之人而讀書修行恆先于鄉之人天不言而善應其於薑氏則既與之矣子孫之興不亦宜乎嗟夫天未嘗有心於為人也積善降福是福以善取也積惡降禍是禍以惡取也世人不為善而為惡及至顛踣而反以怨天可謂不知務矣題王皆山白雲樵唱後國初閩中有十才子皆以詩鳴或云皆山即其𣲖也十才子詩去今未百年皆散落無存而皆山有鳯臺清嘯草澤狂歌白雲樵唱凡數種樵唱近存吏部郎中黃君汝明所問多訛舛大司徒黃公見而嘆曰賢哲凋謝聲光猶存吾生長里中不為表章何以酬故老因以元稿托汝明編次成集付户部郎中陳君孟明校正之公將梓行以吾莆林殿元長樂東選部嘗序先生全集矣乃自為序而命瑛題其後瑛謂閩中舊為道學淵藪詩辭其緒餘也然詩辭亦道學旁出其抽思造意探玄索微出入造化聮絡萬彚其髙妙處與性命相流通詩所寄非淺淺也聞十才子詩皆祖林膳部子羽而王皆山髙漫士其最髙者夫寶玉在山草木生輝珠琲在海波光橫發先正詞章流落鄉邦則殘膏賸馥沾溉後人公學博而才贍官髙而力巨他日博訪諸作而類集之芟繁摘要取純去駁俾成一家書以訓吾黨小子則閩中詩學又不可謂無師承也秉耒居士題引周家開國自耒耜中來考其所以為教曰勤曰儉曰孝敬而已故豳詩有曰二之日于耜三之日舉趾言其勤也雅曰攘其左右嘗其旨否昭其儉也頌曰蒸畀祖妣以洽百禮彰其孝與敬也居士秉耒其有得於此乎有得於此則業廣而用足人和而神孚家道成矣他日形於述作播於詩章後世讀之必以居士為楷範不但風雅頌有所稱説而已也或曰居士隱者蓋有國者秉鈞居士秉耒將以其所業而忘夫富貴者也果然則豫之言又居士立號之補遺也題長江萬里圖長江西起巴蜀東盡吳會首尾萬里昔吳晉據此以抗曹操走符堅當時江上戰舸相望也此圖為錢塘汪孟文所作為殷氏景禧所藏江水粼粼柯石無恙即兩崖而觀之見夫騎者步者坐者立者歌者飲者與夫持網罟者操舟楫者及渡水而負薪者樓居而穴處者皆熙熙然無驚虞竄伏態其為南北混一之時乎其為海晏河清萬物各得其所之時乎豫少壯時過江上嘗欲溯舟而西登岷山絶頂飲江水之源而吞吐之以觀夫滔滔而逝者之所終始恨未能也殷君生逢太平之世往來江上亦多年矣不知有此意否題都隱十咏卷後包君汝調作都隱十咏其時已為南都主客部主事矣然而以隱名者其志可知也蓋綰簮組而有山林之趣享膏粱而有虀鹽之味此為不改其素者也不改其素學之至者也君子蓋深許之焉若謂汝調不事事而以竹木水石自娛則非矣跋余氏家譜余氏為浙東儒家宋末有諱吳者為江浙儒學提舉宋革命閉門不食而死聞疊山謝氏嘗稱其為一代名流提舉九世孫中之修譜守其祖思菴遺囑斷自提舉為始提舉以下始致詳焉蓋愼之也余氏自提舉以節義名家而子孫若思椿息齊求仁竹泉梅槎諸老皆以儒術繼之故其世益綿而氣節詩書之談至今不衰蓋其所以道之者深矣譜以漢表為式而義例則余君所自立時有取思椿一二則云跋杏莊私稿詩未易作亦未易評也世之評詩者如雲裏看月霧中觀花雖皆談其淺深終不得其形似廣德為東南大州人才放落文事不興近時有馬叔山者吾嘗得其殘篇斷簡於卷牘中喜其清婉可讀誦醫學典科王文粹嘗遊於其門故其所作詩多祖馬氏近以其杏莊私稿請豫評豫披閲之花香月影騰於紙劄雖然詩之道未止於此也勉而深之其至矣乎跋陳可軒詩集古者之詩大要以養性情為本自後世觀之唐詩尚聲律宋詩尚理趣元詩則務為綺麗以恱人然而今之學詩者喜自元入手豈綺麗之語易於移人而淡白之辭難以造意耶豫為兒時聞吾鄉陳可軒先生能詩今其子會稽教諭華玉刻之學宮雖未辨其聲律理趣出入於唐宋間何如要之去元聲逺矣欲養性情者宜於此求之跋林氏風木圖韓詩外傳載臯魚子感風木思養其親不可得而繼以稿死於戲悲哉臯魚子之為心也世人固有享萬鍾九鼎之養而不知思其親者矣若臯魚子之思親則又思之過也林氏之為此圖其愼知所擇哉跋陳登千文帖字心畫也放意則荒取妍則惑故古人作字甚敬永樂間吾閩陳公登工八分小篆用知者薦入為中書舍人今觀其書不縱竒以入怪不詘意以諧俗遒美圜徑古意渾然此其用筆本於敬者歟淮北王敬之得此而出示於豫豫聞王君居官本於敬宜其好有及於此跋趙子昻墨迹右書為遼西賀克恭所藏觀者以為元集賢學士趙子昻所書豫不習趙書未有以辨其果然與否然聞子昻宋秦王德芳之後世祖初召入或以宋後忌之世祖見其姿色媚麗婉婉如美婦人遂用之不疑今觀其書政類其為人烏呼是為子昻也耶跋左氏節孝傳豫讀後漢書嘗手録列女傳以教諸女中間稱孝行至曹娥而止稱禮節至皇甫規妻而止蓋漢自中興以後僅見此數人今讀涇縣左氏傳纍數百言稱其節孝事豈古之所難而今之所易哉雖然傳作於陳獻章其所稱述必有稽也果然則古今人心不大相逺而治化淺深可槩見矣跋宋御書赤壁賦右泥金赤壁賦一道有宋御書圖識或以為祐陵或以為思陵或以為阜陵書皆未可知然而骨肉豐潤神氣凝逺譬如幽花修竹生長臺榭中自有一種天然風韻可愛要之為宫閫書也夫宋自裕陵後國家不可謂無事矣為帝王者當日讀大學尚書以圖治本顧乃不此之務搗金為泥書清竒怪偉之文以為珍玩此宋之所以不競也書謝氏敦彛十二會後黃岩謝氏嵗合其族之良為十二會會以敦彛為名戒飭存焉君子曰禮興家之本也今觀禮於謝氏而知謝氏所以興也夫人情猶水也非防則泛謝氏能以禮約情防斯固矣况其族多賢凡與會者皆能用命於其長禮其成乎君子觀禮於謝氏而知謝氏所以興也書晦翁法帖後晦翁書表裏洞達觀其書令人穢濁消盡翁自言學曹操操曖昧人書法當不至此豈翁學其點畫而自舒其胸中之祕耶玉溪帖瑛過建寧翁九世孫博士君燉出以示瑛乃摹歸刻諸廣德學宮此翁真迹也跋重刻荔枝譜後書法自晉至于宋凡二變矣晉尚風韻唐稍收斂而就規矩宋則破格書之而豪縱不拘焉蓋其乘除之勢然也嘗觀鄉先正蔡忠惠公書獨與宋人不類結搆精密神思凝重有石經之遺意豈其心法獨得不為世俗所推移者乎豫愛公書而不得善本此譜其再傳者初公有真刻為富家子所得將礱為墓志鄉人鄭立久見之亟拓以歸而鋟諸梓莆中所傳僅有此耳豫知廣德州友人黃仲昭以畀豫豫就蘇守丘時雍求良工美石刻之以教州人云跋汪教諭家藏先世手卷醫之為術自岐黃至于華扁而止文之為術自韓栁至于歐蘇而止外此而有稱者皆希世之見也洪武中黃岩汪先生信中以醫鳴同邑潘先生貞以文鳴汪之醫能不拘于方而會于意意之所投效輒隨之潘之文其體紆迂曲折其辭渾造淡白初不為聱牙鉤棘以齟齬人口而極力於為古者反不之及後八十年為天順甲申汪曽孫秉淵由浙省發解來主漳浦縣教事出潘先生貞贈其祖信中文一通先正寥闊之餘兩覩希世之見可謂竒遇矣因書其後以歸之題梅莊卷後宣文獻家稱南湖貢氏貢氏封監察御史伯潤公自號曰梅莊嘗賫卷入廣德索豫題豫三年未有以復之也嵗暮天寒假寐東園書室夢艤舟南湖之上見梅花蔽野中有竹籬茆舍一老人揖豫曰江山搖落嵗華暮矣吾子何為乎至此豫曰人世無著身處所以欵于長者之居老人指梅花曰子知此乎豫曰是為白而不緇者乎瘠而不腴者乎燁然孤芳灝然古意而不與草木俱者乎老人曰子盍為我賦之豫曰嵗晏溪山蹤迹孤一生心事在西湖髙風古調無人識贏得丹青作畫圖又曰茆屋短簷白日斜小橋流水見踈花乾坤清氣無人管盡付西湖處士家老人囅然曰子知我矣取酒酌豫謀相與共賦之忽雀噪庭樹而夢覺矣豫顧從者曰南湖之上有梅野乎曰無之然則適者之夢殆侍御公所謂梅莊者耶因稍次苐夢中語以復之公報曰梅莊之樂子分我矣題陳節婦傳後邵子曰死天下之事易成天下之事難豫識古列女傳見諸貞節婦死於其夫者往往有之至於相其夫以保其家而使其後益振則不多見焉今觀泉州陳節婦當盛年時夫既沒舅姑繼逝夫二弟未髫齓而其孤在襁褓方是時節婦一轉足則無李氏矣顧能以貞節自勵葬其夫與舅姑撫夫之二弟至于有成鞠其孤傳於其孫汝嘉竟以科第顯是可謂能成天下之事者矣於呼是豈特婦人女子所當法哉題張大參廬墓八咏册居喪廬墓其禮之過乎廬墓有所歌咏其哀之過乎昔人云喪與其易也寧戚是廬墓亦戚之至也又云長歌痛於慟哭是歌咏亦痛之至也世之論禮於人往往不求其情而觀其迹不知瞻奉几筵者或有忘親之心戀慕山林者或有懷親之意嗚呼此瑛觀大參張公廬墓八咏不敢輕致議於其間也題如此軒豫治廣德之明年作東園書室旁闢一軒為棲息之所客有坐軒中者曰居官持已固宜直方然亦宜稍迂廽以順適于上乃有容豫曰世固有直道事人而為人所棄者有枉道事人而為人所取者然為人所棄者而天喜之為人所取者而天厭之一得天一得人輕重何如耶客曰子自信如此其能起乎豫曰不能也因題其軒曰如彼則起如此則止寧可如此不可如彼題德威堂豫書滿北上節判王君大書德威字扁于州署豫歸而善之且為之説曰君子為政有德則民愛之有威則民畏之然所謂德非小惠而所謂威非淫刑也亦曰正體統立紀綱德敷於下而不為偏頗則民愛之矣定功過明賞罰威行於下而無所茍免則民畏之矣夫德者公也威者信也公則恩溥信則令行此君子為政之道也舍此不務則非吾所謂德威矣題資善堂屏門漢董子言觀天人相與之際可畏於呼是誠可畏也蓋其為報毫髮不爽因推其説勒于屏門曰天心好善而惡惡人立心造行務須湊合天心今日為善明日為善始終為善與天周旋則天與之矣今日為惡明日為惡始終為惡與天背馳則天棄之矣天之所與其興也勃然天之所棄其敗也歘然吾閲世多矣凡忠君孝親濟人利物日為善如不足者其後多昌凡欺君悖親傷人害物日為惡如不足者其後多敗是不亦為可畏乎知其可畏則不待驅迫而趣於善矣凡我子孫宜用刻骨題嘉魚李氏義學嘉魚有士族曰李氏李氏先世曰宗儒宗儀宋慶厯間相與建義學于其所居西保湖西以待四方學者建炎亂學廢慶元間其孫貢元名桂者復之縣判云鄉校不存家孰獨著此難事也今新修縣志載其事特詳𢎞治辛亥瑛以鎮逺知府書滿歸宗儒某世孫承箕來謁為説甚異最後請曰先世義學願有言承箕字世卿嘗取鄉第矣近遊南海從陳白沙歸遂欲居大崖山以老其説以為靜極則心虛心虛則理見故視六經若土苴視形骸若仇敵視聖人所立禮義之防若纒束捆縳欲徹去之白沙豫友也二十年前同在都下瑛見其神清氣完心地定疊往往以其靜觀天下之動竊以為古閉關人也今世卿從白沙不知此意果出白沙否果出白沙則吾盡已之説矣聼世卿擇焉瑛聞人心無外聖人靜有以立天下之大本動有以行天下之達道由體及用一以貫之自餘為學皆由博以及約博者萬殊也約者一本也求諸萬殊而後一本可得既得一本則所謂萬殊者亦可推此以貫之矣瑛請得以言其功程次第蓋始學之要以收放心為先務收放心居敬是已蓋居敬則心存聰明睿知由此日生然後可以窮理窮理者非靜守此心而理自見也蓋亦推之以極其至焉耳孟子曰萬物皆備於我矣此言人心無外也不即物以窮理其能靜此心之體乎故自性情之微以及形骸之粗自食息之末以及綱常之大自六經之奧以及天地萬物之廣皆不可不求其理求其理謂求其自然與其當然又於自然當然求其所以然積纍既多自然融會通貫而於所謂一本者或自得之矣一本固非學者所敢言然聞之中庸有曰喜怒哀樂之未發謂之中又曰上天之載無聲無臭至矣此譬如榖種雖曰塊然而根苗花實皆聚於此又如雞卵雖曰渾然而羽毛嘴爪皆具於此及其發見於行事在聖人則體用一貫在學者未免差悮蓋在已者有所拘蔽故所發不無偏重之殊在外者有搖奪故所施不無遷就之異然而既見本源則於處善亦安循理亦樂至於患難事變雖以死易生亦甘心為之矣此聖學之大略也今夫靜坐不相與講學窮理果足以立天下之大本乎果足以行天下之達道乎因記官禮部時嘗夢入僧寺見木案閣古書數帙取視之皆言動靜有無豫曰子靜云何僧曰吾所謂靜與儒同靜無而動有也豫曰是惡得同儒於靜言無雖無而實有也惟其實有是以見諸用也天髙地下萬物散殊不可改易子謂無則直無耳吾知其見於用也天可以為地地可以為天雖欲不倒置不可得也時白沙在側白鬚而朱頰豫質以僧言笑而不答此事嘗書以寄白沙矣今世卿論學與瑛異復欲得瑛言故備書之以附義學諸題跋之後世卿謂何白沙謂何觀冒有恆太守所藏黃石公像黃石翁識得一幾字子房用之以佐漢祖卒定天下蓋幾發乎此應乎彼者吉凶存亡係之矣此畫武昌大守冒君所藏相傳趙孟俯作按良本傳曰圯上見翁後遂不復見後過榖城得黃石以歸而廟祀之及卒與俱葬未嘗言其狀貌何如此畫貌深而思逺冠服翛然非塵埃中人也亦可謂得其狀矣冒君宜珍此冒君宜珍此𢎞治辛亥莆田周瑛觀于武昌舟中題花蕊夫人宮詞後右宮詞花蘂夫人作按灌志夫人灌縣人姓費氏陶九成又云蜀青城山人姓徐氏以才色入蜀主孟昶宮中所作宫詞凡百首國破流落無存此二十八首宋王平甫録入三館者今見灌縣志中皆述當時宫中事觀其所述極言龍池鳯苑之盛離宫别院之多中間燕賞遊幸之頻數張設供具之侈靡打毬走馬之戲樂採蓮鬬船之諧謔題詩寫字之誇詡其相與周旋者皆宫娥也每月給買花錢宫娥近數千焉吁奢淫至此可謂極矣吾於是知蜀之所以亡也費氏讀書能詞章其材可謂高矣一旦國亡身虜不能以禮自裁委身他姓誦詩後庭亦可醜也宋太祖近代賢主削平僣偽而乃奪人妻妾以為已有此盛德之纍也故吾讀是詩而竊嘆夫三失德焉吁可以觀矣可以戒矣讀楊鐡崖古樂府樂府始於漢惟二侯章其詞壯浪餘皆意氣和平淵永想當時被之管絃必雍容和美令人心醉鐡崖生當叔世才俊氣逸外感內憤漸入於戾此詞可謂工矣然施之樂府不幾於北鄙之聲乎鐡崖囿氣化中不自知也當時顧亮張憲李費輩皆在門下使稍知風雅餘韻必不更求崛竒以勝之矣讀釣臺集漢嚴子陵事史家濶略故人皆識不破近讀嚴州府所刻釣臺集凡為論説纍數十家皆各自為説終莫能得其心也豫竊思之子陵蓋世之豪也其志有所主矣當西漢末士大夫習讇成風無復禮義廉耻及王氏篡國有如歆如雄者皆附之子陵恨不得上方斬馬劔斬諸邪佞而以其高潔之心孤特之操剛大不拔之氣橫當其衝欲以銷其變使天下後世復知有人道之大間此子陵之志也世祖少與同學及即位思其賢物色以求之既得之澤中使者凡三往而後至其至也帝館之北軍給之床褥大官朝夕進膳陵視之若不知焉侯霸何人乃遣使奉書欲屈致與語豫謂此帝使之也帝欲觀陵去就姑以是試之意謂子陵來則漢廷卿佐也不來其霄漢冥鴻乎子陵得書不報但口授使者曰懷仁輔義天下説阿諛順旨要領絶蓋上句欲霸弼東漢之新治下句欲霸絶西漢之故習其辭可謂直其禮可謂倨矣帝聞之即日車駕幸其館蓋知子陵不可屈故就見之帝入館子陵卧不為起帝曰子陵獨不為故人屈耶陵曰士各有志何故相迫夫帝萬乘之主也子陵視之即前日舂陵之文叔耳此其精神氣魄上摩霄漢不待舉足加帝腹而後來太史星象之占也帝知子陵不可屈獨念夫諌議官者天子所與計天下國家安危者也陵有志天下事其或以是留哉殊不知子陵之志何在其所以幹旋世道者何在顧肯猥就臣僕隨事論事補塞罅漏而已耶此子陵所以終於去也當時侯霸不知子陵固也世祖故人亦何不知耶世祖不知子陵固也後世賢人君子凡天下事皆推見至隱又何不知耶豫見子陵自言曰士各有志因推其志以著其説讀劉靜修渡江賦渡江賦者元處士劉駰作也元將伐宋駰作此以朂之中間設為淮南劔客相與論難其所以審地勢計攻守度彼我之情狀無不曲盡可謂長於料事矣然求其所以問罪不過曰郝翰林奉使南朝九年不還而已考其論列用師不過以元之強足以制宋之弱而已愚讀其賦竊有疑焉昔湯與葛伯為鄰葛伯稱無犧牲不祀湯遺之以牛羊葛伯食之又稱無粢盛湯使人往為之耕葛伯殺童子而奪其餉湯於是乎有葛之征南朝拘留北使固有罪矣然考其事乃謀國不臧者搆成之也吾聞世祖初立也遣江湖荆淮宣撫使郝經充翰林學士使宋告即位且尋鄂盟以講好息兵為事時有王文統者忌經乃遣季壇侵宋以撓之其侵宋者王文統也世祖不知也先是世祖為皇弟攻宋鄂州宋遣賈似道援鄂會元帝文宗崩世祖入正大統因與講和以去似道攘為戰功盛稱于朝及經來似道恐敗露乃幽之真州不使入見時宋理宗年髙亦不知也然而元有敗盟之舉宋有啓釁之端皆羣臣搆成之兩帝皆不知也駰儒者也何不即湯與葛之事勸其君乎何不暴白彼我情罪使有歸乎夫滅人之國大故也主張用師儒者大作用也豫讀湯誓有曰夏王卒遏衆力率割夏邑其民皆曰時日曷喪豫及汝偕亡此湯所以伐桀也又讀太誓牧誓有曰商王受力行無度播棄黎老昵比罪人又曰商王受弗敬上天降災下民焚炙忠良刳剔孕婦又曰商王受自絶于天結怨于民斫朝涉之脛剖賢人之心此武王所以伐紂也駰請詢之南人宋君有一於此乎又詢之北人宋君有一於此乎無一於此而伐之不過利其土地人民而已非商周吊民伐罪意也又何必昌言之哉愚竊以為是時宋有天下半西自川陜南至交廣東至江淮閩越皆尚宋有使得人以主軍國重事用文天祥計分天下為四大鎮號召豪傑相與掎角我勢大而難摧彼力分而易制元雖深入未必盡得意如駰所料也駰學孔孟者也性地髙潔識見踈朗凡所議論皆高廣深逈雖雜詩亦然豫欣慕之獨于此賦竊有疑焉豈其居夷既久雖有春秋之義而不知耶或不欲以酸腐自居而假此以彰其迹耶抑駰所見所言皆是而豫所致疑者非耶此窮理一事姑著其説以俟知者讀吳草廬年譜按年譜草廬為宋舉子而仕於元評事黃仲昭曰此譬如人家處女雖已受聘而未成昏改嫁可也豫曰此君以草廬為有道之士強為分疏耳夫人進學有先後聞道有蚤暮而前後是非不可以相掩也草廬晚年進學未易窺測若舉平生言之豈能每事盡善哉宋非桀紂之暴元非湯武之仁一旦奪其有而據之雖異世聞者猶有所不忍况在當時沐其清化者乎况嘗受其禮聘將與謀天下事者乎同年周時可曰吳文正以草廬自號且仕元之日淺有以哉讀陳節判纓詩集豫嘗謂詩有景有情有事景真情真事真便為佳作如集中送鍾太守東行詩云洞庭秋色晴看鴈揚子江聲夜聼潮此景真也中秋與徐判簿酌别詩云月色無如今夜好人情誰似故鄉親此情真也中秋後一夕彭郎載酒來訪詩云昨夜中秋玩月時此心暗與故人期故人今夜能相訪月色還來照酒巵此事真也如此之類皆是佳作唐音和平佳作大略似之唐音所以和平非徒作多蓋由學博材巨拈得來便應手耳和平未易學才學和平便易低弱稍加振迅又覺突兀其要在積學養氣及善用字以調和之耳此據豫所見而言髙明以為何如觀石林書院題署宋葉公少藴知撫州日建石林書院講明正學今廢久矣其裔孫菶等相與重建之嘗請豫作題署豫倥偬中為此不自知其工拙何如也今豫改郡鎮逺道出石林因登書院拜少藴公新主見題署楣宇間不覺為徘徊瞻眺者久之夫神雋出竒豫不多讓古人然勢過險迫少雍容和緩態則又其病也昔人謂字為心畫觀此則豫改郡以去夫豈自外至哉觀南康太守郭公瑨受誥勑圖受誥勑而備録其詞昭君貺也得君貺而昭宣之示不忘也古者臣子受君䇿命皆勒諸器以藏諸廟如詩所謂作召公考天子萬夀古器物銘所謂用作朕皇考龔伯尊敦用蘄眉夀萬年無強是已今南康守臣瑨初為同知青州府事善於其職至是天子授以誥勑瑨既拜手稽首以受之矣又備録其詞作為巨册如古勒器物云者蓋將使其子孫覽是册而知乃祖乃父居官謹修職業不敢廢墜如是又知國家所以寵賚臣庶不茍如是則夫思所以紹述之者其容以自已乎其所托逺矣題族子叔高勿齋册族子叔高既領鄉第謁豫臨汝歸請豫題其所謂勿齋者豫曰子知勿之為義乎説文謂勿州里所建旗也一柄三斿所以趣民者也子之為學亦慎其所趣哉蓋趣吾心於道義則於道義歸焉趣吾心於功利則於功利歸焉此二者王霸所自分也而所以趣之者以志為主然學之弗慱擇之弗精守之弗固則此志不知所主固有捨夫道義之正而趣夫功利之私者矣子其慎之乎吾祖宗積德多年子孫宜有興者子為學誠能正其志以慎其所趣則他日論人物於吾周氏孰不曰吾子賢畫評浙人王宗輔以畫求評豫曰畫種類多豫未能遍識但以豫學書法觀之粗得其槩凡書先觀其點畫次觀其結搆次觀其變化有點畫而無結搆不取也有結搆而無點畫不取也有結搆有點畫而無變化不取也上焉者神與天遊不假模倣自有真趣次焉者點點畫畫模放他人神氣不足下焉者不知而作自謂得之去書逺矣畫家法為説頗多以此求之其庶矣乎宗輔未達豫曰皴皵塗抹字點畫也安排布置字結搆也將濃而淡將顯而隱字變化也知此思過半矣饞戒吾官鎮逺嘗睹於物得三戒焉虎性饞不擇肉而食有羊牧崖上虎攫之羊負痛墮地死虎隨之虎墮地不死而重傷焉竟為鄉人所斃蠍虎亦性饞蝎虎緣壁行入燕巢以食其雛雛負痛墮地蠍虎隨之雛在地飛躍家人為送入巢蝎虎不能動雞食之蟻亦性饞凡物有大於已者皆負致以行務入其穴乃止有蚓出穴蟻羣嘬之蚓負痛宛轉泥沙中卒莫能制蚓鴨出欄并食之夫虎貪食羊不知羊死而身斃蠍虎貪食燕雛不知燕雛得全而已不免蟻貪食蚓不知與蚓并為鴨所食嗟夫利者害之所伏也得者喪之所倚也為饞不已者可以戒矣翠渠摘稿卷四
