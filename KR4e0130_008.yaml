body:
  text: 翠渠摘稿卷八續編明周瑛撰文昌祠說今天下郡縣學多建文昌祠祀所謂梓潼帝君者守正之士嘗撤其祠矣然未有明白著說以辨之者考天文志斗戴筐六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災占天者謂文昌六星乃天六府主集計天下事又司祿主賞功進士考周禮大宗伯掌天神以槱燎祀司中司命說者謂即文昌宫第五星四星也由是觀之則所謂文昌宫者指天星而言所以祭者則𨽻於大宗伯也今夫文昌宫正中而坐者為梓潼帝君帝君左右二童子曰天聾曰地啞相傳帝君判天祿二籍職貢舉天聾口得言而耳不得聞地啞耳得聞而口不得言故其事密祕又有九十七化書謂帝君所作大都竊吾儒之緒論飾異端之邪說詞人學士不知其妄爭祀之吁亦惑之甚矣夫道莫正於孔子而人之為學莫先於孔子孔子曰死生有命富貴在天所以教人定心志也又曰言寡尤行寡悔祿在其中矣所以教人修人事以聽天命也漢董仲舒對江都王曰正其義不謀其利明其道不計其功論者以舒為學得孔門正路以其知聖賢所用心也今方建學校以講明孔子將欲使學者翕然趨之顧乃祀怪誕無稽之神而導以奔走利祿之路其可乎愚謂得全璞當毁碔砆種芝蘭當鋤荆棘孰謂孔氏門墻而此淫祠可無撤也鬼說有鬼乎曰無鬼也色如削瓜臯陶膚如植鰭傅說身如斷菑周公首如蒙倛孔子以上俱見荀子此其人死且數十年鬼貌怪形人無見者無鬼乎曰有鬼也介而行披髮而踊豕立而人啼向王以射王伏韜死其事甚怪也然則鬼有無何居曰人之生也泊乎其氣耳氣聚而生氣散而死散而未盡而祟興焉蓋氣盡而死者魂歸於天矣魄歸於地矣祟何從興故臯陶傅說周公孔子死不為怪者氣盡也氣未盡而死者魂升而沉魄降而滯故鄭伯有趙同公子彭生周大夫杜伯死而為怪氣未盡也然則無鬼者其常也有鬼者其暫也雖曰暫有終化而無君子謂之無鬼可也震雷說成化癸巳春州民有震死者或問曰雷有形乎曰無形也無形而震者何也曰陽决也陽動而隂靜陽闢而陰翕二者其性相反也惟其相反而不相得故其勢相持如仇然於是動者欲出而為靜所制闢者欲散而為翕所拘故陽挾隂以行飛走振迅動蕩盤薄或左或右勢無定在久而隂負則陽决矣陽决剛之至也遇木則木折遇石則石裂遇人與獸虀粉矣雷何擇於木石人獸也哉遇其决耳曰雷無形而人拾得雷斧者又何歟邵氏謂星與雷皆石氣也星殞於天而化為石雷震於地而化為斧皆石氣也雷何形哉續修族譜序𢎞治丙辰歲瑛奔太宜人喪至自蜀越明年丁巳吾族遁菴兄偕諸弟姪奉牒以來曰譜所以紀世也吾家世綿而譜逸周之故無考焉此譜正統丁巳歲錦衣府君在官所修者舊而未續韓子言十日十二子相配數窮六十自前丁巳迄今丁巳六十數窮矣易謂窮則變變則通敢以此譜纍子謝曰瑛不孝禍延先妣方以不自死滅為恨安忍他圖衆則曰譜上係祖宗下係孫子子必勉之瑛悽然以思已而俯焉以聽因記童兆時嘗録譜牒以奉先緒苦不得其要領比長讀從祖守約齊遺書得壺山翁先世紀事始知舊譜而逸者尚多也按紀事周氏唐固始人系出周平王别子唐末盜起周氏有從雅翁者與王潮兄弟同里閈厚相結納保障鄉里嘗柵梅林以扼盜衝翁料事多中潮因呼為梅林獨識及潮得閩泉州刺史翁謀依潮筮之吉乃以光啓三年入閩潮見翁喜授宅里於泉州仙遊縣之東鄉翁治居第有堂有廊鄉人將上堂必先上廊因呼上廊周氏自梅林以下尚數世有紀凡此皆舊譜所遺者乃合而修之其目三一曰譜系譜系分上下上書入閩以來諸祖下書遷清浦以下諸祖其二曰譜識譜識摘書列祖之梗概以存故實其三曰譜翼譜翼以義起蓋以譜識簡略不足以盡事故别為譜翼以足之也譜翼分內外集視事輕重各以類從既成思與諸賢哲更相確正不幸而太守鶴州兄先逝而不及見憲使姪歸共校而未終踰十餘年曽姪孫侍御君以母喪起復乃考校前譜系所未系譜識所未識其譜翼分為前後者各以類修補之又考宦譜紀事與譜翼並藏於是周氏譜稱大成焉嗟夫修譜以紀事為先而譜識譜翼所以録其事也思其人而願見其事則於遺事致詳亦宜也記謂父祖有善子孫不知是不智也知之不傳是謂不仁然則吾譜之修其仁智之道哉嗣世君子宜領此意自撰蒙中子壙志䝉中子興化府莆田縣人姓周氏名瑛字梁石自謂學無所就其中蒙故號蒙中子又喜賁上九敦尚質素不為華僞學而未能號曰賁道人又與族人鑿渠種蓮以居號翠渠翠渠之號頗行於時曽大父諱驕字正甫大父諱世字顯庸父諱舉字尚哲贈知州母潘氏太宜人家故民籍洪武初以備倭改戎籍知州公執戎鎮海生豫與二弟曰環曰頊豫年十四挈歸莆依叔父諱從以居從贈刑部主事朱公昱御史葉公巒繼從儒士吳公時耕繼而往反莆漳間與溫陵陳剩夫相過從談程朱之學嘗以書抵剩夫云人有古今心無古今三皇五帝之道期以海澨見也景泰癸酉以衛學生薦於有司與族子轍同時取鄉第成化己丑登張升榜第二甲進士又明年辛卯出知廣德州三年今都御史侣公鍾時為御史按部南圻上豫治狀詔核實父母妻室俱受封庚子冬遷南京禮部儀制司郎中三年赴吏部考核未到遷撫州知府先是族兄瑩亦知撫州人因呼為大小撫州云豫初有大志敬盡讀天下書以觀斯道大全而求夫子素所謂一者期以年過四十始仕既而都指揮桂同知鎮海事督戰莆田識豫諸生中呼知州公前曰有子在家何不蚤圖為門户計知州公以書趣豫於是始泊沒塵途而初志為始奪所著有經世管鑰字學纂要祠山雜録周氏家語閩川稿桐川稿臨川稿金陵稿金臺稿若干種藏於家凡平日居官行已俱無足述但頗知畏天命凡事每自檢於心以求合於天則恆自喜曰此吾學之得也初娶鎮海衛陳氏繼娶同縣吳氏皆封宜人子二長大櫟娶同縣按察使林公坦孫女次大謨聘南京吏部尚書陳公俊女女七象峰邱謙冲溪王珊其壻也龍門林近龍龜塘廖奇逢後吳吳世楨吳天光乃其所許未婚末女尚幼成化丙子年五十七故莆倅張公哲過臨汝謂在莆田嘗禱雨壺山絶頂見有地可卜藏豫疇昔愛山每躡屐登髙往往有翅視八荒蟬蛻下土之意聞倅言喜曰是可以授我矣因遣人經營其地且先自叙邑里世系履歷以授諸子曰我他日棄諸子諸子無妄費金帛粉飾吾事以誣天下後世但納此諸幽使他日與吾戚者有以掩吾之遺可也且勒石之銘曰氣聚吾生兮氣散吾死聚散常事兮吾何悲喜人授吾地兮壺山之巔屹立萬仭兮摩於青天中有靈湫兮我其司汝鞭笞靈物兮為雲為雨愧無利澤兮遍於八荒願藉杯勺兮以澤我故鄉翠湖雜咏翠湖吾周氏聚族之所暇日擇其入題目者十有四事各賦詩以紀之所以存吾家之文獻也我愛主人家溪流帶屋斜得詩曽夢草對譜旋栽花養鶴汀洲近家與鶴洲鄰棲鸞枳棘賒有孫能作賦躍馬入京華右小溪玉帶人間少吾家有此溝天門從亥入地户向坤收夜雨書燈亂春雲墨汁浮行看好孫子應䜟步瀛洲右玉帶溝宿墨洗初罷春雲驚滿池暝分天色淡寒逗日光遲鷺下應先覺魚遊渾不知學書憐未就深愧漢張芝右浴雲池有露濃如酒瀼瀼降此洲八年曽兩結十日未全收月映祥光淡煙籠瑞氣浮平生看墨本此處識天休右甘露洲佳樹列門前栽培自昔年舊根龍偃仰老幹鶴蹁躚影礙半天日翠分十畝煙季孫宫裏賦應可續韓宣右水棉樹湖上無多地分明見秀峰晚烟含紫翠春雨長蒙茸九華應爭秀五侯欲並雄他年問何有百尺看髙松右芙蓉峰獨向髙堂坐清風問伯夷不知孤竹國何似首陽芝布被暖如纊藜羮甘若飴人生各有志吾自得吾師右清風亭養鶴向江洲每憐江事幽沙鷗同入社野鶩避回舟夢落松巢冷路分鵬背秋好詩滿人世燈火為重篝右鶴洲渠水映柴扉春深可染衣天光帶雲影魚躍間鳶飛世路塵埃逺道懷聲利希蒼苔滿白石獨坐對斜暉右翠渠改屋以為亭昔人疑亦曽笋芽穿壁入菌茸傍欄蒸晝卧雲為幕夜吟月作燈許多幽勝事欲賦愧未能右昔曽亭川中何所有榆樹正扶疏日色晚來好秋隂濃似初官閒分子祿身健課孫書更擬門前地容停駟馬車右榆川養鶴人何在北園空此亭樹當原座緑草傍故階青近水長橋卧小山怪石層好詩吟未就落日滿疏櫺右水雲亭花草交前院亭居背夕陽晚來宜杖屨老去可壺觴烟合山光紫霜寒月色黃久飛吾亦倦思與共徜徉右宜晚亭蚤依翠湖住晚傍翠湖歸天地一亭小功名兩鬢稀春雲鳴社鼓秋雨暗魚磯俯仰全無事吾心已息機右歸來亭和兄鶴洲延緑堂諸公作亭內幽芳手可拈亭外緑隂分四簷主人出去雲在榻獨客行來月滿簾佳禽四五似相語小竹二三初放尖自古天公惜清况賞心樂事誰能兼和水雲亭諸公作此心何處洗塵埃家有小亭渠上開山雨未收雲尚濕江楓欲落鴈初來食蓴偶並季鷹駕對菊思䘖陶令杯最喜賞音人不逺小航頻到鶴洲回題歸來亭天地孤亭小江湖倦客歸不圖鐘鼎食來試薜蘿衣鷗鷺波濤濶風雲聲跡希世情方起滅吾自息吾機題環璧亭亭外水如璧僅容一杓通蘋風秋瑣細蒲月夜玲瓏坐卧皆天上往來疑鏡中主人原㑹賦收拾若為工本傳附録鄭嶽周瑛字梁石號翠渠以鎮海衛學生應景泰癸酉鄉薦主司聶大年得其文大奇之置詩經第二屢上春官不第乃益泛濫羣籍務鈎深探賾與南海陳公甫遼左羅克恭上下其議論且相期以退隱為髙第成化己丑進士知廣德州倣古為治興文教絶淫祠表死事之忠而嚴不舉女之禁教民有録祠山有辨廣德人為立生祠事之滿九載升南京禮部儀制司郎中又三載升撫州知府興水利著政本第輸納著政均力行保伍之法豪右以為不便調知鎮逺因俗為政不鄙其民以書滿歸省母孝廟初三原王端毅公為吏部即家起為四川參政尋轉右布政使丁母憂服闋乞致仕給事楊亷吳世忠交章以學行薦吏部覆奏起用堅以引年請乃晉階榮祿大夫致仕瑛丰神􅋯古其學不專於該博而於天文地志造化物理皆嘗究心體索為文章渾深雅健有根柢詩格調髙古字畫初學晦翁變為奇徑應酬至老無倦意所著有經世管籥律吕管籥字學纂要詞學筌蹄地理蓍龜晚年尤注意周易參同契作本義屢加刪定詩文有翠渠類稿若干卷所修有廣德志鎮逺府志蜀志漳州府志又與黃未軒同修興化府志議論間有不合自謂莆陽拗史云卒年八十九先是壺山石墜意必有名士當之既而瑛卒平生急義祿入以給內外朞功之孤貧葬其不能葬者十餘喪不計其家有無沒未幾家益落子大謨博學能文以詩經魁禮闈告歸終養亦繼卒翠渠摘稿卷八
