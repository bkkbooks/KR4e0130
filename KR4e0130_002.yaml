body:
  text: 翠渠摘稿卷二明周瑛撰序都門送别詩序士不親師友不足以成其學夫學之於人大賢以下所不廢也然不親師友則聞見不博聞見不博則是非靡定是非靡定則無以求至當之歸而為應用之地雖曰從事于學亦憒憒而已何成功焉萊陽宋生孟清今浙臺憲副景章公之長子也憲副公為侍御時呼孟清入委以幹蠱孟清奉其父命周旋既而自奮曰玉不琢不成器人不學不知道吾可以不學乎乃斷于心定謀于所知請于其父詣吾廬而委禽焉時豫舉進士禮部未就從豫治舉子業者頗衆孟清日與同輩偕作止晝講吾前夜誦之齊中積習既久而漸有得其始也如泉在山其出蒙䝉焉既而委積洄洑其止溶溶焉今則决决而流汨汨而逝汰沙澄泥將為波瀾有可觀焉循是而往疏導益深流行不息安知其不為長川為巨河為滄溟浩渺而不可測者乎第恐其閼絶淤塞而止耳惟嵗初暮白露在郊孟清去京師遊于其鄉將以應有司之選矣夫朝廷取人惟其材有司論材惟其良不修乎已而應乎有司謂之不知務應乎有司而自以為必得謂之不知命應乎有司而或得之不以為開導輔益而謂已之能謂之不知有師友三者皆非也孟清毋擇一于是哉戒行之朝二三子賦詩為别豫為之序贈倪廷瞻知懷慶府序成化庚寅冬海鹽倪君廷瞻以庫部主事出知懷慶府既受命乃治車馬戒僕夫問道而南將赴所治以奉揚天子威命于是庫部郎中王君尚忠合諸同官張宴于公署以飲餞之俎豆既列主客就位笙歌間作獻酬有序及旅王君言于廷瞻曰文夫官至太守亦榮哉環千里之地而君長之出則武夫前呵騶從塞途入則垂縉紳綰印綬坐于公堂以號召境內蓋古諸侯比也敢以是為廷瞻賀然而懷慶大府也太守長吏也部使者行郡凡諸政事惟長吏是問而下邑諸大夫凡政有未平事有未决者惟大府長吏是咨故一舉措失宜則上懟而下侮又不能不以是為廷瞻慮進士周瑛曰天下事常以賢者理以不賢者敗九折坂稱破車而使王良御之則無虞三峽水善覆舟而使三老渡之則必濟懷慶難為未聞如破車之坂覆舟之峽也以倪君往果足慮乎子請言倪君之為人也其外徐徐其中于于不偃蹇以傲世不閹媚以狐趨是所謂循良直易君子也以君之所藏而發泄乎大郡出其謙恭以事上而上恱其禮出其仁恕以臨下而下安其政若夫簿書期會之煩不過一翻覆手而治耳君知大府是方可賀又何慮焉於是凡在宴者皆謂豫知廷瞻既徹遂書以為贈送黃郎中還南都序豫讀西漢書見班固叙司馬遷為郎中奉使西征巴蜀南略卭筰昆明還報命天子乃又述其少時遊觀之壯纍百千言不止豫竊疑之夫天下事見于載籍而其理具于心求諸心考諸載籍則體用備矣何有于游觀乃得焉及見經生閉户探討出而與事接往往抵牾間有走四方習知天下事者引而置諸煩劇皆有獲豫始知人材雖俊美而學雖工不歷試諸難終不足與理天下事也臨川王君吉紹朴茂君子也少讀書擬峴臺下蓋嘗考諸載籍而求諸心矣既而領鄉書入試春官取甲科拜行人司左司副間嘗持節走四方涉汶泗下江淮浮沅湘西入關中登華嶽東望中州諸形勝如漢司馬遷少時之為者用是歷觀天下事凡風俗政治民艱吏隱與夫踈外細微諸厄塞狀靡不通究及為屯部郎中于南京或以繁劇難之君到官出其同異而參互之事皆以次就緒工作不虧器用備具上下相安人心胥恱滿三載竟以能吏稱信乎旁涉世故而有益于天下事也今君報命天子將領牒去舊時諸僚友皆相與飲餞之吾不知酒半亦有輟酌而問為官之道者乎凡舉甲科者注行人皆不恱殊不知吏以能稱自此始也試問之黃君必有說焉贈馬君知姚安府序成化十七年春正月天子開明堂以朝諸侯大行黜陟之典以勵庶位用利益于生民于是以南京户部郎中馬君自然知姚安軍民府考輿地志姚安南去京師萬里在唐宋間為蒙氏假氏所據職貢不入天子委之我國家受天明命薄海內外罔不臣妾而姚安入職方列聖相承務懷逺人長吏皆廷命而其佐則以其土之渠為之命下之日都邑人士嘗遊于馬君者皆謂馬君賢馬君有詩書文章宜處內地與文人秀士相周旋以陶成雅俗今奪此與彼非計也馬君聞之曰諸君夷姚安乎夫華而夷習華固夷也夷而華習夷其不為華乎姚安有官府以明政刑有學校以修教化民知貢賦徭役以服事其上加以聖天子在上仁風義聲披拂寰宇凡有血氣莫不尊親則姚安雖逺固內甸比也于是日講求所以為治與教者大小節目罔不備具其意不以姚安視姚安而以中國視姚安也或聞馬君言而疑之豫曰子不見夫為豸戲者乎養羣蟻竹筒中鼓而出之令左右陳蟻繩繩乎各就部署若孫武子之行三軍也夫蟻非可以言語教道也不過因其欲而道之耳姚安雖逺皆吾人也馬君又知所以道之政其有不成乎他日馬君同官王德孚輩請贈言因述是以歸之且贊其往馬君內江人其諸父兄弟同時登進士第者五人馬君在户部三遷至郎中皆有能聲為人外溫內通蓋達于政云鳯臺餞别詩序士有生同時不相見曠百世而相感者有居同里閈不相顔面越數千里而相從者是何近者踈逺者親今之不從而古之是與耶蓋情親于其心之所同跡乖于其行之所異方其同也千載一時四海一人及其異也雖肝膽口鼻猶不能以相命况其他乎豫為州日多接士士凡讀書好古為孔氏業者吾未嘗不延接之凡延接之未嘗不盡恭故吾門未嘗一日無士而士亦樂于見吾也成化丙申州文學掾賈君汝陽佩部符以來或賀汝陽曰汝其得賢主人乎謂豫能禮士也或又賀豫曰子其得賢掾屬乎謂汝陽賢士也汝陽越産少侍父宦遊國學國學多聚古今天下書而六館諸生亦多一時賢俊汝陽出與諸賢俊遊退取國學所有書而讀誦之故汝陽學最博而識見亦往往疏通不迂腐與豫論秦漢以來事皆能舉治亂成敗之跡而究其所自與論六經奧義皆能發其疑而揭其要與論魏晉齊梁以下諸家詩皆能辨其體裁之異其平居亦往往觀吾學而稽其所至窺吾心而究其所歸凡吾所為政民但由之而不知之汝陽則能察吾本末先後知吾用意之所存若汝陽者誠賢士哉故吾在州未嘗一日忘汝陽汝陽亦未嘗一日忘豫竊計吾二人者雖相去數百年之逺猶能以相感况同時乎雖相去數千里之外猶能以相從况密邇乎豫既入禮部汝陽思豫不置近自廣德來視豫相與處者浹月及去南京大夫士知汝陽者皆携酒殽來飲餞之因取漢詩今日良宴㑹歡樂難具陳相與分韻賦詩為贈豫將述汝陽所以來故輟為詩而為序送魏時敏赴無錫縣丞序韓退之記藍田縣丞廰壁謂丞位髙而逼例以嫌不可否事間有材者亦噤不得施豫竊惑之豈古之君子欲以渾默自居不與人抵牾抑其積習委靡而無以自振或退之别有所激而云未必盡如記中語皆未可知也我朝建官設屬大槩視前代而損益之故郡有縣縣亦置丞丞位出簿史上而處令下雖髙且逼未聞不可為如退之所云也豫鄉魏時敏初筮得無錫縣丞將領部符去而過豫曰有如韓公言丞固難為哉豫曰丞不難為第不善為耳夫縣之政若賦稅徭役教化獄訟盜賊無巨細皆制於令丞但佐令以行其事耳丞佐令以行其事而不得其權令得其權而所行或悖揚子雲論為陶剛則甈柔則壞不甈不壞而在於和使為丞如為陶則令不以丞為侵已令不以丞為侵已有所可則曰丞將以成吾美也有所不可則曰丞將以匡吾過也由是心不相疑而相信事不相反而相濟凡賦稅徭役教化獄訟盜賊皆可漸而理矣又何髙與逼嫌而漫不可否事也哉魏君學詩其達於政也必矣到縣請視事見有問者毋對松以哦曰豫方有公事子姑去贈張廷厚分教濟寧序三代之學皆所以明人倫也而辭章無與焉自聖王不作而天下好華於是進末學而黜行檢尚浮說而輕本實雖稱代不乏人一旦遇有變故往往臣棄其君子棄其父綱常不立人道大壞使夫英雄豪傑之出雖極力營救而不可收拾以歸於盡然後已此豈人之不如古哉教化之不明也昔我髙皇帝受天明命肇有區夏思得真才實德與共守之故於學校罷詞賦之習重經義之典且降詔㫖務使學者以禮義廉恥為心孝弟忠信為行其為世道慮至矣歷世既逺不知聖意所在故師儒之所訓誨者文藝也有司之所督責者文藝也科目之所奬録者文藝也於是末學勝而行檢虧浮說興而本實廢人材踈放風俗壞爛而不足以副聖意所求者蓋有繇也山東大州曰濟寧古稱其人務耕桑而俗朴野今亦浮靡剽悍不可以訓吾閩張廷厚分教於是焉廷厚亦審髙皇帝所以建學教士之意乎而其大者在於父子有親君臣有義夫婦有别長幼有序朋友有信而詞章特發其緒餘也廷厚遊學校多年茲往為人師必知所以教矣廷厚知所以教則他日山以東有能建大功立大節以成天下事者吾其有觀於濟寧乎廷厚其勉之廷厚閩連江人也嘗以易經五試于有司不第其敦本之學出其從祖山西參議繼元公云都下蔡氏上夀序天之與人也恆嗇而不咸其不嗇而咸者天厚之也天固未易厚於人也其必積於我者厚則天厚之矣都下蔡處士仲斌其先合肥人𨽻赤籍入都下以居處士通物理識時變明白圭取豫之術而家以富生三子又操其竒贏而勾股之而富為加其孫五多讀書彈琴與賢士大夫遊成化丁酉處士偕其配沈氏年俱耄諸子思所以歡之乃張宴堂上而一時大夫士若侍御徐君用美章君士昻與凡素所往返者皆持觴以來酒初行諸君賀曰凡人不可以必富富不可以必夀夀不可以必多子孫今老人兼之矣敢以為賀處士謝曰天不棄仲斌使僭有多福辱諸君惠以嘉言敢不拜嘉飲盡觴止諸子又稱觴而進曰天之福大人者厚矣願大人推有餘補不足以濟貧乏而答天之富問疾病給醫藥以濟夭札而答天之夀矜老人恤幼稚以撫孤獨而答天之多子孫凡我若子若孫又當思所以嗣守庭訓迓續天休以期於不墜處士囅然笑曰汝曹之言是也吾雖耄願與汝曹共勉之又飲盡觴止是日也主敬而賔歡親安而子順休休乎其為福之成也他日其孫京遊廣德鼓琴豫所屬豫為上夀序豫以座中語為是也述以歸之思親堂後序上虞陳君文靖西逰臨汝視其從父弟同知君文耀會豫五峰堂蓋君少治春秋與文耀同筆研歷屈于有司不舉今老矣故其來也豫親焉他日君出其先處士府君所為思親堂卷示豫蓋序其事者自李文忠公時勉以下若而人歌咏其事者自曹殿元鼐以下又若而人君猶以為未也復求益于豫豫其能為君辭哉夫盈天壤間而為有生蕃矣有生而忘所自生亦蕃矣草木生於土而忘于土魚鱉生于水而忘于水禽獸生于雌雄牝牡而忘其雌雄牝牡蓋其心弗靈也其心弗靈而忘其所自生宜也若夫人則非其心之弗靈也非其心之弗靈而亦忘其所自生者何哉弗思耳惟其弗思則雖其心之靈亦與弗靈者類矣嗚呼人雖至愚孰肯自同其身於草木禽獸者乎處士去豫逺然仰推其意豈不曰親生我也養我也教我也生我固生也養我教我生之族也故凡一身膚髮爪甲親之餘也絲縷菽粟親之營也智慮才能親之訓迪也親為恩於我宏矣吾其敢忘乎昔者吾親在時吾堂以居之日率妻子左右為歡今親往矣而堂猶存也登吾堂不見吾親則凡所以繫吾思者其能以自己乎禮所謂思其居處思其笑語思其所樂思其所嗜固可謂善思而吾之所思又不但如記禮者之談而已也嗚呼處士惡人心之弗靈而不肯自同於冥頑之非類有所生而不忘所自生不幾自盡於人道者乎處士親既沒而堂之詩文爛如也陳君歸而讀之可不以處士思其親者思其親乎昔穎考叔食羮君所能以微言動莊公而復全恩於母子君子曰孝子不匱永錫爾類君治春秋知考叔事他日孝子錫類吾于陳氏觀焉和陶詩序昔東坡居士自謂於他人詩無所好獨好淵明詩晚年謪居海上乃盡和淵明所作淵明詩自居士後未聞有好之者好之者既鮮矧有和之者既好之又從而和之吾於吳君景輝見之矣景輝上虞人嘗舉進士禮部得乙科授太和縣儒學訓導有學績擢德安縣知縣德安故柴桑里為淵明故鄉君到輒作慕陶軒以居因號慕陶子且和陶詩以為樂比解官東歸而詩已盈帙矣豫嘗評其所和詩如處士入城市博衣緩帶濶步徐行不與輕狷子爭便捷態又如野人食糲飯草蔬清香迸牙頰而無腥膻氣又如抱古琴彈于通衢趣逺聲希人無聽者昔東坡自謂和淵明詩間得意處無愧淵明吾不知景輝自視亦有愧淵明否乎雖然詩類與不類未暇深論也昔淵明自謂性剛才拙與物多忤自量為已必貽俗患故為縣令八十日輒引去卒有以保其身全其名其達于世故審于自處晉世一人而已東坡蚤以才名動天下中罹橫禍晚斥逐海上幾不可生其精見獨識果淵明類耶景輝學陶者也已能奉身以求退矣豫才視淵明尤拙而剛或過之安得如景輝于清泉白石之間和其所謂採菊東籬下悠然見南山之句而不蹈東坡之故轍乎棣蕚懷春序豫讀古人書思見古人茍有其人則愛慕歆豔之若將與之同歸或其人名號不能登于史籍則私不自揆奮欲為之論述以信諸後此豫讀書好善之本心也㴠江林和恆肅一日詣豫曰吾父既逝吾母亦老而吾與季弟義皆少賴吾伯兄恆信仲兄恆遜相與左右厥家以煦育我二人凡衣服飲食為悉力營辦稍有知遣從里中師學及長為冠與婚不後時繼又遣和為邑庠生及資義入帥垣從事以圖所以樹立義嘗告和曰吾二人者不有二兄胥為地下土矣是父母生我一天也諸兄鞠我又一天也天之德不可名狀而為羽毛鱗介者可不知所自乎嘗製圖取周詩棠棣之㫖名曰棣蕚懷春又曰清江周君必能序述吾事宜往徴辭今不幸吾弟死矣而圖猶存也和懷吾兄之恩念弟之志不可以泯敢終以為請豫曰人性之中萬善俱足其近者曰孝曰友曰悌此三善者皆自人性中來而所以推行之者則孝又友與弟之本也豫嘗觀夫世之人矣凡愛父母深者于兄弟之情恆篤愛父母淺者于兄弟之情恆薄其有不知愛父母者則于兄弟漠如也子二兄其知所以愛父母乎子兄弟懷之其知所以愛兄乎吾聞天道好善而惡惡喜順而惡逆子勉之吾他日過㴠江有觀于林氏而知其族必大也超然宴處詩序龍可豢麟可縶鳯凰可以網羅取豫嘗求其故矣蓋麟鳯與龍皆靈物也然有形焉有形則有欲有欲則人得而制之矣若夫有形而無欲惡得而制之哉昔者孔子厄于陳蔡也七日不食諸弟子面黧黑憊而後興孔子絃歌自若孔子何以異于人哉有形無欲也孔子有形無欲則於富貴貧賤死生夀夭皆夷視之矣陳蔡大夫惡得而加諸非惟孔子凡知為學而能自絶于欲者莫不皆然台有士曰張煜字崇茂少讀孔氏書考其學所至實能制物而不制于物初崇茂逰邑庠既而與時不偶退伏田野乃能超然宴處而視世間事無一可動其中者崇茂嘗語人曰髙牙大纛坐立廟堂吾非薄此不為也是有命焉吾惡得而干之簞瓢陋巷裘褐不完吾非愛此樂為也是有命焉吾惡得而去之當是時崇茂同時友若先刑部林公一鶚與今制誥黃公世顯翰林謝公鳴治及吾閩僉憲林公一中皆接翅雲路聲華廣敷而崇茂方披簔執耒與樵童牧豎相周旋坦坦施施不自知其身世賤且貧也嗚呼若崇茂者不幾能自絶於欲求乎其學孔氏不幾為有得者乎使崇茂以外物動心則龍而豢之麟而縶之鳯凰而網羅取之亦無不可矣惡乎其為超然也哉豫未識崇茂曩在禮部時僉憲林公亟談君為人于豫且謂君恱豫文必欲得豫序其所類宴處詩文云者豫事雖棘紛重違君知因考其跡探其心而稽其學之所至以為之序敖使君和梅花百咏序梅為詩一賦百絶自馮海粟始一賦百律自僧中峰始近學詩君子皆追和之其思健矣新喻敖君氣完登成化甲辰進士尋以星變言事觸怒權貴貶竄臨西縣丞臨西沒於吐畨久矣君獨挈其妻孥以往日與大府帥講明周公孔子之道大府帥信之遂相與入吐畨正疆界責其供賦乃止又暇日從容文字間與處中州無異者𢎞治改元今上念君直臣乃徴為桂陽州知州明年己酉君過鎮逺出其所和梅花百咏詩示豫豫謂梅有標格有風韻而香影乃其餘也何謂標格風霜面目鐡石柯枝偃蹇錯樛古雅怪竒此其標格也何謂風韻竹籬茆舍寒塘古渡瀟灑幽獨娟潔修姱此其風韻也若夫水中橫斜之影月中浮動之香雖梅本事要之摹寫其形似而已豫謂君大廷折辨之時力排權貴而不少屈此其標格可想也及夫放斥之餘乃甘寂寞以自修潔此其風韻可想也又不以長刀大斧而廢筆硯文字之雅日潄芳潤對景咿咿則併其所謂香影而得之矣夫馮海粟諸人是以己之辭模寫梅之態度君特借梅之梗槩發泄已之情懷所指異矣雖然孤根不動暖氣先回嘉實既成鼎鼐斯具吾之所以望乎君者又不在乎枝柯花葉之間而已也君勉乎哉羅氏渥恩堂族譜序修譜而别其所自出蓋慎之也古者同姓而異系多矣如齊姜姓而有髙國氏魯姬姓而有孟仲季氏楚芊姓而有屈景昭氏故周禮擊邦國以九兩五曰宗謂以族得民蓋别其所自出也貴陽羅氏初為四川銅梁人後徙播州元末明玉珍據蜀羅氏祖曰漢傑荷戈從明氏我太祖髙皇帝取蜀以明氏軍分𨽻成都漢傑屬成都右衛洪武末以播州地立黃平千户所改屬黃平永樂十一年以貴州地立都指揮使司改屬貴州前衛今為貴州前衛人漢傑少經行陳有勇略由步卒升隊長漢傑卒子剛繼以從征麓川功升百户剛卒子綬繼以從征西堡功升千户綬既進官千户乃請誥于朝追贈其父剛如其官進階武略將軍母汪氏妻張氏劉氏俱封安人命下太常卿任道濬為題所居曰渥恩堂侈上賜也故綬修譜因以渥恩堂為號所以别貴陽諸羅而使後世知其所自出其用意逺矣渥恩堂譜自漢傑始漢傑一世剛二世綬三世矣引而伸之其嫡世官其支庶同出于渥恩堂者未可勝紀也夫水異𣲖也而同源木異柯也而同本自後世視之固有親踈自渥恩堂之祖視之則皆其子孫也知其為渥恩堂之子孫則其所以相親愛之心惡能以自己哉嗚呼綬修譜其用意逺矣或曰羅出祝融之後本䢵姓國其先屢有顯者譜略而不書何哉曰慎之也譜慎則族屬明族屬明則親愛篤矣賀林素菴處士應詔冠帶序今天子嗣大歷服改元𢎞治大賚于四海凡民年及耋皆得如漢制賜爵一級詔下里中人相與言曰鄭莊林氏故大族林氏諸長老若素菴先生其可于是里聞諸縣縣聞諸府府按實曰請如制先生乃即其家設几案北面稽首以受是嵗十月九日先生初度其子連州守講乃張筵私第合內外親黨為先生夀先生烏紗白髮輝映堂序而且舉止健康猶少壯時里鄰環而觀之曰大哉聖天子優老之詔乎美哉先生承天之休乎吾儕宵人不可以跂矣豫聞之水行地中惟發源深則流𣲖逺木生地上惟植本固則枝葉繁况夫疏導之勤培養之力其有不浩浩湯湯入于溟渤鬱鬱蒼蒼摩于霄漢者乎林氏之先有諱國鈞者行義宋熙豐間朝廷嘉之賜緋魚袋今閭巷小民猶能道其故實而殘功斷緒雜出於碑碣之餘者猶可隱約而考是其開於前者深且固矣先生為人不傲以肆不憸以刻不饞噬以賊虐寬和慈惠博大坦夷凡與先生處者如坐春風和氣中而有干于先生者亦不與校以去則其所以疏導而培養之者亦既勤且力矣夫天不可以強合而福不可以幸致也先生以若所積與若所為則其離屯蹇出厄塞而躋耋耄之夀也蓋宜去幽晦際亨嘉而受光榮之詔也益宜先生受詔凡諸親黨以為宜有所紀述以傳諸後乃相與徴言于豫豫同先生受室于侯山吳氏先生于豫為尊行睦姻之道固所宜言乃言重修石阡府志序石阡故夷壤也文人墨客鮮至焉成化壬寅江西左參政祁公改知是府公仕江西有重望部使者按事牽聮公故有是命公來輯和夷夏宣布德澤修舉廢墜不一二年政通民懷乃以餘力周旋文事以為郡之有志係一郡之體統郡志不修何以示天下傳後世矧舊有所序述龎雜不類吾不為理誰為理因别為義例重加採輯繁亂以刪訛謬以正脫略以補間有後人所當紹述者則引其端以待諸後通為郡志十卷司志𨽻焉既成瑛自撫州改知鎮逺屬瑛序之瑛閲周禮職方氏見周分天下為九州皆志其鎮曰某山其川曰某江其浸曰某湖其民其畜其利其俗各以其州而别蓋當是時因土以制職因職以制貢職貢不修天子討之此職方所以志也我皇明統馭天下無逺弗届而石阡邈在古荒服之外其山川土田人物貨産皆周職方所不載者公能佐天子以宣德化且為之志使有考焉其有補于治道不小矣公東管人姓祁氏名順字致和王一䕫榜第二甲進士初為户部郎中時天子重公學行遺使朝鮮朝鮮人扣公以文字公如響斯答至于却金却妓尤足以厭服人心比歸朝鮮人上公使事天子且賦詩贈公比公中州孤鳯凰云錦江贈别詩序出成都東郭門有水曰錦江江之水東走巫峽入漢川以通于海首尾萬餘里故有中州之行者往往自此浮舟而下昔人嘗作亭其上名曰折栁凡送别者皆集焉𢎞治癸丑春上以四川左布政使何公世光為都察院右副都御史授以璽書俾撫南郊將行羣公出祖於錦江之上時岷峨雪消錦江新漲天光水色浮蕩上下公臨流而嘆曰大哉水乎大丈夫濟時利物德澤汪濊亦猶此乎蓋公越人也少讀書里中即慨然有撫安天下之志比登進士第補宜興知縣民方苦官府徴白糧與茶債負急公求弊端授以方法嵗省民重徴銀數萬兩及官府有事勾攝皆責成里甲不遣輿𨽻下鄉民安之一日有白衣數人自山中拏舟至捧山薯五脡茶一撮舉首加額曰我等不識城市自明府下車以來民不晝驚犬不夜吠故特來見耳言畢旅拜于庭而去適有府倅至呼白衣使前問故衆曰我等為何尹來他不願見也及擢為御史出按口北宣府大同諸處上方禁妖言有參將與中貴人守邉者希上㫖謂妖人趙大署僞官凡八十人皆有位號公曰若等欲富貴而以非理殺人可乎公辨其誣止論死三人徒四人餘皆得免有大將表裏相蟠據縱子弟射利倉場吏噤不敢動公曰糧耗則三軍病矣此不可釋皆捕而畀之法并論其黨四十人𨽻戍籍又劾其姻婭偏禆以下十數人使不得環列于位尋出為河南知府連嵗大飢人相食公先請在庫銀糴米六千石賑濟次條陳二十餘事備言救飢方略請先後次第行之一時賴公全活者數十萬人死而藏者數萬軀遺棄黃口收入養濟院得不死者又若而人嗟夫公心惻怛慈愛而量淵宏加以識見通敏事無不濟故隨所至輒有成效如此今佩璽書以往不知南郊之內亦有逋負未酬如宜興者乎有濫寃殺人及表裏蟠據盜倉庫所藏如大同宣府者乎其水旱不時飢饉荐臻亦有餓莩流亡如河南不可收拾者乎夫天下事即其小可以占其大據其始可以見其終觀公歷試諸職則南郊巡撫之績吾知其有成也酒酣為擊節而歌曰浩浩兮長江叶汝紅切混滄溟兮際于大東願手㪺兮柸勺作霖雨兮以濟八荒叶廣容切公倚歌而和之曰浩浩兮長江順豫舟兮以東懷故人兮知已渺雲天兮一方於是群公相繼有作豫因次第而序之持以贈公錦官賦别序御史大夫梁公撫蜀之三年天子下詔拜公南京吏部侍郎將行衆謂瑛宜贈言瑛聞天下人皆謂蜀樂土其人讀書知禮義易于為治今觀不然蓋蜀地廣民繁為俗厖雜與中州弗類其地踰雪山以西與吐畨相距山壁立如削驚湍怒濤走其下間為棧道緣山腹行僅一線若統御者無以制吐畨死命則往往據髙扼險挺木擂石閼絶我糧運或呼羣挈黨環甲彎弓來攻我城堡我謀大舉則進退扼塞不可以逞數年來軍勞於戍守民疲於供餉賦稅殫竭人力重困可憂也公來未嘗一日安枕而卧公以為守邊莫先於養軍恤民譬如東垣論治病反覆以養胃為言蓋胃理則五臟皆理五臟理則百病不治而愈矣公嘗發數萬銀分布郡縣令積榖以備荒儉又發數萬銀東路積榖于江油于安縣南路積榖于灌口將募羌民轉輸以實于邉又議掣餘鹽以嵗可得數千凡沿邊城堡倉庾及棧道斷續皆欲以漸修理無非為軍民計也其意以為軍安民裕則虜在吾目中矣此即東垣治病而先養胃之法也近有狂生憤吐畨侵暴乃上書請天子發兵致討廷臣移公議公曰已之不治而謀以伐人非計之得也蓋公非不為也不遽為也不遽為而為乃可以有為也吁公意逺矣公嘗愛瑛書見所謂海濶從魚躍天空任鳥飛詩句公為說曰海濶矣從魚之躍然魚亦不能出于海之外也天空矣任鳥之飛然鳥亦不能出于天之外也據此而言則公襟懷冲曠無不包覆而中間消息盈虛之理操縱豫奪之機又豈人所能盡識哉今公應詔而往矣規畫深而業未究恐喜事者不知東垣養胃之可據而下峻劑以為醫又非地方之福也故因公行述公所以治蜀之意以為公贈冀以告謀國君子與吾人之籌邉者若公自西徂東凡道路所經心目所感中間可驚可愕可喜可念則有諸公分題賦詩在贈提學韋先生歸隱序提學韋先生上疏乞骸骨詔未下而儋倚于牆矣八郡師生方安先生之教聞將行皆相顧而駭若有所失乃相與持牒走御史行臺為留行計又相與持疏走京師上扣天子乞徇下情為留行計先生聞之曰異哉衆之愛我也夫握槧懷鉛日對羣彥此非我所欲乎然淮水之上月蓬烟簔不可久負衆雖愛我切其如我志不可回何嗚呼先生其果於行矣先生淮人也名斌字彥質少讀書泮上咀嚼英華鞭撻諸子思欲立光明俊偉事業以驚動人世既而由應天發解登曾彥榜進士拜給事中凡有所論列皆持大體不瑣細托拾以沮士氣未幾出為廣東按察司僉事轉福建按察司副使皆以提學為職夫環千里之地而制之郡郡有學則千里之內群才聚矣環百里之地而制之縣縣有學則百里之內群才聚矣夫得天下英才而教育之此君子之所樂也先生何急於求去乎或曰蕭艾不鋤芝蘭不長駑駘不叱騏驥不騰此恩怨所自分也先生不欲以恩怨叢于已故求去以避之此先生之志也豫曰天之道公而已人之道曰公之而已不任怨不攖禍不足以立光明俊偉事業吾聞先生之為學政也持其至公之心濟之以剛大之氣往往考課之下未嘗有所顧忌而遷就亦未嘗有所喜怒而枉抑文上矣雖孤寒之士在所必録文下矣雖縉紳之子在所必黜學者初若甚病今則安之矣凡貴介公子惟知為學不以有所恃而安草茅寒士惟知為學不以無所恃而恐蓋其志定矣志定則其教行矣教行則先生之化不幾于成乎况先生將行而交章以留先生者如此其至于此可以觀人心矣而先生速于求去者此豫所未解也或曰先生負剛氣欲以其道行于時一有所沮則奉身以求退此古不茍祿人也或又曰先生有逺識不願仇肝膽與外物鬪將欲擺脫諸紛紛者以歸于大和此古學閉關人也豫方憾先生不願教閩中及聞或者之言又知先生不教之教而為教益逺矣先生行莆中諸縉紳皆相與賦詩為贈瑛僭為之序贈明府吳侯書滿序𢎞治壬戌嵗吳侯惟明尹莆三載矣將以是嵗之冬報政于天子縣耆老羣然來徴瑛言為贈瑛曰衆德尹何深也曰無苛政問狀一人曰莆蕞爾地供億百出丁已嵗大風戊午嵗大雨已未嵗大旱方雨旱甚時而尹適至實能佐郡相與周旋以故天子念民疾苦已未嵗糧全免此所謂無苛政也一人曰尹以興衰起替為務建龍津橋創漁滄渡造莆田縣學增立飢民倉改作廨舍其間相時度力捨彼取此不橫斂以困于民利益多矣此所謂無苛政也一人曰凡郡縣於民有城府之隔堂陛之嚴民望縣門咫尺萬里今尹破落崖岸與民為同小民持牒直扺堂下自纍政以來未有臨民簡易如此者此所謂無苛政也嗚呼苛政孔子所謂猛于虎者也三人者言尹無之此太山之婦所以三世死于虎而不願他徙也瑛聞之瑚璉之器必琢磨而始就干將之劒必鍛錬而始成尹歙人也少遊泮庠嘗以禮經魁應天多士及入試春官不偶乃入國學卒業于大司成氏繼又入部曹歷事于大司空氏如是者踰十年始登朱希周榜進士中間嚌嘈世故備嘗囏苦其所以矯而揉之完而好之非一日之積矣然則尹無苛政有自哉夫天地寓大巧于造化以造萬物而萬物不知君子寓大巧于治化以造萬民而萬民不知尹之居官也人但見其退焉若愚坎焉若虛而不知拓于其中者恢恢乎其地之有餘此三人者或有未喻而豫得于觀感之際深致嘆羡也歟尹未入考時部使者已上姓名而行旌勞之典矣茲其入也又奚待磨勘核實而後知為良吏哉吾恐徴書南下莆人雖不願去尹而尹不能為莆人留矣贈知事劉侯提督水利序莆人堰海以居宋李長者宏作木蘭陂以蓄諸山澗水自西南來注之其縱橫曲直各視地勢所宜昔人用心于此亦云勞矣往者胡公里白埕港决百姓以告嶽守教人于其里重溪之東鑿新渠直趨㴠口於是水北注如㵼東行之勢漸衰天稍不雨則塘東諸處告旱矣又不雨則洋城清浦及黃石諸處皆告旱矣其禍至今未息也近者重溪西海堤又决百姓申以告太守陳公閲府志以為莆中水利綱紀有四溝渠其一也一日躬下鄉呼里中父老廣集謀議始知莆洋地南昂而北俯自道南視道北已髙數尺又自道南視章魚港田將髙及丈矣此嶽渠北注勢不可回而塘東諸處稍遇旱輒告病也乃令仰給此水如陳使埭者履畝出銀買地鑿渠自嶽公橋而西又折而北又轉而西通乎重溪舊渠以灌陳使埭田畝處分既定乃檄本府知事劉侯聲振往監護之又擇儔人中得林洪五吳子懷陳汝真三人分理其事劉侯江西吉水人也蚤嵗遊泮庠與里巷諸人相延接熟知民間事及卒業成均又與四方諸賢俊相刮劘熟知天下事及受檄以來乃能視民所好惡而從違之不猛以驟不寬以弛分地而授之渠驗渠而授之直人得直而功勸功勸而渠成矣太守所擇三人者各桑麻於其土地而效智力勤勞靡不至焉渠成作橋跨道題曰陳公橋本所自也既卒功林洪五諸人懇懇因豫壻王珊來乞言豫謂功無大小而能順人所欲為上禍無大小而能去人所畏為上莆水利為禍二海嚙堤壞而水溢此海禍也人行水失宜使水利走泄此人禍也然則劉侯用太守意以治水其能順人所欲去人所畏避海禍而不遺人禍者乎是宜書乃書壺山贈言序始羅侯為推官吾郡滿三載矣不幸遭母夫人喪不暇他為計倉皇北輿櫬歸故鄉以葬比終喪乃詣吏部以書滿為言部嘉侯守典故乃授之牒俾捧以來此例蓋自侯始也侯在莆時辱與瑛以文字相知愛及再相見歡甚侯從容告瑛曰某來莆無他喜喜得公言公幸母子靳瑛謂侯多讀書識達古今明義理于人間所有文字皆能嚌其胾針砭其膏肓至自為詩往往徘徊雅淡不與世俗爭豪雋是侯為學瑛無以為贈也侯律已嚴御人剛以方至于用刑既明且慎圜土之內無號寃者御史廉得公狀已奬勵之再矣是侯居官瑛無以為贈也然侯進士也近例進士補郡縣官茍善於其職皆徴為御史御史得言天下事矣瑛試舉天下事為侯言可乎竊觀天下之弊深矣考其故蓋非一朝一夕之積也為天下謀者當思所以致弊之源而擬所以救弊之道然後可漸而理也致弊之源曰失紀綱是也救弊之道曰復紀綱是也所謂紀綱者乃聖祖髙皇帝覃思精心稽古酌今自宫監以至諸司百執事自衣服飲食以至甲兵錢榖自祭祀宴享以及賞賚賜豫皆有典則以貽子孫使萬世守之而不失者也故紀綱立則弊消天下治安紀綱失則弊滋天下病矣蓋紀綱之於國家猶脈之於人也人病而脈不病可不藥而愈人不病而脈病此華扁所以却望而走焉者今日紀綱何如哉蓋其失也非一朝一夕之故而所以復之者亦豈一朝一夕之所能哉蠱之彖曰元亨利涉大川又曰先甲三日後甲三日蓋蠱為卦巽下艮上其體上剛下柔而不相入其弊深矣而以為元亨者蓋蠱極當治有亨道焉然所以治之又必熟思審處因往推來乃有濟故以甲三日先後為言聖人之訓明矣此則治蠱之道也侯名鳯字汝文金陵人少為諸生時以聰明特達稱入仕以來益熟于世故間接言論見其於事多有所决擇于人多有所去取雖未即為御史蓋有以正其志矣士正其志此事功所以集也故舉是為侯言保民遺愛序築城為保民計也築城以保民其為惠愛固無窮哉仙遊為縣萬山中考建置自唐始唐慶歷間分莆田西南地為清源縣改仙逰縣迄今八百有餘嵗矣歷宋而元歷元而我明官府及民皆野處寇至輒驚竄無所於守正德初元漳寇起廣寇乘之閩以南大鬨冦分支北掠入我仙逰西界縣諸大姓多受害故司徒鄭公廷綱適家居首倡于衆曰此惟築城乃可以自保衆曰如縣小民貧何司徒曰蝮蛇螫手壯士解腕惡可以貧辭頃而御史韓公南巡民交扣馬首言不可狀韓公曰司徒之議是也惟得人以司之則事濟矣衆疑未解仍持牒訌府中攝守曹侯良金復諭之曰司徒之議是也惟得人以司之則事濟矣時吾郡通守汪侯文祥方提兵分守要害御史識之曰此可以輯事矣乃檄侯攝縣主築城事且勒限而責以成功侯下縣與衆集議或謂宜出官帑以築侯曰官帑有限而功無窮帑費多而功不就誰任其責或謂宜賦民財以築侯曰財聚于上與吏胥為窟穴財聚于下與豪要為窟穴况雇役法王安石行之而敗矣吾可蹈其敗哉以吾言之城為民設也有縣斯有民有民斯有力吾以縣之力築縣之城茍調度有方吾事其濟哉乃度為城計若干丈而以一縣十四里之民共築之凡計里以授地計日以驗功侯時輕車緩帶往來巡視約數日椎牛釃酒以奬勞之有不用命者稍加鞭朴未幾而城成焉未幾而四門成焉未幾而樓櫓成焉始事于正德三年某月訖工于其年某月功驟而財不匱事成而力不乏昔之憂疑未解者至是皆釋然以解矣于是縣之士大夫咸服侯有逺識又喜侯真能為民立不朽之功也乃相與繪圖徴豫文以為贈始豫與莆中六七公者往觀城退作築城謡攝守曹侯嘗録以呈諸御史矣今豫復何言乃詳序本末而以所作謡系于下方以見御史定其計而侯成其功皆可歌也歌曰築城處有歎聲千杵萬杵不得停築城處有歡聲千家萬家不受兵憶昔仙遊寇初起鄭老首倡築城議上搖下撼何紛紛定計賴有韓御史御史定此萬年基汪侯時受御史知更有曹侯通世務左呼右喝相撑持汪侯攝縣有卓識不需民財需民力氷壺影裏讒不生鼛鼓聲中功轉亟念我黃耉為公行俯仰顧盻心神驚此溪此山并此縣八百年來見此城歡聲騰嘆聲止出戰入守曰有備揭竿斬木彼何人慎莫長驅過吾里萱葵圖序萱葵圖者龍門林氏諸子為養母作也圖有萱有葵蓋諸子為養母而并懷于君也養母孝也懷君忠也忠者孝之推也此作圖之大㫖也莆之林多宗唐九牧而居龍門者則邵州刺史藴後也入國朝來科第簮組相輝映成化初井庵以甲申進士拜監察御史宗事失相擇婉嫕於京師可者而得母焉母俞氏世為上元人伯祖綱官至兵部侍郎年十八歸于御史君封孺人性淵懿慧敏有士行佐君理家政每事相度皆中幾會事姑太孺人吳氏往往得其歡心君有三子長近龍次近麟次近豸各自為母母皆母之撫養教誨母無擇焉君嘗擇豫女為近龍婦又擇憲副吳君女為近麟婦又擇教授方君女為近豸婦諸婦皆君定然皆不及一北面贄其䀻而納之者皆母也近吳氏婦卒謀嗣室于俞氏其聘而納之者亦母也君捐館舍諸子尚幼母為調度于內乃建室堂乃籍田畝乃稽山林所入凡有關家計者皆處分有序繼而諸子長成得以承其基緒使門户赫赫如昨日者母之力也諸子皆甚愛母近龍母張氏而致敬愛于母者與己母同近龍既領鄉薦以愛母故不即會京試近舉進士未就讀書成均每一念母輒殞去同舍生憐之初御史君沒母年方四十張未四十相與嚼氷咀蘗以度嵗月今年母六十矣四月十八日其初度也近龍得假歸自京與諸弟謀以其日為夀且娛二親乃作此圖徴言于豫豫與御史君同領鄉薦荷相知愛為深今又為姻家周官睦姻禮所重也乃摘肝鬲之語而為之言豫謂人創家難保家尤難保家惟在諸子婦此心一從違之間而已其相與規誘去違而從恆在長者耳豫壻近龍林氏長子也豫女林氏長婦也願豫壻率諸晜季勉同一心日承順母于其外又願豫女率諸娣姒勉同一心日承順母于其內如是則家大和矣家大和致祥之道也母日遊大和之中將見由耆艾而耋耄由耋耄而期頥夀其有涯哉凡此皆所謂孝也孝道立則忠可得而推矣豫聞林氏先世藴公稱忠臣攢公稱孝子逮至井庵嘗憤鼎臣不扶國本直諫被撻力救時弊數十事移疾飬母家居逾十年躬侍湯藥衣不解帶時昏仆不自知刲股籲天以輸危急則夫忠孝者林氏故物也諸子勉承舊緒逺稽近述而益張焉他日必有稱龍門林氏為忠孝世家者矣請書此以為左劵夀萱圖序豫壻林雲從思父不及養而勤于養母初為舉子時母俞孺人年六十嘗作萱葵圖請豫為之序矣今為御史南都其所自生母張孺人年六十又作夀萱圖請豫為之序夫養母主於義也養其所自生母主于恩也懷恩與義皆自愛父推之也雲從為孝有本末哉林氏世家莆城龍門下系出唐邵州刺史藴藴後多顯者龍門則聮六世綰簮組矣三世登進士第不輟科矣然自井庵而上皆單系井菴而下為生始蕃焉豫嘗考其故矣初井菴為御史京師時屢喪偶不得子及取兵部侍郎俞公姪女封孺人又不得子時太孺人吳氏就養官所告其子曰汝先世皆單系今婦又無子不可不蚤為計吾聞海岱門張氏吾莆舊族也其先以戎籍留此張氏懷明君與莆京宦相往返為人守信義重然諾有莆人風韻人謂其季女溫厚和惠寡言笑及善織紝烹調盍往求之初令人往不可繼令人往又不可終令人往懇告以情乃可及歸與俞孺人以伯仲相稱謂家庭唯諾無間言太孺人安之後數嵗始生雲從焉雲從已屬于龍為近故名曰近龍雲從其字也越五年又生近鳯六嵗而殤張言于井菴曰嗣子寡弱還宜别為計伯姊不專房吾亦不敢專房也井菴乃别置妾以廣嗣續又生子曰近麟近豸于是井菴有子三人焉近復有孫四人焉其來未可涯涘也始豫與井庵同領鄉薦井庵先登進士第豫後五年始登第繼而井庵得告自京歸豫書滿自廣德歸井菴願得豫第三女為子婦豫亦願得近龍為壻方謀議間適福建提學僉憲周公時可過訪聞之喜曰媒自我作命從人取廩米買酒果來賀其親遂定井菴沒近龍始十五嵗能守父遺矩佩服母教言懇懇讀書修行務砥成立今果登進士第復繼井菴為御史聲聞烈烈如昨日是井菴可謂有子而豫亦喜于得壻矣豫聞之家運有盛衰人謀有臧否運盛而謀否則盛可衰運衰而謀臧則衰可盛若林氏者其家運之盛歟人謀之臧歟抑謀臧運盛其兩符歟然則夀萱圖之作不但持杯酒相慶賀而已不但舞斑斕相喜樂而已蓋將于是乎而稽家運之昌也于是乎而驗人謀之臧也于是乎而知福祉之方來而未艾也雲從以豫言為何如翠渠摘稿卷二
