body:
  text: 翠渠摘稿卷一明周瑛撰序文訣類編序豫少習文藝苦不得其門路嘗博採諸家論說而類編之以自軌範客有見之者曰文猶兵也吾試與子言之左右定位竒正異用法也或左左或右右或正正或竒竒幾也幾出無窮勢無定在若不乘其機而惟法是拘吾將見子為人所擒矣豫曰乘其機而不拘于法上也守其法而求合于幾次也上焉者兵之神次焉者兵之精神兵無敵于天下精兵天下未易與為敵豫素怯安敢廢法以論兵客笑而去書此冠于篇首金蘭真意序五倫均出于天賦而友居其一友視夫四倫者若甚輕然四倫非友則無以盡其道是友於人甚重也自伐木之歌廢而友道幾絶慨古君子竊嘗悲焉瑛東南鄙人也愧無以友天下士自景泰癸酉挾鄉書入試京師得隨諸公後塵比庚辰再入京師故人吳君繹思常道賤姓名於其所來往他日丘君時雍自遼左來會梁君廷美自山西來會而胡君以道賀君克恭則因丘君日得相親當時五人者號為知已自庚辰至今垂十載君舉進士最先梁與胡繼之賀又繼之獨余落莫不偶君雖貴顯而視余益親方其擢進士第時捧詔東歸余有事禮部君入稠人中勉余諄諄若兄弟語余意其始也繼而君歸自東拜官西臺持邦憲以肅百僚而位望尊矣猶視余若是焉余意其愛未博而情或專也繼而文譽日起交遊日衆相與談古今而論道德者環左右而至猶視余若是焉余始知君之友豫乃以道義相親不以勢位相視其意之真可以貫金石而不渝矣君今自西臺出守黃州余因述其平日相與之槩題曰金蘭真意持以贈君所以信友道也雖然余之材智無以益君余聞黃為東南大郡古稱多賢其在于今有可父事者有可兄事者有可友事者君能移友余之真以友黃之人他日尚友之歌當有以繼伐木而起者矣贈林孟和主事赴南京祠部序昔孔子西入周問禮柱下史𥅆將别去𥅆贈之言深欲其貶損晦匿以逺於禍孔子賢智雖未必如𥅆所言要之𥅆亦可謂有愛人之心哉吾鄉林孟和少奉其父弋陽先生之命而學於余始終相周旋不怠今登進士第拜南京祠部主事戒行有日衆謂余宜贈之言於戲惟有得乃匡其失曰有失曷救其得孟和性聰警而豫鄙拙豫不及孟和也孟和每遇事慷慨任之不疑豫雖熟計尚未敢動余不及孟和也孟和與人議論博辨閎肆豫每退避不敢盡言豫不及孟和也舉孟和之所能者余皆不之及而子之所有又皆孟和所不屑言者焉豫將何以為孟和贈哉雖然豫尚有以告孟和蓋過於聰警則察察徼怨過于慷慨則怏怏任意過于閎博則自賢近名徼怨則多敵而危於我者至矣任意則害理而罪於我者至矣近名則多爭而忌于我者至矣用是以守身不可也用是以居官不可也用是以處世不可也蓋持此三美則藏此三慝美以藏慝慝以媒禍有道君子所深戒焉然則豫之失其可以救孟和之得乎孟和禮官也宜秉禮是務昔孔子之學于𥅆也蓋亦勞其所用心矣歷郊社之所考明堂之制察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也今南京舊都也寧無老成人知禮如𥅆者乎孟和宜往訪之求以盡其學毋徼怨毋害理毋近名則於守身居官處世之道兼得之矣衆曰子之言其有𥅆愛人之心哉豫曰久交則意真多愛則辭切豫故習為𥅆也翼日豫輯其語而叙之諸君乃相與歌詠之鄉人許本髙又從而圖繪之豫因合詩文畫為一卷持以贈孟和瓊林春意圖序進士張君朝振領部牒南走京畿諸郡縣以督財賦夏四月至太平平郡邑諸大夫相與召畫史寫君狀貌為瓊林春意圖以贈之君至廣德出以示瑛樹色蘢葱宫殿掩映中一人酒微酡騎出于林袍笏襜如前一童挾策而驅後數人肩盤榼以從諦而觀之春意盎如也蓋騎而微酡者張君也所挾冊者恩榮録也肩盤榼以從者大官之餘也夫士舉進士入宴瓊林雖華弗加何至圖之曰世有身居臺閣手調鼎鼐自以平生不舉瓊林一匕筯為恨者則瓊林有圖亦宜也雖然君之狀貌不圖則已既入于圖則人皆熟其為人矣今夫內外百執事以及臺閣廟堂之輔皆進士為之也他日君為內外百執事以及臺閣廟堂之輔若有所樹立以驚動天下則人皆曰吾嘗觀其狀貌而知其能此也或為內外百執事以及臺閣之輔不能有所樹立以驚動天下則人又曰吾嘗觀其狀貌而知其不能此也然則圖不可謂無所係也張君勉乎哉君故上元人祖父戍灤君灤産也灤有甲第蓋自君始云好生録序成化八年夏五月皇帝若曰惟天地大德曰生惟豫體天地之德子于兆民惟奸宄慝惡允戮無赦惟可矜疑蔑有證左宜從寬宥乃勑中外大臣讞兩京獄又勑廷臣讞四方獄於是刑部郎中金公尚德讞于南京公既受命拜手稽首揚言于衆曰惟帝以天地之心為心惟臣以帝之心為心帝德罔下敷臣之責惟臣有攸為乃帝之德於是走古徐轉下邳進退于淮東西乃濟于江歷于鎮于常于蘇于松又沿江而西扺于太平乃下廣德入宣州以達于徽于池蓋至是為嵗期矣公所録囚亡慮數千而皆死獄也死獄未明故特論其可矜疑狀以請于上公語人曰吾視獄每于死者欲求其生未嘗于生者欲求其死及是録成乃以好生名吁觀是録則知公活人宏矣公括蒼人姓金氏名文字尚德由進士為今官弟名忠字尚義由進士為監察御史皆以文章氣節重于時嘗聞其父為法官有聲于宣德正統間實生公兄弟世傳虞廷諸臣惟臯陶為無後豈其然哉豈其然哉徐氏貞節挽詩序成化癸已秋豫自廣德有事南都一日謁吏部主事劉君文綱文綱出見客巍然粗布冠修然衰服在躬纍纍然腰以下而帶不盈握若有期之喪者焉豫問之文綱曰家門不幸禍鍾吾祖母豫問狀文綱曰請更僕為客言之祖母故同邑徐氏女也年十八歸吾祖十九而祖沒遺腹生吾父外氏日遣人附耳語以動搖祖母心當是時吾父方在襁使祖母一舉足則無吾劉氏矣尚賴祖母守初志育吾父至于有成以及于吾而有今日其所以守身保孤盡心於祖父者可以指天日而無愧也今祖母死矣吾不得去官瞻拜几筵而退食則將盡愛於所私也豫聞之惻然文綱又曰里人髙祖母之行嘗具狀于縣聞之天子天子下禮部議禮部核實未上而祖母死矣近者工部郎中同邑葉公狀其事題曰貞節吏部尚書崔公銘其墓亦題曰貞節諸交遊以貞節咏歌者且盈卷矣因次第出以視豫豫讀之既且感文綱言而信之夫正而固之謂貞限而有止之謂節聖人于易每言利貞而節則有甘節苦節之異是貞節者人道之大間也自聖學不明而綱常之道壞世有豪男子謀人家國一旦不利往往失身于所事而深閨弱質反克踐于聖人之言然則若徐氏者可謂無負于人道者歟於戲人道一失則禽獸矣反禽獸以歸於人道者吾於徐氏見之矣贈袁學正序國朝稽古為治凡天下府州縣皆建學學必置官官有長有屬是故府為學其長教授其屬訓導四人焉四人者考其成績各一其長教授則兼之矣州為學其長學正其屬訓導三人焉三人者考其成績各一其長學正則兼之矣縣為學其長教諭其屬訓導二人焉二人者考其成績各一其長教諭則兼之矣是則學愈大則官愈備愈備則責愈重然才之多者羣十數人而取之亦不為過少者取其一猶難况必取盈乎廣德為東南大州四面阻山其間沃壤數百里民皆樂畎畝不事詩書每選弟子員皆閉門却走不願就見及以刑威劫之而始用命比至學又多方以求去故凡教于是者考其成績為難成化丙戌桐廬袁君克和來為學正又六年余來為州長吏克和告豫曰俗偷學弊文教不興執事何以惠豫豫曰君苐教之天下事固有樹之風聲而人自勸者矣劫以刑威而人怨望者矣君苐教之克和退而告諸同官曰朝廷責我以千里人材而分教于諸君君能及是勉修職業尚有成績不然咎將誰歸同官皆曰敢不勤蚤暮以從袁君克和又為善惡簿分置左右立諸生于堂下而告之曰汝諸生有能居家孝悌入庠序禮讓講學修業兢惕不已則書簿善其有不率教笑傲以嬉則書簿惡諸生皆曰謹受教豫則以州長吏日加督勸每公暇輒比其文行而考較之得優等輒騎從鼓吹送諸學又勸民相度地勢大作學宫及以餘力而為山池亭館以趨走州之人士於是在學諸生始稍自激昂而民間豪右始延師訓子弟而子弟秀穎者來遊學宫顧瞻以為盛美始願為弟子員嵗甲午諸生陳亮以書經舉丁酉姜溥以禮經舉且奪魁余方欲與袁君登萬桂山以觀鬱葱佳氣而聽絃誦之聲以收為學正者兼訓導三人之效而袁君以秩滿去矣將行諸生請贈言余乃歷叙是學廢興并先生知所以自勉而收其成功者以為贈送林蒙庵序始瑛舉進士禮部嘗友天下士相與為學以趨于善於吾閩中得䝉庵林先生焉先生學平實不矯飾以為僞處事多委曲詳慎無直遂每公退坐一室左圖右書檢㸃其身心自慮念之微以達于事為之著務合于道義間有不合如被穢在躬力褫去之乃止嘗語瑛曰凡學不過欲得此心而已心不可外天理人事以求之也處人事以合天理則此心得矣若厭人事而慕髙虛惡積纍而求超脫皆非學也未幾瑛領符南牧而先生亦鬱鬱有歸志間嘗與瑛書曰龍門浩渺武夷崒嵂吾人事業何在而乃甘心依違組紱間耶乃謝病乞骸骨歸時先生自行人司正擢駕部郎中未久堅不為留嵗戊戌先生道出于莆莆人士爭攀迓先生為留者數日或告豫曰出處君子之大節也古之人有以一言不合而去者如衛靈公問陳而孔子行有以一事不合而去者如魯不膰而孔子行方今聖明在上録用賢良先生方嚮用加以齒髮未衰是宜早夜孜孜以圖報稱奈何亟求去耶瑛曰子有疑于先生請從先生遊先生是歸將構屋龍山之阿聚古人書而誦讀之考其迹以求其心涉于萬以會于一以此而畢聖賢體用之學子從之遊而有得焉則先生出處之義當自喻焉先生將行衆咸為賦别退瑛為之序贈周僉事入閩提學序成化戊戌嵗朝命以南京吏部主事周君時可為福建按察使僉事降璽書開諭君俾督諸郡縣學其同年周瑛閩産也道閩之故實以贈之閩之山發于天目折而南趨其勢北髙而南俯矗矗如蟻鬪如蜂屯如龍驤馬馳自天而下閩之水隨山而出與山相糾纏山益峻水益駛每舉舟順流而下也如雷奔電掣旁觀左右不可以瞬然而漁者終日而不投一竿焉是何也水勢暴悍鱗介之屬徙而去之矣及乎山勢漸夷兩崖相去數十里水匯為巨浸東合滄溟舟不得風或日行半程或一程然而黿鼉蛟龍魚鱉生焉貨財殖焉沿河而收其利者蓋幾千百家矣又何也水勢深廣不振撼撞激而鱗介集之矣君子觀夫水而知為政之道乎閩為東南大州自唐常衮為觀察時教民間子弟以文學而科目相傳至今益盛然而耰鋤德色箕帚誶語使賈生生于今日又不但為漢廷慟哭而已也君可不察之乎瑛聞學校者鄉邦之式也身家者學校之本也君宜修諸身以教諸家修諸家以教郡縣諸學由郡縣諸學以風動吾鄉邦之人則人皆相觀而為善矣此其效不可朝夕致然所獲者大譬如水勢深廣鱗介畢集收其利者不啻千百家而已也茍或立已于峻持威以乘其下今日考其文字明日考其字畫茍不如意則禽獮而草剃之此其效可以立辦然不足為國得人是猶水勢暴悍鱗介不遊吾見漁者終不為下竿也君起謝曰吾入閩觀夫山水而思子教言三年之後當有以復諸子賀包封君以六十受恩命序始豫舉進士京師時識嘉興包君汝調及為南京禮部郎中而君亦來為主事既同官而情益親成化甲辰君將報政于朝豫有撫州新命諸同官咸告豫曰國朝京南北官滿三載臺省考核稱即得推封其父母妻室汝調報政有日矣其父可松先生年方六十蚤晚璽書南下錦衣烏帽輝映林麓固世之所甚華焉者敢預請一言以賀豫既納交于汝調諸同官所為賀猶豫賀也惡得已於辭豫少讀書見史傳論福慶於人必歸于有德始嘗疑之晚潛心世故玩志天人始知感應之理甚微也蓋天人相去雖逺而其理未嘗不一其理一而其氣未嘗不相通其理一而其氣相通則感應之機在我矣漢公孫𢎞謂心和則氣和和則天地之和應者其可謂知感通之道乎包氏世居雙溪之上自其先世以來皆積德行善重于鄉邦其祖樂園翁尤慷慨行義濟人利物若出天性而可松繼之加之孝友寬和與物無競其積可謂厚矣夫人生固有不離於襁褓者而可松年至六十髮尚黟精神無恙夀其有涯耶世有讀書抱藝卒老林泉而不沾一命者可松産三子伯仲皆舉甲科其伯貴受封仲出為縣循例補風憲官季雖在學科第可卜其家世榮盛可易及乎故豫觀包氏福慶之隆而知天人感應之機不爽也世有不知務者往往恃其富貴以憑凌其鄉里一朝權解勢去而傾覆隨之且謂天道漫沒不足信亦惑之甚矣諸君曰請以子言為包氏賀而各退省於其私以為修德保家之懲勸赤城論諫録序台為州萬山中羣賢繼出多能立光明俊偉事業以驚動人世而其論諫亦往往達治體明事幾忠愛誠懇足為後世諫官法程甚矣台之多賢也他州未之或先也成化十五年冬瑛以州政入考京師台有仕于朝若吏部黃先生孔昭翰林謝先生鳴治相與來視瑛因出其所編赤城論諫録者屬瑛序之瑛奉而卒業焉蓋皆二先生編輯其鄉先正左司諫陳公輔以下數人奏疏而為一編者其意將以告天下後世而與謀人家國者共之不但成其鄉多賢之譽而已也顧瑛謭薄何足以序論羣賢之詞雖然瑛嘗聞之天下之事有幾有勢有形幾善惡也勢輕重也形治亂也幾動則勢趨勢趨則形就是故幾動於善則其勢趨於善矣幾動於惡則其勢趨於惡矣勢趨於善善重而惡輕及其至也而治成焉勢趨於惡惡重而善輕及其至也而亂成焉夫治亂形也然不生於形而生於勢輕重勢也然不生於勢而生於幾有善惡是為形勢之先治亂之本也當時羣賢論事或在治平之後或在草昧之初或在存亡危急之秋其所言事雖有大小要皆有以審夫幾也夫幾動于心間不容髮非天下之大知不足以知此非天下之大勇不足以用此故氣運不我與明良不相值坐失此幾者亦多矣此君子于豪傑之士又不能不嘆其建功立業之為難也二先生裒輯是篇用心良苦矣瑛復以形勢幾為言而終之以智勇以告讀是編而興起焉者當有以審夫次第而為之也怡夀堂序吳下曹君元潔既喪母奉其尊甫先生以居成化甲辰登李旻榜進士乙已授撫州府推官明年春奉其尊甫先生以來又明年春先生夀七十曹君乃署其堂曰怡夀張宴設樂為先生歡瑛與同官皆賀縣大夫又賀小民不敢至堂下至是亦皆舉手加額以賀蓋曹君為親歡故人交歡之也交歡之者為孝之心出于同然也賀之朝積雨初霽春日載陽和風協氣吹拂堂宇先生出饗客衣冠俊偉容止閒都籩豆成列獻酬有序其樂充如也日暮酒酣衆且退矣先生降席曰僕齒日長辱諸大夫不以為鄙猥而觴於僕今日之歡諸大夫之惠也敢申以為謝又曰茲大郡小兒為理惟諸大夫相與協恭故小兒得免官謗今日之休又諸大夫之惠也敢申以為謝又曰僕從小兒西誠無所干撫之人撫之人亦未嘗有干於僕今則有請誠願太守有以序述吾事幸毋以豫為多求也瑛謂先生長者凡所言皆有理道瑛復何言然嘗思之天以福授人恆嗇而不能咸子以孝事親多違而不能合多違而不能合所遇殊也恆嗇而不能咸所賦拘也拘于所賦殊於所遇則於父子之間而能盡得其所欲者蓋鮮也韓詩外傳載臯魚自敶三失而繼以槁死雖制行非孔氏其情亦悲矣家語載子路南逰於楚思欲以貴顯易貧賤求養其親而不可得其所感深矣今曹君登第先生及見之居官食祿先生及享之先生夀七十禮所謂杖於國之年也曹君又能以官為養而得衆人之歡心以承事之則先生得福其盛矣乎曹君為孝其多合矣乎曹君告豫謂先生事先教諭府君小心恭慎先府君病先生臂香籲帝請以身代果然則先生食孝之報如持左劵合矣不然則先生得於天者為加厚而享于子者為獨至豫又歎世有修身慎行不能食報於其子如先生者不但臯魚子路二人而已也嗚呼先生之慶深矣豫忝為師帥職司風紀曹君又持刑以弼豫違請以是教於家使家之人皆有以怡于其親又請以是教於邑使邑之人皆有怡于其親又請以是教于郡使郡之人皆有以怡于其親則先生欲豫言又不但為一身之謀而已也諸同賀者皆曰曹君之堂風教之紀也太守之言風教之朂也及退皆相與歌咏之豫因次第其語而序之一室雙貞詩序節義者人道之大間也節義立人道定矣昔者孔子删詩於衛風而存柏舟之誓修春秋於夫人而重如齊之戒至於正禮凡男女之際節義之防尤拳拳焉皆所以定人道也書林林氏系出唐孝子攢之後世以詩禮傳家無乏德林君廷諫受室于冲溪王氏其婦翁士俊先生登李騏榜進士歷大理評事雲南知府以老王翁博學能文諸子女往往得其緒論王氏既嫁無子告其夫廷諫曰婦人奚必自有子顧鞠養之恩何如耳漢馬后鞠肅宗肅宗愛之過于所生吾雖不學然聞諸家庭遺訓舊矣請以此為法廷諫曰子方盛年何遽為此言王氏曰君宜熟思吾既無以嗣君室又不别為室以謀君嗣儻期過事違悔將何及時有張氏女質美性淳私為廷諫納之既而果生子大順生未晬而廷諫死於戲王氏可謂有定見耶其于林氏之世可謂有再造之功耶初王氏之嫁也資賄頗盛既入門乃辭去紈綺盛飾身著布素與妯娌相周旋至是乃出其餘以偹喪具及買地書林嶺上以為葬謀且信浮屠氏建水陸會以資冥福而又泛濫及于舅姑伯母郎叔其力貧為此雖於禮未有稽為其志可哀也自廷諫沒而撼之者日繼至王氏毅然獨立以恤孤保家為事而侍妾張氏亦同守初心不移王氏愛大順不啻若已出稍長遣從里中師旦必送之門夕歸候亦如之常曰是氣體綿薄吾不敢厚有覬望他日得承胙于禰廟足矣其或出外經宿不返必焚香扣神以卜安否既長極力為婚娶復悉出所有增田闢屋以為居養蓋至是叉釧服飾無遺矣嗟夫婦人之道在於恭順其職在於中饋茍能是可謂賢矣至於先事為理以續夫世保幼孤至於有成及拊循妾媵與之同守貞操始終無瑕此豈世之所易得哉郡守王公存敬以綱常為治特扁其門曰一室雙貞而時縉紳大夫皆從而歌頌之其節義所由著乎人道所由立乎此豫撫摩是卷為之三歎不能以自己也修鎮逺府志序瑛待罪有司恆以不達于政為病成化丁未自撫州改守鎮逺既扺任索郡乘于掌故氏曰亡之竊以為是郡東起沅州西接播州南臨諸苗是為雲貴門户韓子所謂治法征謀宜有所出者既亡郡乘何以稽故實以達諸政于是考地理以求險易詢敵情以求緩急訪民隱以求休戚至于學校農桑户口田賦課程徭役民物榖畜法度典章凡政事所關者皆博求之閲明年頗得要領擬即所見而次第行之顧事與志違而目光炯炯在牛背上矣夫人一心包藏天地酬酢庶類居一官而不知此官之政是于此心為未盡知而不能自致于物是為不能舉其職不能舉其職而不奉身以求退則是愛官重于愛道皆非也瑛于是知所擇矣雖然道者萬世之公也政者一時之宜也茍有益于民後世必有能舉而行之者矣乃據所聞見特加考證以補郡乘之闕以俟後來君子若夫一時游賞題詠皆登載無遺者是謂一張一弛文武之道治禮君子所不廢也故併叙之贈郡守王公書滿序嘗聞天下士恆相與言曰守令不可以不為又曰守令未易為又曰難干久為其意以為守令有民社之寄欲推行善政善教如古人所為者非守令不可故曰不可以不為也然任大而責重政繁而務劇棘則棼猛則躓却立而坐視之則政務填委不可爬搔故曰未易為也夫守令者威福之寄怨憎之歸也歷嵗久則有媒蘖其間以襲吾短者故曰難于久為也黃巖王公存敬少讀書尚義修行有古人風及登進士第出知溧陽縣其聲大著擢刑部主事遷貟外郎其聲又大著未數載擢知興化府公日坐堂上政務滿前不以棘而棼不以猛而躓不却立坐視而日與爬梳於是學校農桑户口財賦獄訟盜賊徭役恤典諸政無不修舉所立八條約曰勸善戒惡崇禮恤患禁奢警惰察姦釋忿皆就民心上相與擴充又非常政可例數者公初政尚威民頗疑畏又轉諸寬博民大恱方今四境之內強者不得肆弱者得自安吏守案牘不得為姦輿𨽻不得呌號里閭每折簡下鄉民帖帖至堂下以聽約束公政至是民信之矣公自𢎞治庚戌到郡歷今丁已凡八載矣莆人私語曰公一日在莆民受一日之賜一嵗在莆民受一嵗之賜使公不願他官而終守莆吾將以公為歸矣夫守令不可以不為公為之矣守令未易為公為之則甚易矣守令難于久為而公歷政八年以上民懷之倍于初何哉蓋公存明白正大之心禀剛果𢎞毅之性而充之以該博之學故其政有成也如此今以六載報政于朝六事八約可錯舉而陳天子必有以處公矣然莆人念公深公其尚懷莆人哉麾使丁侯掌衛政日與公相周旋以公行有不忍别者乃與諸僚友輯綵為障乞言贈公豫故次第言之或曰子托交於公最深何贈言以頌不以規豫曰頌者所以道其實也規者所以防其過也公密于自省有過未嘗不知奚待豫規夀山福海圖序去莆城東南一舍許有柯山焉柯山與壺山相俯卬勢逶迤盤礴得水而止有榕樹數百章望之若連雲然柯氏聚族于斯纍世矣景泰初柯先生孟時以狀元及第拜翰林學士先生清聲碩望人謂旦暮且入閣以佐理天下不幸捐館舍輿論惜之先生之配俞宜人兵部侍郎諱綱之女也有士行能保族宜家以不墜先生之舊先生沒時宜人年方四十五至是六十矣是嵗正月二十五日實維初度其子宗文作夀山福海圖為宜人夀其同堂兄宗璧以為非文不足以序家慶非文不足以昭貺我族人乃以僉憲在亨君所書事并以其所為圖來請文夫祝夀與山齊其夀髙矣祝福與海齊其福深矣然福以夀為本夀以德為本非德不足以致夀非夀不足以享福昔人于易書詩禮蓋交言之矣瑛請得以稽其故實方先生沒時其子宗文始六嵗其妾王氏曹氏方盛年宜人以侍郎之女為學士之配能為綱常作家計宜矣王氏抱弱子日夜呱呱以泣不知他日成立如何乃能守死不去此果易得耶王氏以有子不去似矣曹氏無所出乃願事主母以終其身雖先生有治命亦不肯從此又易得耶蓋先生以詩禮陶于家而宜人化之宜人以恩愛結于下而諸妾從之故先生雖沒而綱常不墜如此夫綱常者天道也福與夀天所與也人能培植綱常以順乎天則天畀以福夀固不待稱祝願望而後至也然則宗文為是圖是固稽諸天道而有徴也瑛又聞之凡善類宜有錫于後福澤必延于其家柯山之椒和氣鬱蒸他日必有忠臣孝子出于其間而綱常之慶益隆邦家之光未艾也請書是以待之皇華使節詩序古者行人使於列國列國之君饗之則相與賦詩以見意大而解紛息爭輯戎紓禍小而通情結好承教拜嘉其所賦詩皆取諸三百篇以其宜于事者為賦故當時遣使必擇其習古能文者為之不文不遣也後世此禮不講凡有燕饗優談伶語妄相詆譏如孔道輔使遼遼以宣聖為戲此其失在主也陶榖使江南南人遣驛妓歌榖所賦詞此其失在客也凡此既不足以息爭紓禍又不足以結好致嘉稽諸古禮是為使事之纍君子蓋羞道之皇明御世天下一統以詩書禮義陶化人心士生其間多習古能文而勵亷恥之節𢎞治六年秋蜀惠王薨天子有事于其國命保定侯梁公往諭祭又擇通曉典故者相之時廬陵王君夀以進士拜行人司副天子若曰喪禮之相夀也可于是君副梁公以行其冬扺蜀自始諭祭以至卒祭無違禮國中每祭必有宴宴必侑以幣君皆辭之明年春禮成藩臬諸大夫饗之及旅君起求誨言諸大夫皆賦唐人雜體諸詩為贈瑛曰非古也於是左方伯韓公為賦四牡君曰豈不懷歸王事靡盬公所以悉鄙懷也敢以為謝右方伯鄭公為賦皇華君曰載馳載驅周爰咨諏公所以教使臣也敢申以為謝憲使洪公又賦枤杜之首章及大東之卒章君曰兵疲于戍守民困于徭役大夫之憂也使臣歸當以上告天子然則論使事于三代之後若王君者可謂習古能文者乎可謂行已有恥者乎而吾藩諸大夫所以處君者可謂慎于禮而不瀆乎衆謂君行宜有贈瑛因撰次其事以為君贈韞玉山房詩序詩三百篇至矣漢魏以後諸作非古也然太師失職雅頌不傳後世有作君子亦所不廢洪武初休寧吳藴中氏以詩鳴邑人程若虛嘗為論次其集謂其詩為體屢變有平易簡淡者有精確嚴重者有奮迅馳驟及風流藴藉者今考先生詩舊學于里人余子韶嘗自評子韶詩壯麗頓挫以豫觀之先生詩大槩如評子韶語先生官終平陽簿而詩不甚顯于世嘗名其所居曰韞玉山房夫榖璧琮璜圭璋琬琰可以薦天神享人鬼修國好勒世勳皆玉之盛也乃不用而藴之則其孚尹旁達固有吐氣若虹者矣然則先生所謂藴玉者殆傷其不遇耶抑所謂待價而沽之者耶先生既沒其五世孫世現等相與謀曰父祖有善而子孫不知不智也知而不傳不仁也吾祖寶玉今尚無恙可使終韞山房不發泄于世乎乃謀鍥諸梓而徴序于豫豫曰先生有後矣因序以歸之遙祝長春圖詩序萊陽宋公景章由御史出副浙臺既受命日走旁近郡縣繩奸宄治慝惡以振揚風紀以佐助聖天子治理既而曰忠于事君者不及孝于事親吾今不能入故鄉持杯酒以為親夀獨不能即官所而伸祝頌之私乎乃自製詞而歌曰朝祝兮長春暮祝兮長春願吾親髮白復黃兮背有鮐文又賡載歌曰朝祝兮長春暮祝兮長春願吾親谷神不死兮後天地存臺司諸公聞之相與倚歌而和之公喜曰是可以發吾志矣遂以繪事加于其首題曰遙祝長春圖以書來廣德屬瑛序之瑛記公在御史臺時嘗為尊翁夀八十矣蓋惟有夀而後可以享諸福翁嘗拮据以有其家深藏而厚積其富有如此者晚受封號烏紗白髮輝映林壑其貴有如此者有子六人皆克成立足以光前而振後其多男子有如此者翁諸福備矣誠得永年以享之其福寧有既耶瑛孝弗公類先考見背十四載矣近得州大如斗間關千里迎母就養思先考不及見而情益悲欲以公之祝其父者祝吾父何可得哉因書是以歸于公凡同是懷者必有感于斯焉贈王司訓書滿序王君廷偉同豫莆田人同讀書以為業其仕宦也同豫江東相去不百里而近以故最相親成化丁酉君分教安吉縣將秩滿戒行有日豫臥病不及走送病愈且入覲因使人告君曰聞吾子行有日矣某不能持杯酒以犒從者竊效周柱下史𥅆贈夫子以言可乎君報使曰得徼舊好辱臨敝邑固為多幸如其不然而辱教言吾子之賜也豫惟聖人為善始終一貫其餘美惡不能咸君少豪為弟子員時其家以稅糧長諸里君舍筆硯日騎馬走諸鄉親會計籌算以足糧事及遇快意處一揮數百金不為靳惜人以此譏君比見豫廣德乃能深自貶損以咎前失每與豫言侃侃仗義不阿見人善輒稱道不置見人不善直欲草剃而木柞之務絶去根株乃已余痛先君不及養獨迎母以就養嵗時必藉祿入以為母歡君語人曰周君欲為孝吾請助其為孝嵗逢母初度雖暴風雨必至至則拜堂下甚恭豫屢謝止之君曰吾方教人以孝孝君之母猶孝吾母也君何吾辭安吉細民有暴死者其妻行諸途里中豪遇之曰美而艷其夕強委禽焉婦涕泣不從豪使人護其宅婦閉户自經死君將疏其本末以告藩憲二司使治豪之惡而表婦之烈人曰此縣大夫之職也君曰學校以風化為首風化以節義為先吾教茲土不能使人重節義尚可置而不問乎嗟乎世之為學校官者不過集諸生于堂序訂其疑義校其文字使取科第以為成績至于人為善與為不善孰問焉君往矣異日有懷念君者必曰是能助人為學者也是能侃侃仗義而不屑于細事者也贈徽守周君秩滿序徽為郡萬山中少夷壤民多賈作走四方習知官府事故其俗善訟每訟輒持法律語以牽制上下務扼其吭拊其背以制其命乃已故徽于畿內諸郡號難治文江周君子建由工部主事來守徽歷九載而政成焉人謂君有宏度凡善惡皆川藏而藪納之故人不怨或謂君有通敏才故事無填委而上不譴豫曰固然然豫嘗聞文中子曰僮僕稱其恩則可以從政矣交遊稱其信則可以建功矣君之輿人來廣德嘗告豫曰吾編民也府倅嘗括民財納府庫以備嵗凶公曰財藏諸民與藏諸官一也奪諸民而歸之官以官之意而散之民人其謂何必不得已宜别為計毋損民可也倅不恱公竟罷之又有士大夫遊于君者來告豫曰徽民有傭主家者私其妻焉他日主出傭入室有兒在襁誤扼死妻懼執傭傭殺妻他兒女皆稚弱環尸而哭或起而牽掣傭傭并殺之同日而死者五人焉主歸言狀同官皆曰此無證佐公曰當以至誠求之乃下吏按狀先是傭已遁去吏不得要領忽有群烏噪而前吏隨烏往果得傭而死狀以白夫廣德去徽逺不能詳得他政而聞諸輿𨽻及交遊者如此况君加之以宏度濟之以通敏政其有不成哉君秩滿去節推楊君朂念君以入覲未歸而不得飲餞為恨必欲得子言持往贈君子游于君二十載矣因或人言而參以疇昔所聞益信君政之有成也送常熟知縣鄧君考績序蘇為縣七常熟最大常熟為里若干為户若干為財賦若干民多習筐篋學用以牽制上下一不得所欲則拊鍵扺巇以集故姑蘇諸縣常熟為重吾閩鄧君洪中以丙戌進士而出知是縣命下人難之君慨然就道既入縣乃考圖籍計户口定賦稅均徭役行之數月民大恱繼而修學校治官府造橋梁築墟岸行之數月民大恱繼而扶寡弱鋤奸宄親良善行之數月民大恱他日邑大旱民相與言曰惟尹可以得雨君為走赤日中望山川以拜汗披面如雨雨大至未幾太湖水溢壞民舍漂流牲畜田卒汚萊民又相與言曰惟尹可以奠吾居君為延圍葦荻間問民疾苦皆家慰而户給之民賴以活太守嘗責君逋慢君曰治民如治絲棘則棼邑民以秀麥來獻君曰造化偶爾吾何功焉余嘗笑經生為政每以詩書故迹而加之時孰能審其本末察其緩急如君者哉又孰能以誠格天以勤愛民如君者哉又孰能責之不怒諂之不恱如君者哉初君為政滿三載當考績去常熟民皆走御史臺借留之至是始行縣教諭黃君體勤乃疏君政以來且告子曰尹為政多類此願與之言余乃比類書之使人知常熟雖難治而不難于鄧君科目稱得人而得鄧君為尤信也省耕圖序近山東郡饑公私蓄積無備民用大殍天子念國本遣大臣巡視幸而上下獻謀公私協力而民有濟繼而議者以為天下郡縣宜增置治農官以會政致事制曰可于是郡增置判縣增置丞藩憲二司增置參議僉事各一員專司稼政豫友朱有嚴為歸安丞有嚴故儒家子嘗讀書知古今政治得失及從事督府掌行簿書精吏事既扺歸安乃擇其有關于農政之大者皆為提綱挈領分條布目頒諸其鄉而與民共守之每春三四月時雨初霽布榖載鳴輒單舸走湖上或肩輿軋軋行阡陌間與小民遇不為上下禮惟其情是達見夫勤者曰汝惟勤明昭上帝迄用康年見夫惰者曰汝無惰弗菑弗畬弗耕弗穫王賦不供有常戮見夫飢寒者曰汝飢且寒切吾膚吾壺飱之餘可飲食汝篋笥之藏可衣被汝如不得已吾為上其事于司于府以賑貸汝歸安附郭縣民習知官府事初聞增置官以臨已甚戚及見君善拊循之復大恱于是四境之內怠者勤勤者勸貧而飢寒者感君言如飲醇醪如挾纊于是一時田野大闢公私蓄積隨處而備而君之聲譽亦殷殷上下間嗟夫農之政大矣昔者成周之世建官三百六十而于鄉遂皆有官用以周知其民與其所宜地以為法而縣于邑閭察年上下而出斂之以均民食而賙其急以故民不告飢卒告飢亦有備後世建官于守令之外詳于他職而農不置官間守令賢者用心農事其否漫不加意一旦有急民相枕籍以待盡如山東之殍是已然則農官之置其可少哉朱君丞歸安嘗作省耕圖以視豫豫以其重政本也故不辭而為之言若夫課農之暇而得湖山之趣花木魚鳥之情則有詩人諷詠在江上唱和詩序成化丁酉天子將開明堂以朝諸侯瑛自廣德州奉户口財賦職業入聽黜陟其秋九月舟次江上而湖廣參政楊公瓉僉事李公冕亦以奉萬夀表自湖南二司至楊公與瑛同里閈相見大歡李公蜀人不以勢位殊異相拒絶日吐肝膽相親與如前相識然于是連艘北行日得酒必相與飲凡去國懷鄉之思愛君憂民之意遇事感物之情往往于杯酒間發之瑛嘗賦詩呈楊公以道鄉况楊公和之李公亦和之二公者各得詩十首瑛才不能追公固趣和之一時共得詩三十首俱用瑛初韻而叙事感懷則各隨夫人焉暇日瑛合而觀之蓋楊公詩清而不削婉而有味李公詩豪而不怒壯而能詘皆可誦讀者也以瑛所作厠于其間如槁木依于桃李瓦缶附于金石不自知其貌凡而韻短也雖然亦各道其情耳昔者周天子有心于化理故巡狩採列國詩以觀其美惡雖里巷諸女婦言有所不遺脫使是詩流落江漢間見取于太師氏以達于上則其無心之感亦足以為有心之勸云五馬入閩序成化辛丑冬詔以南京户部郎中張君中立知建寧府建人徐君大用同豫官禮部謀豫作五馬入閩圖以贈蓋上為聖天子得良有司賀下為建人得賢父母賀次為張君得行其所學賀君故海鹽人以戍役家大理其先户部府君諱僖號儒者惡經生拘而不通博考易詩書春秋傳義旁及釋氏孫吳醫卜諸家書滇南人服其該博故兵部尚書侯公某視師滇南命教大理諸武臣子弟故君受家庭之教聞博洽之論在庠序間亦往往有聲府君既沒君果以書經發解雲南第一繼登羅倫榜進士拜南京户部主事纍遷員外郎郎中贈府君以初官至是有專城之命亦可謂積之久而發之宏矣古大夫以上皆乘車駕車皆四馬漢特命郡守加一馬所以寵榮之也蓋郡守為國家興學校理財賦治獄訟平盜賊恤孤寡保良善寵榮之者責望之重也今制不乘車而郡守皆以五馬稱重漢制也君往矣吾尚有告焉愛勝則民玩威勝則民殘宅心以公則惠博持法以信則令行凡此數者瑛為州日嘗奉以周旋矣敢以告君君不以瑛言為迂而用之參以博洽之見濟以通敏之才則建寧雖大府不足為矣他日天子閲職方必以君為良有司也民無嘆息之聲必以君為賢父母也退而修諸家出而無所沮于國人必以君為得行志也圖之作有光哉湖東春意詩序環番陽湖以東有郡三曰撫州曰廣信曰建昌是三郡者皆處羣山中溪水走駛如建瓴然居民皆隨地髙下鑿池瀦水以備旱乾然水無源委易涸絶故三郡雨暘時則民告足一不時則民多殍成化甲辰夏湖西北諸郡縣皆疾風迅雷大雨雹往往發屋拔木殺人獸是三郡者風不鳴條雨不破塊溪不泛騰山無騫崩黍稷被于野者皆芃芃然時姑孰李公德馨以江西布政司右參議分守茲土貴溪五宜翁乃采民謡為詩以贈公公曰翁臺憲重臣退處林下平日于人慎許可今以是歸我其將以懋勉我乎他日公行郡至臨汝出以示瑛瑛謂漢董仲舒言正朝廷以正百官正百官以正萬民然後隂陽調風雨時諸福之物可以畢致公孫𢎞言人主和德于上百姓和合于下則心氣形聲皆和而天地之和以應二子學雖有純駁然後世談天人者未嘗敢非之自公之分守茲土也凡有大徭役大徴科皆把握扶植豫為之所或潛銷暗沮而移之他及民有鬬爭僅如毫髮公皆羣按之以别臧否而究其情之歸夫民所愛者力也所惜者財也所難平者氣也公皆有以處之此其隂陽所以和乎風雨所以時乎五榖所以順登而年不告凶乎不然則湖西北同此郡縣也同此山川也而一嵗之間災祥頓異吾於是有不得其說者矣或曰事固有所感而得所應者有所感而非所應者湖東君子盡心民事風雨以時此為得所應也湖西北諸君子盡心民事而雨雹為災此為非所應也故湖東春意公固不得而辭湖西北灾異諸公乂奚庸辭若然則或者之談又為達夫事理之變而董仲舒公孫𢎞特論其理之常者耳豫學昧天人而于是惑焉請以是質諸五宜翁翁必有說夢草集序夢草集者小溪主人之所作也凡為詩三百二十五首主人既沒其族弟瑛乃從而序集之於戲詩未易論也蓋詩所以歌咏乎性情者也性情理則詩無不理矣昔成周盛時上而公卿大夫下而士庶女婦皆沐浴文武清化而一時肺腑洗滌殆净故其見於詩者或溫厚和平或端莊嚴肅藹乎治世之音也三代以還不足以語此矣景泰中瑛領鄉薦入試春官館于氷崖翁先生所適主人為吳橋主簿以馬政入閲于太僕氏相與夜坐論及于詩時殘雪初消明月在地主人朗誦其作十數章皆飄然如孤鶴橫空不可捫摸瑛嘆曰兄詩之豪一至此耶主人曰詩不患其不能豪患其不能馴耳蓋髙抗矯激之音不若夷平和厚之為得也問其所自入曰自理性情始要使胸中如碧潭浸秋月無一毫烟火氣而後詩可言也於戲主人其得學詩之要乎豫嘗持此論扣諸人人鮮有合焉安得雪消月明之夜起主人于九原之下相與論詩乎主人諱璋字文達性孝友官終吳橋主簿其祖與吾祖為緦麻兄弟云贈陳同知考績序成化辛卯夏豫知廣德州其冬十月浙西陳君一之來副豫陳君言曰天下郡縣長佐吏賢不肖混淆公私異趨喜怒相銜不足以集事今某來佐君譬如駕舟君其司舵豫左撥右刺而期于必濟譬如驅車君其御豫左推右挽毋庸臭厥載譬如調羮如和藥君其為庖人為醫師豫為鹽梅又為君臣佐使願君不鄙外豫豫為君效力豫曰善於是稽政要搜民隱訪民奸别公私之務定賞罰之科度淺深之序究緩急之宜參於人情揆於物理務銷宿弊而布其新圖豫恆中處君佐豫于外凡豫謀有益于民者君宣布之有裨于國計者輒為贊助惟恐後先是時民以公私債負竄他方君佐豫招徠之者二百有餘家先是民生女不舉君佐豫嚴條約重賞罰共活民間女六千八百有餘口先是倉廪乏君佐豫積糧七萬有餘石先是軍需嵗積不敷君佐豫賦民畝完部牒百數十事先是各衛逋逃卒及府內外工作人部委長吏磨勘送就役君視豫寡于食勞于庶務而佐豫勘解者數百人故豫舟得免風濤之患車得免泥淖之憂鼎不覆餗藥能濟人而不知其撥剌推挽品劑佐使皆君之力也今君以滿三載書績去豫不為君言將誰言嘗記君初拜官時翰林商君良臣謂是州大不臨于司府且某為長吏而得君佐之宜相與以有為瑛不敏不足以辱知已若君善佐豫信乎其為知人之明也君到都下見商君幸為我謝焉送州庠石司訓考績序始豫蒞州輒詣學宫課諸生以敦教事退而觀夫所謂題名碑者歷數上下三十科而登第者僅十有三人因謂環千里之地而為之州聚千里之材而育之庠宜其賢者能者相繼而起矣何遼邈濶踈一至于此因歎息久之他日有告豫者曰州庠分三齊齊分二十生石君所治齊由科目而出者一人由考貢而出者三人石君可謂無忝教事矣豫問業何經曰業禮貢士闕洪君教之也豫既歎科目遼闊而幸石君教道有成方欲聚三齊生于堂上相與教導之而觀其成功石君遽捨我而去矣夫六翮之鳥髙飛百足之蟲善走以輔之者衆也使鳥不六翮蟲不百足其所運轉不過尋常咫尺之間而止耳然則石君之去固豫之所憂乎石君行矣豫聞訓導滿九載以科目得一人為有成績齊中舊氊非先生所處矣翠渠摘稿卷一
