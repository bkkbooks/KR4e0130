body:
  text: 翠渠摘稿别集類五明提要臣等謹案翠渠摘稿七巻補遺一巻明周瑛撰瑛字梁石自號蒙中子又號翠渠莆田人成化己丑進士官至四川右布政使事蹟具明史儒林傳所著詩文集曰翠渠類稿此本乃其門人林近龍選録付梓故曰摘稿鄭岳撰瑛傳稱其文章渾厚雅健詩格調髙古瑛亦嘗作絶句云老去歸平澹時人或未知則其自命固不在以繁音縟節務諧俗耳矣朱彞尊明詩綜沈徳潛明詩别裁集鄭王臣莆風清籟集並載瑛履霜操樂府稱其言怨而不怒足正昌黎之失此集中乃未收之或近龍選録之時去取失當誤佚之歟末附説三篇序一篇詩十八首共為一巻乃康熙戊子其七世孫維鑣于家乘中鈔出以補摘稿所遺者其八世孫成又于雍正壬子求得瑛自撰誌銘補録于後張詡陳獻章行狀稱瑛為陳獻章門人而成力辨其非是以二人之集考之葢始合而終暌者詡與成之説皆各執其一偏云乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8a670a5f9885eeec0ddb7f0ede817c62a550597f7f1369b9dfc690c169070cdd
