body:
  text: 翠渠摘稿巻五明周瑛撰説子大樸名説成化乙酉冬予長子生明年夏予京邸得家報乃制名以歸考記曰名子者不以國不以日月不以隱疾不以山川然則吾名子何以乎夫天地生育之德始於春春生木為盛予家子姓此其始也故制名從木凡木皆可名而樸天地之淳也蓋天地樸則氣化淳萬物樸則生意全君子樸則實學充樸之時義大矣哉人其炎炎而我凉凉人其役役而我逸逸人其訐訐而我黙黙抱虛守素學道之冲反本還原復性之根葆光晦章守吾之真如是則善於為樸矣人而能樸則懿美中積神明内腴而道徳光矣予悲世之人去樸而漓也是以學愈工而道不如古大樸其務反之哉毋徇于俗毋逐于人毋自䘮其淳以傷而真子大櫟名説予長子大樸死人曰樸材故夭因名次子曰大櫟櫟莊生所謂散木也匠石氏所不顧者也其為木也圜不中規方不中矩以為舟則沉以為棺與槨則速腐以為器物與門户則速毁且液㨺焉舉櫟所有皆無所用之然櫟雖無所用而衆木欲與絜長短較大小則去櫟逺矣蓋櫟根盤踞于地數十歩其枝柯出山十仭始有枝其葉蔽翳蘩敷廣數畆遇風雨處其下如重屋然是櫟不亦大乎此無他衆木材斧斤集之矣櫟不材是以得免於侵伐其大如此也夫材而不夀與不材而夀吾固有以擇夫夀不夀之間矣櫟乎櫟乎聳壑昻霄風雨不揺吾將於是乎逍遥五行類徴説天順庚辰正月一日天薄霧日色微黄有霰霏霏而下堂塗檐瓦不受而苑内諸樹皆白未幾人告忠國公石亨反狀上收其從子定逺侯彪斬之繼而亨亦下錦衣衛獄死其説曰此木眚也木屬少陽貴臣之象三陽之月萬物皆暖矣木性反寒而隂脅之故霰下堂塗檐瓦不受而苑樹白此貴臣蒙顯戮之象也當時貴顯莫如亨與彪而取禍之道亦莫甚於亨與彪是以當之天順巳卯徴天下白牛畜之内苑牛壯甚庚辰令牛與虎鬬牛不能勝虎又擇徤馬與鬬馬為虎所斃時太監曹吉祥用事其從子欽典兵横甚明年辛巳秋七月欽反夜三皷舉兵犯闕賴先覺内外官軍効順曹氏父子皆戮死其説曰易坤為牛震為馬坤老陰宦者之象也震少陽貴臣之象也虎山君也百獸望之而震駭焉者今敢與虎鬬我使之也牛不能勝虎馬為虎所斃此君能制臣曹氏父子敗戮之象也牛色白白屬金此兵戈之象也凡五行動皆逢其生旺金生在巳旺在秋故已年七月而反狀舉天地説天地何始曰自太極生陰陽始陽動而陰靜陽清而陰濁其動而清者日旋于外積一萬八百年而天成焉天成日月星辰備矣其靜而濁者日聚于内積一萬八百年而地成焉地成山嶽河海備矣以地言之地形中窿而四窪中窿為山四窪為海山與海皆地上物也中庸曰今夫地載華嶽而不重振河海而不洩此孔氏之説為可據或謂天包水水承地其説非也其不墜者莊子謂大氣舉之也時有震者漢志謂陰有餘也衆水赴海而海不溢者朱子謂水流東極氣盡而散也以天言之天體至大籠罩無外地處其中不過一塊土耳要之上下四旁當有空處談天者謂樹八尺之臬以勾股法求之上下相去各八萬里計天體圜東西相去亦當如是據此則日月升降各行其空處非轉激于水而出之也其盈虛薄蝕亦當於其空處相迎合衝射非隔地與水而為是也今夫人在地上仰視不過五百里平視不過千里故見日月如在水中出耳夫天象大者為日月其次為星辰日為太陽其明無不照月為太陰不能自明借日而明月明有上下弦以去日逺近而分之也十五夜謂之望者日西月東兩相對望耳月中有黑影此其本質也蓋月本黑質其明者日鑠之也日鑠不透故其中黑影猶存古今人以為蟾精兎魄桂樹山河影及稱嫦娥竊藥奔月者皆妄也星為少陽辰為少陰天無星處為辰凡三垣二十八宿皆附著天體日月五星謂之七政則浮天而行張子謂天左旋處其中者順之故日月五星亦隨天左旋以為右旋厯家為省算法故即退數言之也天河此水精也非水也唐史謂河漢海精五月一陰生而漸見十一月一陽生而遂收此説可據列子謂天漢之流注于歸墟以入地底妄也人見天門開此天裂也漢志謂天裂者陽不足也昔人以數求天地毫髪不爽至於論天地形象多出臆度故予特據理而推其説是非必有能辨之者𤣥牝説丹家屢説𤣥牝張隨作圖謂左𤣥右牝是指兩腎而言俞琰作賦謂上𤣥下牝是指心腎而言張平叔著金丹四百字又謂身中一竅名曰𤣥牝此竅非心非腎非口鼻非脾胃非榖道非膀胱非丹田非泥丸乃神炁之根虛無之谷在身而求不可求於他是又不肯明白説破令人猜度不得按老子曰谷神不死是謂𤣥牝是𤣥牝指谷神而言谷神何物乃臍腎之間呼吸之氣也蓋山四圍而中虛曰谷人身四圍而中虛亦若谷然前雖對臍而不著於臍後雖對腎而不著於腎其中虛處一炁存焉其呼而上也自此而起其吸而下也至此而止持其呼吸而煉之則丹由此而造此所以謂之𤣥牝也𤣥以丹言牝以母言言此乃丹之母也張隨俞琰不知谷神為𤣥牝乃妄以左右腎及以心與腎當之又以𤣥牝二字分為兩物誤矣老子又曰𤣥牝之門乃天地根門者言𤣥牝一闔一闢之謂也天地根者言天地由此而生也綿綿若存言不死也用之不勤乃其所以不死也自警説行猶形也名猶影也影以形成名以行立汚其行欲潔其名猶徊其躬欲直其影是惑也情猶水也義猶防也水非防則泛情非義則溢以義約情猶以防止水固斯可矣出言重則人重視之矣重吾言是重吾也出言易則人易視之矣易吾言是易吾也吾輕重係乎言可不慎乎血氣猶火也不戢有自焚之禍言語猶兵也不慎有自戮之禍於血氣而戢於言語而慎禍其免矣慾生於心遂於氣忿生於心遂於氣方其生也其機甚微及其遂也其勢甚猛故禁止於方生之初易救制於既遂之後難久於貧賤者則澹於嗜慾久於憂患者則熟於事機嗜慾澹可以養徳事幾熟可以處世然則貧賤不為害於人憂患為有益於智乎毁我我之仇然有益之道焉譽我我之儔然有損之道焉蓋常情見譽則喜喜則自足自足則止損孰甚焉常情見毁則戚戚則自勉自勉則進益孰甚焉水不靜則不能鑑物心不靜則不能燭理蓋靜則虛虛則明動則撓撓則暗是靜虚其義理之窟乎動撓其義理之障乎養心當以寛急則病立志當以猛弱則隳故漬物於水久而浹洽此養心之喻也渡河焚舟有死無二此立志之喻也以心治身猶以身治人也心與身一體也一不知檢則目或妄視耳或妄聽手足而或妄動人與已彼此也告之而未盡其誠使之而不由其道則怒且詬是惑也命有窮通故事有逆順或得人之薦我非人薦我也吾命之通假人以薦我耳或遇人之擠我非人擠我也吾命之窮假人以擠我耳故恩無不報而怨有不仇此有徳者之事也處人之道不過於處已見之處國之道不過於處家見之故推諸身而人道得推諸家而治道成得失在我是非在彼我得矣而彼以為非於我何損我失矣而彼以為是於我何益得失求諸我是非置諸彼此為已之學也雜説張子謂達天徳便可以語王道其要只在謹獨所謂天徳者是理得於心純粹至善無一毫人欲之私也獨知之地不能致謹則人欲間之矣何可以語王道王道是治道之至純者也由天德而出者也程子謂玩物䘮志蓋玩有耽之之意耽而忘反則志為物所奪矣書史翰墨皆然周家治天下其本專在二南周官則其紀綱法度之施蓋二南之化以閨門為本文王意誠心正而身修故后妃化后妃意誠心正而身修故媵妾化媵妾既化公子公孫公族皆化桃夭以下國人化之矣漢廣以下則天下化之矣周南亦然二詩皆詳於婦人者以化行必自婦人始自古天下國家䘮亂皆由婦人故周公采詩詳於此者所以致戒也由是觀之程子謂有關雎麟趾之意然後可以行周官之法度信然不然則王莽簒漢宇文造周亦皆行周官法度矣何補治道哉凡治道以閨門為本閨門之行以勤儉不妬忌為本觀諸二南可見矣文王為西伯太姒為夫人亦何求不得何欲不遂太姒方且為絺為綌害澣害否勤儉何如之夫人勤儉如此則媵妾而下孰有不從化者乎媵妾既化於勤儉則君王豈有横取於民以充後宫之費者乎不横取於民則生民何自而窮乎盗賊何自而發乎社稷何自而危乎若夫不妬忌則又女徳之盛者也后夫人不妬忌則衆妾皆得以進御於君子矣衆妾進御於君子則閨門之中讒隙不生讒隙不生則嗣續繁昌嗣續繁昌則國本堅固故周家八百年天下而諸姬相為藩屏不易摧折者實自后妃不妬忌中來也作字説凡書以意為主而氣輔之神化之筆磨墨黙凡種種諸俗態皆不入於思惟此命于風雨若行兵上不見天下不見地旁不見人沛若有所歸此挾于氣者也出乎人機入乎天機半由及得意處聖智不能自知此㑹于神者也命于則精挾于氣則壯㑹于神則妙意也者由學而得之也氣也者由養而得之也神也者由習忘而得之也弗學弗精弗養弗壯弗習忘弗能以為妙故書之至者意也氣也神也皆合而為一者也潮汐説潮汐何自曰氣主之也氣主云何曰天包地外地處天中一元之氣升降不息方其氣之伸也萬竅皆盈而潮以長及其氣之縮也萬竅皆虛而潮以消是故晝夜之間潮凡兩至氣一伸而一縮也朔望之後潮凡兩大氣一盈而一虛也伸縮盈虛氣有定數消息大小潮有定期潮應夫氣者也今夫人一呼一吸而腹厭隨之蓋有數焉不可妄有所增損也有所增損則災疢作矣潮汐之説何以異此或讓予曰如子所言則所謂歸墟以受水沃焦以涸水尾閭以泄水神鰌出入穴以進退夫水其説皆非與曰非也吾所説者主夫氣也他為説非吾所知也賽蘭説嶺南有草曰賽蘭其狀不蘭類而香過之近有移入閩中者予客臨漳館于陳以舟氏一日與以舟㗸盃有香入牕户撲簾幌徘徊几案間如沉檀火爇而風揚之也予訝之以舟曰此所謂賽蘭也予起視賽蘭而不得以舟指以示蓋其樹如梔子其枝有節如牛膝其花附枝如聚粟予以其貌之凡而怪其香之異退而嘆曰夫蘭稱於易著於禮載於左氏盛言於楚騷古今論草木之香者必歸於蘭而天下之人莫不知有蘭也今此草稱賽蘭曾不得一登名於譜牒托根於䑓榭而使騷人墨客得以發揚其光采予傷之方擬作孤芳操以弔賽蘭或解之曰賽蘭人知之其香自若也人不知其香亦自若也庸何傷或又解之賽蘭善於為香而不善於為人之知此所以為賽蘭也予以客言大發予衷作賽蘭說内象説人喉中有食氣二顙氣顙在前食顙在後氣顙剛乃氣所出入食顙柔乃食所自入氣顙下屬肺肺下屬心與肝心在肺下肝上居中肝在心下偏左膽附于肝肺心肝皆懸掛于胸中食顙下屬胃胃在膈下脾横絡于胃胃下屬小腸小腸屬大腸大腸盡處為糓口大腸小腸皆盤曲左旋腰兩旁為腎腎貼脊骨而生皆有膻肉包裹左為腎堂主氣右為命門主精及相火對脊為臍臍為命蔕小腹為膀胱膀胱只有一系下屬陽管後自脊膂而下前自臍腹而下筋脉聨絡至陰骨盡處實生陽物其中有竅一屬膀胱以泄小水一屬脊骨下尖名尾閭泄精又有氣管數條似筋非筋似肉非肉其色黄其中虛有一大者貼脊骨如弦下屬尾閭上屬於腦疑督脉路也又有數小管通肺通肝通心以及腰股腰臍諸處疑任脉路也人飲食由食顙入胃脾摩化之其清氣上騰苦走心酸走肝辛走肺甘走脾鹹走腎以滋養五臓其濁者入小腸化為穢下至闌門分為二路糞由大腸正中而下由糓口而出小水循大腸膀膜旁出澹滲入膀胱由陽管而出氣生於左腎循氣管上下通貫百脉以㑹于臍注于氣海精生於右腎隨氣而行流布於四體以㑹歸于肝注于腦海又兩足心為湧泉穴發水火二氣上通於腎此其大凡也内外象通説昔人謂身是兩片合成此分陰陽言之也蓋後一片自足腿而上由背及腦至于上唇屬陽前一片自小腹而上至于下唇屬陰其中包藏五臓六腑曰肺曰心曰肝曰脾曰腎是為五臓曰大腸曰小腸曰膽曰胃曰膀胱曰三焦是為六腑肺臓以大腸為腑心臓以小腸為腑肝臓以膽為腑脾臓以胃為腑腎臓以膀胱為腑三焦無正臓屬腎原氣之别為外腑或曰人有六臓六腑蓋腎有一臓三焦其腑也經謂臓地氣所生故藏而不㵼腑天氣所生故瀉而不藏又謂二者或同位而相輔或異位而相感其次第皆自上而下人咽喉有二管在前而剛者為氣管在後而柔者為食管氣管為肺系肺臓屬金其色白其府大腸與肺異位亦稟金氣而色白肺凡六葉中有窽竅主藏䰟與行氣心與肝為系皆屬于肺心居上中肝居下左心臓屬火其色赤其府小腸與心異位亦稟火氣而色赤心圜外竅中主藏神心外有包主相火血經于心而化故色赤人聰明由心竅故上智有七竅三毛中智五竅二毛下智三竅一毛常人二竅無毛愚者竅小其甚者無竅肝臓屬木其色青其府膽與䏏同位亦稟才氣而色青肝凡七葉是為血海主藏魂經謂胆為清净府内無所受只盛精汁三合而已人身中有鬲以分上下肺心肝膽皆在鬲上其狀纍纍如懸鍾然食管為胃系其系長通于鬲下胃為脾府脾與胃同位脾土色黄胃禀土氣其色亦黄胃盤曲鬲下脾如蓋横絡于胃主藏意與智及主裹血以温五臓助胃化水榖氣以為榮衛胃下有小腸小腸下有大腸皆左廽疊積凡九曲經謂小腸為盛受府其上口與胃相接號幽門受胃糟粕受已復化傳入大腸經謂大腸為傳送府其上口與小腸相接號闌門主分水榖大腸下屬廣腸號魄門蓋肺氣所出也又號肛門又號榖口乃不㓗所出也腎臓屬水其色黒其府膀胱與腎異位亦稟水氣而色黒腎有二在左右脇下貼脊骨兩旁左為腎堂主氣屬水右為命門主藏精與志助心以行相火命門之精與腎堂之氣兩相槖籥乃人生身所自丹家指為𤣥牝乃結丹所自經謂膀胱為津液府有脂膜一路循大腸而上接于闌門糓化為糞由大腸正中而下水化為溲循脂膜旁出滲入膀胱蓋膀胱有出口無入口水澹滲而入其出口屬陰器中由此順泄而去三焦為腎外府主持諸氣當于水糓徃來之路上焦當胃上管主内而不出中焦當位中管主腐熟水糓下焦當膀胱上口按膀胱無上口此云爾者即闌門是也主分别清濁人腎氣通耳肝氣通目肺氣通鼻脾氣通口心氣通舌故腎氣和則耳聰肝氣和則目明肺氣和則鼻聞臭脾與心氣和則口舌知味人有九竅耳竅二目竅二鼻竅二口竅一此七陽竅也陽竅者所以通陰氣而上之也陰器竅一肛門竅一此二陰竅也陰竅者所以通陽氣而下之也復有尾閭一竅不在九竅之列其竅與陰器同出所以泄精人身中有氣管似肉非肉似筋非筋色黄内虚是為氣路其總管貼脊如弦下自尾閭上入於腦又分為小管入于耳于目于鼻于口中内通于肺于心于肝外通于手于足人血周流於一身而藏於肝其行也心主之人氣充布於四體而聚於氣海其生也腎主之人髄在骨中其盈虛也係夫氣與血氣血盛滿則髓盈氣血衰耗則髓竭人筋聚夫陰器其伸縮也肝與腎主之肝血來腎氣至則伸而出血去氣收則縮而入人齒牙亦腎所主人少時腎氣初足則齒生老時腎氣敗則毁人頭中腦修養家以為泥丸蓋五行結秀腦厚則夀長腦薄則夀短其為厚薄係積精與氣何如人臍為呼吸二氣所㑹人在母胞胎中由此呼吸既生而結斷之則由口鼻呼吸呼之根自此而起吸之根自此而止故修養家以為臍輪言衆氣輻輳於此也又以為命蔕言生身係於此也凡此一身造化非惟學醫與攝生者所當知而君子格物窮理亦不可以不觧也育蠶説有豸能絲曰蠶蠶待人而育也近川而室樹棘而牆其器曲植籧筐以下而備及夫蠶之也未齊而蘩既齊而桑夜或明炬以臨晝則容觀功使之不遑焉然則蠶之育厥惟艱哉夫蠶始生如芒其次如錐其次如筋其次如指至於如指而蠶成矣蠶以主人育之之勤也於是盡其技以報主人其口始吐忽忽焉絲絲焉宛轉不已而繭成焉繭成蠶不可得而出矣主人聚繭爚諸湯而絡之而蠶死夫蠶食主人之力而報以絲以絲之故而竟殺其身蠶固無負於主人哉國家育賢猶育蠶也為之學校以教養之為之科目以登用之為之爵賞名位以褒榮之國家養賢可謂至矣為之賢者由其養而不率其教蒙其恩而不知其所以為報平居無事未嘗思所以樹立以禆益國家一旦有急相顧而駭卒無一人抗節仗義以死其事者焉烏虖蠶報主人以死臣子報國家未必皆以死可以死而不死尚以蠶勸其心哉予因説蠶以自警跛民説予知廣德州日當有事於民舍民有跛者盤綽而前予曰子何足之跛也跛者曰吾嘗馬出馬駭不可制是以傷足予曰馬所以逸我者而有危道焉何不舍馬而歩足固無恙也跛者曰今之馬出者亦多矣皆未嘗跛而吾獨跛非馬能跛人人自以致跛耳使吾如夫人者謹其䘖勒約其步驟朝蹀躞而出暮欵段而歸何逸如之惟吾好逞窮馬力以盡吾豪是以及焉豈惟是哉君宰制一州猶御夫馬也御得其道則州人無貴賤大小皆惟命是聽茍失其道則民駭不可制又不但如吾足之跛也予曰善此麥丘邑人之意因出壺觴以飲食之且記其説以自警螭杯説維歲辛卯瑛奉天子命為州長吏以恊庶僚以貞百度維歲時有宴用作螭杯以饗客其説曰螭杯之作其酒戒乎其制上豐而下儉外抱而中虛上豐下儉易覆也外抱中虛不溢也螭之為物少仁而多威者也凡主與賔交愛勝則流威勝則節故飾杯以螭欲有節也昔者先王制為燕饗之禮賔主百拜此以敬勝也敬勝與威勝其義一也然則飲是杯而思其義酒禍其免矣乎收古琴説凡古琴宜入囊納諸櫝中取出鼓之旋復收拾不可卧地上地有濕氣不可庋壁上壁有冷氣夜皷不可置露月中避濕冷二氣予初得金石交患其久冷依古法以熱沙盪之沙過熱被絃如皷次日以湯蒸之微使汗溜其音始清和又一夕置露月中失收旦音不發復以熱沙微盪之其音始復初蓋古琴與老人相類老人氣虚外邪易感不可不慎文廣徳考滿囬任闌門祭神文維年月日具官某敢昭告于各廟之神維瑛不敏承乏是州得免官謗維神之休考績來歸蒞事伊始謁見于神神其鑒只語曰無倦易曰有恒勉兹終始以保名稱朝覲囬任祭神文維年月日具官某敢昭告于各廟之神瑛以去秋告神入覲荷蒙國恩得免罪釁顧以凉薄叨任大州事有克濟實賴神休兹當蒞任敢與神誓凡厥攸為曰惟仁義不欺僚友不負吏民有食斯言神殄厥身辭祠山文神道孔幽可揆以理維山維岳維神之體民罔有知誣神實多踵偽襲訛神莫之何小子不敏起為神辯神不我怒禎祥屢見維神正直兹焉可知民膠舊習未釋厥疑今辭于神尚有後祝毋享非祀毋降滛福諭豪强文撫為縣五豪右多賊虐同類予到郡為文以曉之咨爾豪强胡為不臧父子桀驁兄弟陸梁其狂如猘其狠如羊其毒螫如蛇虺其饞噬如虎狼其視刑憲也甘如飲食其處囹圄也安如堂房併寡弱吞善良侮詩書蔑冠裳雄視四境之内謂人莫敢予當殊不知好善惡惡天之道也賞善罰惡人之道也汝不見夫虺蛇乎虺蛇嘗螫人矣一旦失其巢穴則人皆碎其首斷其脊扶其膏筋以惡之者衆也又不見夫虎狼乎虎狼嘗食人矣一旦覆諸陷阱則人皆剥其皮臠其肉刳其胃腸亦以惡之者衆也蓋刀剛則缺木剛則折人剛則㓕古之道也請稽諸載籍以告汝楚有越椒氏初甚凶悖繼而覆㓕虞有檮杌氏初甚傲狠繼而放逐漢有梁冀氏初甚跋扈繼而誅戮此其為可考者也蓋其勢得時則指顧風雲叱咤雷霆人皆畏之及其勢去時則身死財散而家亡又何其慘也咨爾豪强胡不改張保爾室家守爾農桑小忿毋競小利毋攘鄰里相安宗䣊相將以謙抑為干盾以慈順為提防則汝有事至于官府也吾當愛汝敬汝與汝家人父子之相忘顧不美與豪強豪强亟圖改張聽我訓言其福無疆祭范文正公文維成化七年歳次辛卯八月辛丑朔越二日壬寅直𨽻廣徳州知州周瑛敢昭告于有宋范文正公之神惟公禀氣剛醇宅心正大學貫古今才通經濟宋祥符初辱為是軍司理案無弊牘獄無寃民得代而去賣馬以歸其亷介清勁之節至今桐人猶能道之雖然此其一事也若公先天下之憂而憂後天下之樂而樂功在社稷澤在生民割地以建郡學置田以養族人雖位極將相而貧終其身若公者真可謂大丈夫者與瑛承乏是州景仰風槩謹依故事以八月二日為公初度用羊一豕一獻于祠下惟公有神睠然其顧之尚享祭王修撰文維成化十一年嵗次乙未三月清明日直𨽻廣德州知州周瑛謹以牲醴致祭于故翰林修撰王公原采之墓曰凡氣節不足而事業可觀君子弗取也行檢靡修而文章可傳君子弗與也先生事業未著而氣節可書文章既就而踐履確如是可謂孔門之志士今世之偉夫者與祠山蒼蒼赤城茫茫形葬異土神返故鄉拜以招之其來洋洋又維年月日具官敢昭告于故翰林修撰王公之墓曰雨露既濡草木蕃只魂魄無家泊林巒只我念忠義摧心肝只汎掃荒蕪奠椒蘭只聲氣相通庶盤桓只尚享祭廣德州鄉賢文維成化十三年歲次丁酉八月乙未朔越十有五日己酉直𨽻廣徳州知州周瑛謹率僚屬暨儒學諸生致祭于廣徳司户參軍趙公之神廣徳知縣王公之神翰林修撰王公之神誓節張君之神太學講武吳君之神太學生倪君之神孝子李君之神姚君之神處士張君之神查君之神竊惟天下郡縣皆建鄉賢祠以祀先哲蓋所以樹之風聲教之徳義使後學小子有所感慕興起其助化理也大矣顧兹廣徳為學獨無所謂鄉賢祠者非闕典歟瑛承乏是州既新學宫復作祠室於萬桂山下慱考郡志得鄉賢李公彭年以下八人又得死事是邦之賢趙公時踐以下三人或孝於親或忠於君或勉於為學或甘於退處蓋孔子之道廣大悉備而諸公皆得其一節者惟是一節亦自全體而分要之能造其極皆足以軌世範俗也今者祠室告成敬用遷主謹以一羊一豕獻于祠下惟羣公有神來顧來依尚享告故郡倅張君文君名睿山東濟寧州人通判撫州府居官亷慎九載如一日既没撫人懷之於戯張君其死耶豈所謂其數然耶君為官所司者財賦也所與理者催科也他人處此鮮有湼而不緇者君未嘗暴物以取悦於上亦未嘗廢職以取尤於上既亷且慎始終如一今其止於此非數耶予病在牀褥聞君死蹶然而起忽君家遣人告予曰周身無以為殮返葬無以為資於戯此非我之責耶君死無有知耶固不知所以為悲若有知耶則殮君者在我葬君者在我歸君之孥者亦在我君當瞑目毋虞身後或至於流離惟君其亮之又居官之道君不負我處友之道我不負君青天白日予知君心暗室屋漏君知予心祭都憲髙公明文出處士之大節也觀先生終養録則知致力於出處者至矣死生人之大事也觀先生安宅録則知致力於死生者至矣蓋先生識趣髙逺德性堅定其為學也知所以自立矣故擇義以為進退不以髙官大爵靡其心乘氣以為徃來不以死生夀夭亂其志至於其他有樹立亦多光明俊偉可與古之英人偉士相激摩於戲若先生者可謂今日海内豪傑之士矣瑛蹇劣無似誤蒙聖恩授以大郡凡所設施衆皆却望而走焉獨先生重加奬諭以為合於古人之道易簀前一日猶楷字端書告别於瑛且進勸勉規戒之言於戲瑛未嘗識先生而先生屬意於瑛如此可謂以道義交矣今先生徃矣瑛倀倀然天地間挈此將奚之雖然士亦貴於自信而已位去道存身朽名在敢不自勉以負先生之誨言乎先生體魄入地精神在天其或鑒于相與周旋書復林孟和進士書承喻求聞過此盛徳事也夫人不能無過但不幸不聞過過而得聞聞而能改則復於無過矣然過與惡相似而實不同先儒嘗言無心失理為過有心悖理為惡之二者一可告一不可告蓋無心之失彼所未知也人告之則悔悔則改有心之失彼固欲如是也人告之則辯辯之不得則怒人孰敢以告乎雖然孟和既有求於予予惡得不盡言於孟和哉蓋凡處人之道不過於處已見之已欲如是人亦欲如是已有所未安人亦有所未安故嘗謂處已之外無復處人之道也孟和居鄉其亦嘗以處已之心處人否乎茍以處已之心處人而人復吾詆焉則孟子所謂妄人也孟和何較焉孟和求聞過而予推言其心正其本也不正其本而惟過是攻吾恐徃復辯論大費詞説無益也孟和以為何如寄太守鶴洲兄書兄自朝覲歸政聲日起瑛與平日相徃來者皆甚喜近人自撫州來者或告瑛曰明府諸政善矣然舊設馬夫及快手仍用之未善夫政無善惡安民者為善政法無當否便民者為良法今聞馬脚夫初為荅應上司而設然久甚專利或者不如里甲輪流之為便快手舊為勾提犯人而設然久甚生害或者不如手帖能致人之為善大抵上受一便者民受一害也吾心之愜者民心之妬也瑛前有書附本府知事來亦道此意倘察其未善而去之則及民之惠日益廣也禁絶小人一節甚善榜招人首告誆賺亦甚善自此左右可以無蔽矣兄固盡人言者茍有所聞能無從乎人囬因復附此讀朱給事諫章走簡慰其父叔人傳令子與諸同志奏疏一通披讀之餘拱手起敬夫官以諫為名遇事即諫義也至於事之成敗官之得䘮有命存焉君子不計也今令子為諫官其所論列盡合於義雖曰去官心何恧哉昔東都黨錮興善良竄伏范滂母獨能勉滂就獄母婦人也猶愛子以義况稱丈夫其可無母之心哉為父兄者宜釋懷以就逺大與陳漢崇員外承手帖每告以貧與忙瑛謂處貧當以儉處忙當以勤以儉處貧以勤處忙雖窮迫匆遽未嘗不暇裕也近者進階大夫此蓋耐貧與忙所致向貪墨以嬉則敗矣何能此相見何時臨紙惆悵與鄭檢討瑛頓首再拜言乙酉之夏而有蜚山之别厯今四寒暑矣暮春人到聞先府君奄棄榮養不勝驚怛恭惟孝心純篤其於居䘮節次無不如禮甚可敬仰大抵居䘮敬為上哀次之瘠為下蓋能敬則哀瘠在其中矣曩先君見背瑛匍匐南歸敬衰瘠皆有可觀及夫為日既久敬心少衰遂駸駸至於廢禮比思之甚懼始知先儒教人為學必先於敬真千古傳心之要道也曏在京所論廬墓乃中人以下事此説似有理蓋能敬則廬墓不必為况廬墓即廢許多禮節似又不可為也願閣下持敬以貫䘮之終始無使他日有悔焉者吾道之幸也弔慰未由不勝哀感謹奉狀不宣奉王司馬書奉别以來戀慕殊切恭惟起居萬福為喜為慰嚮為林員外後所上封事瑛最後始得見之林員外同瑛莆田人其言忠憤闓切所論惜財最今日要務先生獨能推其心原其意請釋其罪蓋先生非為林計也為國家計也其誠意懇切天實臨之聞疏入天即為變豈適然耶抑誠有所感而然耶傳載周公反風止雨事未必皆適然也其理微矣瑛赴臨汝時辱先生酌之酒且贈之言蓋愛而教之也瑛到官奉教言以周旋不敢怠惰但六事所謂詞訟簡盗賊息他日當以殿書也蓋臨汝近時詞訟蝟興盗賊蜂起詞訟日理而日有盗賊日撲而日生瑛嘗反求其本矣蓋能使民無争心則詞訟自簡矣能使民懷耻心則盗賊自息矣故於聽政之初嘗令各縣自城市以至鄉都皆以十家為保大鄉十數保小鄉一二保族大煙多則釐之族小煙稀則合之責令鱗次挨排不許遺漏每保立一保正使主十家善惡有善互相勸勉有惡互相勸戒重同保之義嚴連坐之法其要在於使民割小利懲小忿毋蓄争心保故居修故業常懷耻心則詞訟可簡盗賊可息也然上之人皆以此為迂今日督理詞訟明日督捕盗賊夫事有已然者有未然者遇詞訟告訐而用心以推理之遇盗賊生發而設法以撲㓕之此皆治之於已然者也若夫把握扶植濳消暗沮而使争心不作非心不萌則皆制之於未然者也今皆不思所以制之於未然而徒治之於已然故曰詞訟簡盗賊息他日瑛宜以殿書也先生論治最重儒術不知此亦可以推行於時否乎若曰談河不可以止渴畫餅不可以充饑則瑛當以此論束之髙閣未免隨時為之以紓目前之急而已參侍末由不勝瞻仰伏冀為國為民以道自重使天下人士有所依歸至願也不宣復髙都憲五宜翁參侍末由深切瞻仰信來承喻寛猛相濟之道是教瑛揆道之中反政之偏求合於古人而已所謂寛以濟猛猛以濟寛其説出於左氏晦翁嘗謂左氏此説未盡道理因自謂欲以寛待君子以猛待小人瑛得其説而推行之自入仕以來奉以周旋今撫為郡千里全謂君子不可也全謂小人不可也故瑛於撫之人士寛猛蓋異施也不知先生以為此説如何奉以求正幸卒教之不備寄彭從吾書近得徐縣慱書知以是歲九月初六日視事矣方朝命下南都人士皆相慶彼蓋有所考而然也節鉞所至其大有以慰滿人望者乎瑛嘗謂今日居官宜認題目所謂巡撫者蓋巡而撫之也其意在於使官得以安其位民得以安其業相與以成治功故官非甚貪暴民非甚㓙悖可無動也近日巡撫置理刑官瑛竊謂此計未得也蓋巡撫宜提大綱凡政事有關於大計宜為處分使民去危就安若一應詞訟宜付有司使自為之有司不能聽而責讓加焉彼固有不得而辭焉者今以詞訟操之於已又置理刑官以専理之民好争好勝孰肯自有司而止也雖以理訟適以啟訟其為計未得也不知尊兄何以去取此瑛病新起敬奉起居不覺踰僣伏冀裁察上王冢宰書昔先生西歸瑛聞命震悚道逺人迂不及修問及先生起林下位冢宰進退百官瑛方待罪夷壤又不敢奉問然竊以為修問以通私情因修問以通公義亦未為不可昔劉元城從温公遊及公居政府遂不通問嫌私情也瑛學行雖不及古人安敢以私要結於先生仰惟先生入朝二載矣聞引歸之疏凡六上矣豈倦于勤耶亦豈事與時違而不得以得其志耶瑛聞之舉網者必提其綱振衣者必挈其領政事綱領君心是也昔孟子三見齊王而不言事曰我先攻其邪心此治其綱領也大學論治國平天下之道本於正心誠意而又本於格物致知此所以明為綱領之道也方今主上質睿而年富行篤而志専其於綱領實易振舉伏願先生與一二元老表裏恊和専以涵養君心為務曰如是而安如是而危如是而治如是而亂如是而得如是而失如是而正如是而邪使君心於治體洞有所見則邪人自不敢近弊政自不復作天下之事皆可以漸而理矣若不先於此而只就事論事是為臺諫之職非大臣之體也先生以為何如瑛有八十歳老母在堂思歸之心如水東注春初親見巡撫巡按陳情未蒙俞允然既食君之禄而又不敢偷安謹有封事數條上塵睿覽大槩為北方畫計非出位妄語廷議之日倘蒙主張一二則瑛之策之行即先生之道之行也為此不避嫌疑謹修尺楮托本府舉人歐昇賫入京師俟朝覲考察後投上伏乞諒察復廣徳劉太守介夫瑛久處林下忽來使到門承手劄開喻云云并州縣諸人所上詞狀外加禮幣殷勤瑛拜領之且感且愧始瑛作州無他伎倆但求免得罪於百姓而已今跡已陳矣不意州縣人尚記憶之如是又不意閣下税駕是州又俯信之如是生祠之建心甚不安像塑之設心亦不安想閣下意不過假瑛一人以為後人勸而已然此不待求之他也閣下與瑛同此學此理又與瑛同此心志勉之而有大焉者瑛當處下座而處公上座矣願勉之試問州之人必以瑛言為然不一復鄒監司賢書蒙専使入莆屬瑛作題署瑛不敢以耄荒辭謹依命作去模寫全要入木用模本乞檢閲收入聞大帽山賊勢甚熾早晩將進兵矣羣公熟議自有成算野人過慮敢用凟告竊謂今議三面進兵閩兵脆弱不足以當一面儻有敗衂賊必東趨賊東趍閩中城守单弱倉庫空虚加以一二惡少而與之合則閩殘矣安得合三省兵而混揀之以勁兵摧鋒壓陣以弱兵為之聲援然後可以無虞又宜檄府州縣各相團結以為捍禦之計每户各查照丁口給與由帖庶官兵所加得以自别不至玉石俱焚也凡此所言非但為瑛身家計也為鄉里計也非但為鄉里計也為國家計也交淺言深浚恒凶瑛是矣乞埀察與賀繡衣泰書奉上參同契管見蒙奬喻太過所喜者得入覽中間得失必有見教處此事頗有關係乞終留意承喻地方事未審該部作何指揮瑛謂賊固可慮而民從賊尤可慮蓋賊有數而民從賊則無數也方今民窮財盡風俗薄惡加以天時亢旱人皆思亂願先生熟思審處先有以固結人心則於賊從事宜無難處者此意惟可與先生言他人未免以為迂也不備上當道平賊狀兹廣昌弗靖重煩旌節逺臨騎步南下人心皆如挾纊昨進拜軍門命條陳事宜以獻顧惟廟堂之上自有成算而書生素不知兵何敢妄言然竊思之聚衆十人必有智士行刼百里實皆死夫今廣昌賊聚衆五百人矣誠不可不慎重以處之也謹以事理所當先者備陳于后伏乞採擇一募戰士嘗聞兵貴精不貴多今官府收調皆脆兵不可以戰宜急令衛所就行伍中選戰士又令府縣就都里中選戰士凡平日驍勇習武藝者皆招募以來或鞭爬或刀劍或牌鎗或弓弩或砲銃各隨其技之所長而使之軍法曰兵無摧鋒壓陣者敗蓋一夫賈勇萬夫作勢此諸軍之率也此等人士宜厚加廪餼重加賞勞使居前鋒然後可以㑹戰一選戰將嘗聞有强將無强兵盖將强則兵自强是將尤不可以不擇也但今衛所官俱未經行陣宜擇其有威望衆所畏服者使部領人馬或為前驅或為後援或為巡邏游擊皆喻以忠義結以恩愛許賊平之日論功定賞一固營壘凡出戰不可以全軍委敵儻一不利則掃地無餘矣故聚兵萬人以上須立總營環牌以為城列㦸以為門弓弩砲銃鎗刀鞭爬種種備具每與敵戰出其精銳或一千或二千更畨迭上遇我軍來奔則開門以受之敵人來衝則閉門以拒之故出戰者進有所恃以為援退有所據以為安此軍法之善者也一分竒正軍法曰兵以正合以奇勝鳴金鼓張旗號彼以陣來我以陣徃此正合者也而奇則正之變而用計以取勝者也如兩軍交戰勝負未决而主將别出精鋭或衝其左或擊其右或突其前或躡其後或佯為敗走誘置死地或設為埋伏邀擊其歸路此皆所謂奇也蓋自古行兵未有不以正合以奇勝者近時兵皆混而為一旅進旅退幸其得勝者由敵脆也一慎交合兵之勝敗在初交合一交合勝則士卒生氣旗幟精彩一交合不勝則軍衂矣是故開强弓發勁弩打飛鎗架火銃此殺人於百步之外者也不能殺人於百步之外則不可以妄交舞刀牌擊鞭爬戳長鎗劈大斧此殺人於數步之内者也不能殺人於數步之内則不可以妄出故交合之初務在必勝大要在於集吾勇敢選吾鋒銳以我之長擊彼之短以我之堅攻彼之脆則可以交合矣不然是自棄其兵也一重賞罰兵法重賞罰所以齊人心而决勝負也蓋人孰不貪生惡死以貪生惡死之心而驅以就敵幾何不敗乃公事故軍法進則生退則死合千萬人之衆使皆有進而無退非重賞罰何以致之一謹鄉𨗳軍法必先鄉𨗳然鄉𨗳又不可以不審也嘗見强賊詐為地方里老或火甲報説賊情主者不察即隨以徃多䧟其計中矣故凡來為鄉𨗳者察其言語少異即拘留之别遣人以探虗實然後應副庶不誤事一多間諜古以賊捕賊而得賊之力多矣今賊至數百人必有頭腦必亦有徒屬其勢必相役使中間必有桀驁不肯為人下者必有得財不均而相忌者亦必有始雖從逆中却自悔而願歸順者誠能多為間諜以離之或用計以誘降之使以賊捕賊亦策之善也又聞近寨大户亦有一二主賊此可以計用之一覆巢穴聞賊以某寨為巢穴四方無藉屯聚於彼今其强壯雖出掠而妻孥輜重在焉為今之計宜選乖覺人役潜抵彼寨探其虗實果如所聞且緩我軍莫與交戰呼某處某處軍徑攻某寨賊聞巢穴受攻必退自保然後以我軍躡之彼攻其南我攻其北而賊殱矣此兵法所謂奇也能用此計則江省南陲可數年無事矣一團保伍竊謂賊勢孤則易㓕合則為憂未歇也為今之計宜督郡縣各固守地方每鄉皆以十家為保每十數保團成一大保皆以原僉巡捕大户領之或别擇有丁粮衆所信服者領之每保聽設鑼鼓器械晝夜相與防守一保有警衆保皆出儻遇奸細入保即便擒捕或保内惡少謀要從逆亦即擒捕如此則家自為守人自為戰而賊勢孤矣翠渠摘稿巻五
