body:
  text: 翠渠摘稿卷六明周瑛撰樂府樂府自漢始詩詞之變此其最古者有所思鄭夾漈以為食舉之樂今擬之寓懷君之意有美人兮天之北願一見兮不可得霜露結新寒美人衣裳單持此錦襜褕北望空盤桓望美人兮愁轉深思之苦兮涕沾襟慿誰奏鍾律轉成韶濩音天地回陽和慰我相思心上之回題義謂漢武元封初至雍遂通回中後數遊幸此其遊石關望諸國而作蓋誇時事今擬之勸以德為主上之回樂何極回中道路無梗塞北望單于庭西瞻月支國信使往來干戈屏息上還宫益修德艾如張釋題艾刈草也如讀作而張謂張網也此指狩獵而言蓋喻世網密張狡計得脫良善受禍可傷憫也有機網張林麓犬嘷機發獸窮蹙雉粥粥兔逐逐雉騰折翼兔濳伏我傷夫雉不善逃生兔狡得脫雉馴受烹艾如張吾爾傷琴操亦樂府之屬猗蘭操題義謂孔子傷不逢時而作今重擬之維山有谷露瀼瀼兮維谷有蘭揚孤芳兮我行四方荆棘蔽野採芳而佩知蘭實寡我思文武于鎬于豐欲往從之路阻不通路阻不通吾道非矣掩袂漣洏與世違矣龜山操題義謂季桓子受女樂孔子諫不聽而作今重擬之維龜之大奄于東魯不雲不雨不能藝稷黍神懠不食民擕不附我出東門悵其望汝越裳操題義謂周公因越裳來朝而作今重擬之海不揚波越裳來格匪輔𨗳之力惟我祖文武之德月盈則虧日中則昃朂哉孺子朝夕兢惕詞調此樂府之變寓南都題西園池亭用宋僧晦菴警世韻宇內寓形何須問足與不足天生物五行均賦有嬴有縮譬如車輪三十輻迭為上下交翻覆履前途孰謂皆夷平無礫碌荒山下一間屋敗壁底一瓶粟少有人於此肯著雙目器小不能勝大受命窮豈足膺多福請從今消釋此生心休多欲右滿江紅林見素赴雲南憲副過鎮逺贈豫臨江仙浪淘沙二詞依韻答之記得髙齊相對坐孤燈疏雨寒宵玉驄一去杳難招天涯芳草路轉入望中遙百歲光陰秋夢短鹿埋何處芭蕉舊情偏傍故園饒酒杯江上飲吟鐙月中敲滇海雲深逢老象時於沙底埋牙知君歸興入春賖鳳山煙雨裏數盡舊時花聞道天家收放逐玉堂新草黃麻仙源好去問靈槎未應同老我風雨漫思家右二闋次臨江仙韻樽爼識英雄玉立山嵸孤懷不與俗人同一疏汪洋憂國淚非少非翁楚水掛煙蓬路入黔中青天似念逺人窮有腳陽春行處好暫爾勞公夜雨幾畨情短夢長更一壺春酒待君傾白馬不來花落盡對景心驚記得舊時盟鱸膾蓴羮欲搖晚轡聽春鶯只恐東山歸計早有負蒼生右二闋次浪淘沙韻再用前調書懷二闋髙閣日長人語靜風鈴時動簷牙故鄉道路望中賖只慿寒夜夢和月到梅花春事闌珊雙鬢短襟懷半在桑麻落英無意戀枯槎東君猶自錯留我美人家右次臨江仙韻宦思與羈情慣見頻更丈夫淚不等閒傾得喪路頭勘破久寵辱誰驚詩社訂新盟𤣥酒大羮鹿聲鳥語共呦嚶只因昨夜思親苦白髮齊生右次浪淘沙韻郡守張白齊入覲僚屬乞詞為贈馬首紅塵暗道路苦多岥逺追鸞鳳儔侣結駟入京圻袖有萬言長疏朝修夕改墨汁尚淋漓仰面青天近欲進翻自疑披雲霧覩日月伏軒墀皇情悅豫賜問及鰥婺四海卧同一榻萬物視同一體堯舜此襟期花外春衫薄歸騎莫遲遲右水調歌頭漳守陳公洪謨有捕冦功膺奬勞之典僚屬乞詞以賀太守胸藏孫武子十萬甲兵盤肺腑汀州鼙鼓正縱橫用權制變談笑取汀紛方如許漳南隨處種禾黍這太平左撑右柱太守用心苦喳喳喜鵲鳴前署報道褒書來憲府蛟龍不作泥塗蟠鳳凰終展雲霄羽化工善陶鑄誰云翻覆無慿據吹寒爐石烹五色看補青天去右歸朝歡騷辭弔趙參軍辭宋廣德參軍趙時踐攝建平縣事元兵入縣時踐率其家屬凡九人死之豫既為立廟復製詞以弔之皇王訖録兮炎祚微攙搶熻歘兮旄頭南飛風塵蔽野兮孤城危大事已去兮臣將安歸淪淵澄徹兮照臣之心舉家徇義兮無愧古今宋社既屋兮孰為討尋令人慨念兮涕下霑襟學宫之旁兮有祠桂樹松陰兮參差青襟濟濟兮瞻拜以時神其有知兮歸來無遲弔陸祠部辭祠部諱奎蘇人與豫同登進士先為南京祠部主事及豫自廣德入為儀部郎中相與甚歡屢以詩倡豫不幸而卒豫與諸同官具祭為辭以弔之朝發軔兮蒼梧夕稅駕兮𤣥圃逢仙人兮與嬉偶忘歸兮舊路溘春光兮已謝花亂落兮如雨思倡和兮不得月華生兮洲渚弔陳方伯辭方伯名煒閩義江人由進士為提學御史轉至方伯將卒告諸孤必欲得豫言以叙述其行諸孤乃以哀辭請豫謂君非不遇者宜無哀焉因别製辭以弔之悵獨立兮思君渺豫懷兮繽紛儼音容兮如昨思之苦兮言不成文天地遼邈兮公今何之遍厯寰宇兮公歸無時東掛弓兮扶桑凌萬頃兮茫茫為觀日兮忘歸豈滄海兮無梁北飲馬兮渤海涉幽都兮屢驚以駭疑道路兮孔囏忽回轅兮中改西攬轡兮流沙問借宿兮誰家尋青牛兮舊路為𣆀老兮停車南弭節兮百粵探蛟龍兮窟穴時海上兮遨遊弄明珠兮夜月公挾元氣兮與居出有入無兮歸于大初梧桐影薄兮鳳凰飢叢薄不深兮麒麟􅎗羈安得歸公兮相與遨嬉重曰驥馬千里兮扼于中道塞草秋黃兮商飈浩浩長劍倚天兮殞于中宵河漢凄凉兮斗牛寂寥我調丹青兮繪公肺腑意長筆短兮頗覺心苦閩海之涯兮閩山之阿招公不來兮涕泗滂沱弔胡叔心辭胡君名居仁安仁人嘗游吳聘君之門篤志力行不求仕進及卒祭以此辭繄聖道之髙妙兮一貫萬以無遺自參賜之既逺兮何唯諾之聲希紛世儒之左見兮猶夜行之未曙偉程朱之正學兮揭太陽於寰宇聞夫君之蚤嵗兮嘗執經于康齊溯遺緒之渺渺兮日窺伺乎聖涯謂力行之有功兮惡虗談之無益飭內外以交修兮庶守尺而得尺肆辨博以誇誕兮匪豫拙之不能無實地以為據兮竟何恃而有成顧天理之粹精兮寓人事之粗淺惟粗淺之既得兮乃粹精之可見究君學之所至兮雖淺深豫有未知考君學之所向兮得正路亦又何疑計積纍之不已兮當日躋乎逺大恨歲月之不延兮欲深造而未艾緑樹兮沉沉寒江兮水深美人兮不來泣下兮沾襟逺賻兮君屋生芻兮一束𡨕漠兮有知鑒我兮衷曲弔聶先生辭先生諱大年臨川人景泰癸酉以錢塘教諭典福建文衡瑛誤蒙鑒賞及官臨汝因祭其墓告以此辭公文章兮錦繡段落人間兮光千丈東應聘兮入閩藩披蕭艾兮搴芳蘭顧下澤兮有荼堇公神異兮衆嘲辴感知遇兮三十年藏豫心兮未敢言紛鼓旗分溯臨汝上髙隴兮悵延竚氣解散兮成春雲亂紛披兮傷豫魂弔伍憲副辭君諱福字天錫號南山臨川人由濟南府學教授超升陜西提學僉事轉副使致仕以卒健鶻兮盤空俯視兮寰中招之兮不下萬里兮剛風綵線兮金針刺繡兮華衾結識兮夫君受知於太宰尹公旻歲晚兮同心忽辭分青氊駐節兮秦川佩服兮璽書陶鑄兮才賢南山兮氣髙九卿兮一毛拂衣兮長嘯林木兮蕭騷七十兮春秋學賦兮逺遊虹霓兮夜吐經旬兮不收弔朱封君辭封君處州人撫倅彪之父豫知撫因為辭以祭之公昔騎兮白馬時往來兮山下呼田父兮以往醉扶歸兮春社公今騎兮白鶴渺盤旋兮冥漠攬王子兮與遊坐吹簫兮碧落潔豫薦兮犧牲雜黍稷兮芳馨羅拜獻兮簫鼓鳴公不來兮傷豫情五言古詩前感興六首斫桐以為琴十年置茅屋錦囊細韜籠龍蛇紋滿腹城市多新聲齊竽復秦筑古調無人彈零落委草木有客學舞劍自謂術通神雷霆薄宇宙雙龍飛繞身我亦有劍術未敢輕告人詘信隨陰陽指顧天地春美人顔如玉自許連城價曉織雙鴛鴦戲水香蒲下夫壻游京洛報結新姻婭中饋但有人賤妾不復嫁提瓶去汲井為君解宿酲不意綆中斷瓶墜不能升君恩手中綆妾身井底瓶相望不相即此心誰能明長風吹白日年華去如駛美人翠袖薄髙閣閉秋雨開園種芳樹歲晏自萋楚相隔一帶水終日不得語秋風撼庭樹落葉亂故枝葉本樹所生葉落樹不知君莫棄黃葉為君糞樹根樹根得所生歲歲緑陰繁後感興六首種蓮大華顛種禾玉山趾不為煙火食咀嚼天地髓天風起寥邈吹我雲中履我履雲中行去世千萬里青天尚有涯滄海尚有底云胡人心微倐忽渺千里人心不在逺秪在腔子裏夜半靈臺虗默默看元始持刀斫月明月明何曾斷縛帚掃樹影樹影依前滿人皆惡樹影礙此月明多樹根茍不拔其如月明何惡聲莫呼谷呼谷聲轉亟惡影莫就日就日影未息弓矢暗中來往往射其的吾身不為的弓矢當自釋戰國荀卿子原自不識性為國張四維其言較純正四維性中物世人或未知反躬自㸃檢不覺生忸怩眼底不可意躑躅問𤣥蒼何時再混沌為我重主張委順生麒麟委和生鳳凰白日行九州不逢豺與狼讀昌黎集文章百世師每說韓昌黎盥手讀遺編開闔無端倪乍觀覺雄偉春市鬬晴雞細觀轉清麗青霄吐虹霓嗟豫蹇劣資文思苦荒迷樊怪匪正途栁奇入旁蹊崇臺百尺髙借韓以為梯分韻送蕭進士璿赴廣東纂修實録南山有丹鳳文彩何翩翩萬里風雲㑹龍馬相周旋先帝棄萬方泣涕窮遐堧神化豈不顯所貴在摩編閩山接嶺海桑梓遙相聨驅車迅行邁不辭路險囏丹青繪日月意象在筆先春秋有微義仰看續前篇送陳白沙歸南海騎馬出都城送君登逺道我有一壺酒為君再傾倒海內重結交卑卑學脂韋心術不相語美譽交相推我知君最深君知我亦至臨别為贈言願君莫豫棄鬱鬱山下松四時不改色盈盈道旁花朝夕供採摘花好聚人看春風亦易寒松高倚霄漢徑節不可扳願學山下松用以養貞德毋學路旁花一採不復得翽翽天邊鳳翺翔周八極紛紛甕底雞旋飛僅盈尺我欲為鳳凰毛羽苦未齊我欲為醯雞甕底不可棲人生各有志豈宜自束縛願言從鳳凰萬里翔寥廓芝蘭有幽性托居在空谷滿天風露寒隔林香撲撲我因愛芝蘭朝夕相往還采采欲盈把薰我衣與冠衣冠在敝篋芝蘭隔林樾但恐歲月賖餘香易消歇東都事矯激西晉尚清虗一時自云適社稷隨丘墟辟彼門户開轉運由其樞大勢皆傾倒力救將何如君子閲世多立說慎其初擇中而守固孔氏有遺書人言羲皇初其道本簡易卦爻二三畫天地露精祕達磨自西來亦頗領此意面壁坐九載未嘗立文字辭繁道理晦辭毁道何寄天地有日月六經未可棄釋子稱入定如蠶自吐縛置心於昭曠用以求真樂孔氏有明訓敬義須夾持動靜兩無礙此心自愈怡入定既云久此心亦能守但恐體用乖真樂竟何有禪學論有無似頗缺箋注有自無中生無非有孰據盆水盛月華有無相撑拄盆傾水墮地月華歸何處論無入空虗論有滯形器有無岐而二斯乃學之蠧聖學論一貫斯最為要義自從參賜逺誰領言下意聖以一貫萬體用無二致學者求之萬其一乃可至執著固云非超悟亦未是功深與力到庶幾有真契與君逺相逢三載共城闕至寶偶不售還山採薇蕨本為同枝鳥乃爾成胡越一夜起相思白盡巾中髮君為萬里人我為萬里月夜夜流清輝為君照巾襪經徐州戲馬臺落日彭城西過此戲馬臺荒垣與敗塹厯厯皆蒿萊憶昔楚王籍仗劍江東來百戰爭中原叱咤聲若雷漢王攬羣策楚王輕羣材淮陰既先亡亞父亦見猜譬如鷹隼飛羽翼先剪裁區區習馬足何以定九垓莫云氣蓋世此氣亦易衰莫云力拔山此力亦易摧漢營星月髙四面楚聲哀起飲泣帳下毋乃徒為哉題學圃古意亭學圃最深處小結茅亭子簿書有餘暇駕言來游此剪茅望崔嵬約萍看清泚萬象俱在目一塵不到耳舞雩息迂響龍門得新址寤寐懷古人默默㑹至理月夜遊古意亭幽興不可過命駕成獨往簷月流素輝山泉滴清響幽蘭蔽蕭艾叢桂在草莾采芳思寄逺路阻情悵惘緩步歸東園坐對明星上成化庚子冬有南京禮部之命回視綰州符十載矣政教無成重自感愧賦此以别州之人士一應近十載獨向山中居橫琴彈古調曲短意有餘徴聲清以厲宫聲寬以紆紛紛漁與樵雜聽滿庭除相視而錯愕識者為躊躇歲晏江天寒霜落林葉墟下堂拜明詔佩此南宫書南宫路不逺此别意何如所恨琴聲希不能感樵漁疊前韻别諸同官千里各有適一官偶同居登舟思共濟幸脫風波餘南宫在何處山川邈以紆戒行在今朝酌酒向前除欲發寧無言為君轉躊躇教化尚蹇澀囹圄未空虛所憂逺且大不但及簿書趙國重九鼎賴有藺相如毋為蚌鷸持以利歸若漁疊前韻别諸文學羣賢依薄宦共向山中居禮義作模範文章特緒餘見我每直遂勸我稍迂紆忠言猶在耳病根未全除春風動行旌相視各躊躇行逺當自邇處實其若虛先師有明訓安敢昧前書君看孔鑄顔顔學亦孔如莊生何荒唐杏壇譏葦漁疊前韻别諸生人間有尊爵天下有廣居斂之在一心此外更無餘紛紛名利徒曲徑自縈紆荆棘日蔽塞嘉穀為剪除坐令失道途白首空躊躇君看鄒孟氏七篇為詳書體驗而擴充天理自燦如毋徒持網罟宦海吾其漁疊前韻自嘲無礙以為性隨緣以為居日食僅數合何必求羡餘郡紱苦不長十年甘自紆戴星履堂署見月下庭除部使每行郡欲見還躊躇感此衷腸熱往往思逃虛幸而免詬辱兩考以最書君看古賢哲進退竟何如今朝過長江羞見滄洲漁殷氏寸草心堂春暉陶宇內萬物皆化生顧兹寸草微感時亦敷榮春暉母恩深寸草兒心短母恩苦未報嵗月忽成晚朝焉采其榮暮焉掇其芳百拜謝春暉天地恩難忘游牛首山三十韻出郭天日晦到山雲霧斂行行過叢薄上上厯重隒牛頭路轉多馬足力已减鍾磬半空聞樓閣經月掩洞古鬼斧鑿嵐濕神汁染松檜交撑拄梅竹相摩颭斷壑接飛棧髙棲傍虛廠陛層户厄塞臺抗山卑貶俯視却以畏仰登進以漸入室灑掃燦登堂像設儼臂罏行清氛心燈炯寒焰破席坐蒲團弊案拂藤簟山蔬薦薇蕨水果摘菱芡襌談轉虛曠詩話涉幽險天機驚斡旋俗病謝針砭酒酣興益發樂極心尚歉深入兜率巖危倚浮屠檻長江怒龍奔亂岡渴虎舚卓錫崖泉迸飲馬池波㶑唐經翻貝葉漢封遺玉檢履跡傍石尋鼎識索圖辨珍怪森前列造化寧豫儉嘉願久未酬兹游良不忝狂呼擬登華清賞訝入剡逺遊神汗漫微誦口喁噞鬬奇誰及韓得趣吾與㸃凉飈撼東閣夕暉落西崦樹杪殘聲嘒塔角歸翼閃理鞍問前路穿林越荒塹回憶山中人幽夢生夜魘題孫生哭母卷孫生攜尺牘踵門求豫詩衷腸未及訴涕泣先交頥世人皆有母繄我獨無之母年四十九棄我竟如遺西風吹北堂摵摵動簾帷顔容不復覩抱此終天悲我聞孫君言撫卷神若癡情長辭苦短墨汁空淋漓願告世之人養母宜及時毋令生怨悔痛苦將告誰題吳下趙氏望雲樓家住砂山南親葬砂山北砂山多白雲侊佛見顔色雲去有時歸親去不復得落日倚南樓血淚滿胸臆留别吳左府宣憶昔坐肺石有書千象魏豈為戀此官欲以明厥志交珠既已辨趙壁不復碎驅車還故里心跡兩無愧論交三十年偶此復相㑹登堂把酒巵未飲心先醉黎明當逺别與君坐不寐張燈寫餘瀝一一見肝肺韋布未為賤軒冕未為貴相期學古人道德養精粹視茭陂撫南有茭陂唐刺史周法猛所建歲久傾廢崇仁縣耆老孫孟獻言狀豫為興復周官叙溝洫漢史志河渠民命茍所關故典曽備書鬱鬱巴羅山匯流向東趨揵木閼回瀾灌此桑麻區開建嵗已久版鍤日以疏坐令千金資白日棄道隅嗟豫理敝郡萬事費爬梳雖云簿書繁安敢輕犂鋤父老孫孟獻切切以告豫有志事興復為力苦不紓春初農務興薄言駕吾車風雨入前村道路何崎嶇上山履巉巗下水涉沮洳夤緣尋故址飄動無嬴餘逸道以使民諒民無怨吁萬鍤當雲集黍稷歌與與赴鎮逺郡守丁鳳儀以詩見贈次韻奉酬岐路眩南北素絲變黃緑本為櫟杜朽誤佩漢庭竹白日漏層雲餘輝散林麓黽勉懷知遇駕言騁行目貴陽在何處山髙路綿矗風俗雜夷夏蠻獠混生熟公家有程約往往視刻木君子行道心不是為竊祿世路有險夷君子何惡欲莊生齊物篇每以物觀物泰山非有餘芒芥非不足所恨材智淺無以供臣僕周車畏輸載羲鼎戒覆餗賴有同心人教我閩海曲夜讀聞母車聲時母在官年七十二西齊讀初罷北堂車猶鳴雖憐母力健翻使兒心驚天髙風露寒廣庭寂無聲長跪告北斗願母長康寧暮春與諸文學掾觴于萬桂山隂萬桂山之陰小渠兩三曲雨餘渠上行瀰瀰春水緑邂逅同心人散坐傍修竹殽核肆羅列羽觴相馳逐人生無百年胡為長局促放浪出形骸泰然常自足停杯問古人誰榮與誰辱永言謝世情曠焉抱幽獨城南别墅幽人有逺韻卜築城南村青山羅庭除踈柳蔭柴門虛堂寂無人但聞鳥雀喧秋晴穫禾黍日夕收雞豚農家無外縈嵗事在壺飱感此生理蕃其樂難具言我方走塵土未能問田園誰知隔城闉咫尺有桃源送太守黃君珵之汀州騎馬出都門望望長江曲江水清以駛江草萋以緑黃君有逺行離色宛可掬路入秦時郡符剖漢廷竹我起酌君酒薦以古規祝築室首基址為政首風俗風俗茍不佳政美何足録君登江上舟我騁江上目江空不見人只見雲相逐題四皓圖秦氛暗六合脫屣入商顔山中無招呼斜日照棋盤昨夜望前星踈雨襲輕寒留侯有心計戚姬涕汍瀾事定計當返名爵豈能攀史家多闊略公跡是非間遂令詩家子過廟譏潺湲館人作清湖景以招客豫反其意而為之題湖水深不測下有蛟龍遊行客不知險千里問行舟北望名利場天際雲霧浮朱門曳方履紫陌馳華輈名利豈不嘉直道難與謀願言謝行役濯足湖上頭讀書看青山允矣追前修題羅內翰家世旌孝坊茌平有賢簿讀書不下堂母病在牀褥為計正蒼皇參苓無近效堂局少奇方百拜謝天地請以身自當股肉落金刀七筯生殊香百靈感孝誠母病轉平康想彼刲股時豈不戒毁傷但得母病愈兒身甘自戕至今旌孝坊赫赫官道旁日夕往來人一見一倣徨鏡潭詞雲影落空潭燈光入虛鏡鏡潭本虛净雲燈生幻證燈滅鏡還虛雲散潭復净外感雖頻仍不以汨貞性方貢士璐挽詩城東桃李花見者皆停鞍誰念東風惡吹折青琅玕琅玕豈不佳不能成好顔寫哀寄絲桐付與雍門彈觀化詞時豫在鎮逺偶得病因賦此以自驅遣前此固無我後此亦無我泡影六十年亦頗牢籠我我魄歸諸地我魂歸諸天泡影從此滅無後亦無前祁石阡嘲豫著敝裘依韻解嘲新裘到篋稀敝裘藏篋久視舊如視新心自忘可否讀書慕前哲晏生是吾友一裘三十年見重魯東叟七言古詩竹雪齊為戴提學賦小齊種竹只十箇雪壓竹梢寒欲墮蒲簾髙捲層雲破一鈎新月入當座老夫肝腸鐵石做一生甘作衡門卧東鄰獻捷西鄰挫滿城簫鼓紛來賀老夫騎驢雪中過鸕鷀灘失纜灘在桐廬縣豫赴撫州經此鸕鷀灘頭浪花白百丈拏舟上不得中流一斷去如飛骨肉相看俱失色舟師借問是何人開頭轉舵如有神大呼一聲上灘去烟樹微茫收近津昨日舟中讀羣史宋元末路正如此得人失人勢轉殊天北天南恨未已我今全家出顛危痛定思痛翻成悲便欲作書獻天子雲深山髙白日遲臨汝書院成潘水部贈獨腳歌次韻奉答大冶鑠物摶陰陽青春去我何堂堂西偏小搆亦頗良不施黝堊橫白杗捲簾正對五羊岡樹木拂簷交青蒼祥煙紫氣相廽翔坐令白日迷晶光文采弸彪來省郎為我藝苑芟穢荒鏗然制作稱大方利觜長距獨擅場嗟豫苦學未成章㸃綴犧樽青與黃六經窟穴潄餘香拍拍春意覺滿腔與君對織雲錦裳著向風前聊徜徉欲驂麟鳳游帝鄉又笑目眩心未忘小吏抱牘來倉皇謂耽文字頗有妨廣陸無車川無梁出門萬里道路長使君局面宜更張送友人朱𢎞裕歸潼川君入諫垣初諫垣井初甃自烹五色石細補青天漏天門北望何渺茫有獸毛色金絲黃雙目夾鏡齒如鋸嚙人顱骨食人腸小臣愛國不愛死飛章直入天門裏蠅頭細字三千餘重為邦家說倫紀扶桑日出天雞鳴玉皇穩卧猶未醒左右傳言卿大戅幹母之蠱不可貞西南有州大如斗煩卿暫去作慈母腹中春意萬斛深遍厯郊坰活枯朽謫居下土今六年西風翩爾來朝天天門深迥如昨日扁舟依舊歸西川丈夫懷抱無好惡但得志行心自樂此身亦是水上漚祿食何須計厚薄君不見黃仲昭翰林詩思翻天瓢秪為身居密勿地不為天子賦元宵又不見林貴實橫班獨立稱直筆披肝苦為綱常謀神鬼聞之皆欲泣吾邦文物古來多清風徑節今相摩我因送君發豪氣銅壺擊破為我歌僕夫謡邵武僕夫性質野短衫秃袖身半赭丈二長輿在肩膊山路長驅疾如馬每遇髙坡即大呼一呼一上誰復顧眼中惟見是夷行腳底何曾有險步光澤西去八十里清溪亂嚙故山趾平明受直往西行薄暮懷直見妻子每日只受四十錢受直不多心歡然更有髙堂受直者錦衣緩帶白日眠辰州坡嘆馬郎坡牛郎坡山髙路險將如何前山望雲雲片濶後山聽雨雨聲發僕夫盡日赤雙腳盡力踏泥泥轉滑君不見蜀道難千山萬水髙巑岏我今入蜀向西去此是東頭第一關憫蠻方鋪司蠻方鋪司老無齒接官手持一􅏛子上衣短小才至脛頭巾破裂直掩耳不辭官府遞文書只怕奸豪索錢米我時驅車過南鄙鋪司長跪呼不起忽聞班軍在後來倉皇走入叢篁裏入播州作播州舊說非人居而今南北成通衢一鄉一聚置官長半丘半隴皆犂鋤播州官司萬山裏疊翠浮青蹴天起烟雨晦冥猿鳥呼崖壑窈深花木美昔日何人披草萊爾文爾價皆豪才南據烏江扼喉領北營白錦屯風雷自歸聖朝不用武比屋絃歌學鄒魯千里不聞鼙鼓聲民物熙熙皆按堵我時逺佩藩侯書乘髙涉險登畏途山川形勝皆在目不勞重寫王㑹圖題何氏雙挽詩君家先世多潛德白髮重重照秋色荀翁曾坐膝上孫陶母每飯堂前客驅車昨過通德門朔風吹雨白日昏屈宋九原不可作慿誰書些招雙魂題毛水部科所藏萬竿烟雨圖城南城北皆塵壤馬蹄何處踏蒼莾歸來獨坐草堂深詩思飛落湘江上湘江春水緑沉沉蘆洲荻渚鳴春禽上有平坡亘千里何人種竹皆成林白日倐忽起雷電咫尺江山看不見一時蘆葦盡銷沉老竹獨與風雷戰風雷震蕩雲冥冥化作蛟龍天外行人間無處尋踪跡徑風凜凜長江橫東風日出曉來霽上下分明見天地長身玉立好兒孫滿眼蒼雲浩無際聖朝天子開明堂大化四浹和風翔奇才一入伶倫手坐見制作追咸章而今海宇干戈息佳種煩君更培植萬丈清風掃俗塵紛紛桃李無顔色題陸都閫平瀘冦詩西來偶識陸將軍屹如鐵柱排塵紛弧矢隨身射牛斗鳥蛇結陳聨風雲瀘川小冦紛如蟻竊弄主兵潢池裏商賈廢市農廢耕逺近皇皇驚未巳廟堂旦夕勞經營欲以不戰屈人兵一時頗牧默不語將軍厯階言姓名鳥飛有翮蛇有尾瀘川小冦易與爾我有尺組茹蘆紅請縛渠魁獻階戺瀘川十月飛秋霜旌旗掩映生寒光多方設疑不速取一鼓成擒功自張我聞用兵先用計奇正迭出無常勢魁渠既縛羣雄解危陂坐使成平地平明獻醜入學宫春風滿面聞鼓鍾飲至禮成客盡醉次第賦詩談奇功蜀民易動今猶昔鼠輩跳梁無虛日將軍袖手亦闕年請賈餘勇續前績懷母歌送祁使君憂制東還君母去年七十六齒牙未動鬢猶緑我母今年七十九齒牙已落面浮垢昨傳嶺表饒風霜北堂萱草先萎黃君得家書哭欲死天地遼邈魂飛揚我昨有書來故里書中親致慈母語謂我年來稍健康棄官就養兒姑止聞君往日曾求歸當道滿眼知心稀病書纍上格不舉六年啼遍斑斕衣我今為母堅陳請疏入臺司瓶墜井此生心事何由伸中夜嗚咽如吞鯁君今為母東還鄉素冠素鞸復素裳慈母音容不復見徒勞百拜啼空堂我因送君轉悲切愁腸百解還百結母心不識兒心悲猶把甘言相解說孝心自古無貧難茅簷菽水皆成歡行當閉門卧不起毋令後悔生愁嘆讀陳忠肅公傳次柯竹岩韻行都開閫頭尚黑壯懷直欲吞迤北厲兵秣馬不成寐夜夜起待東天白九廟英靈凜如生忍使宗社一齊傾滄海可填山可徙誰謂志專功無成昨日閭閻謾驚擾徑氣不逐腥風倒白日隱隱東方升夕暉看作晨暉皎雞盤歃血盟未寒賣降之子舌先彈母係尼菴兒械道盤中有飯吾誰餐救焚不管頭額爛叔氏起兵謀復漢叛賊已誅敵未殱視死如歸心不亂陳忠肅公殉宋而死元世祖義之命葬于西湖智果寺北滿山皆生刺竹多有咏其事者豫亦賦之智果寺旁忠肅墓滿山刺竹生無數磨風礪雨堅相持猶帶戰酣舊時怒嶽墳見說遙相依墳上有樹皆南枝感應隨人如影響誰謂草木俱無知宋憤未消元運改大明奉天君四海此竹開花復結實勾引鳳凰棲五彩題陳憲副祥湖山一覽詩後陳君讀書號博識鞭笞諸子嚼羣籍殘銅敗鐵投洪罏瞬息化作黃金汁番陽春深湖水渾憶昔聖祖西來巡龍爭虎鬬白日瞑我師一鼓彼師奔四郊陰翳轉開霽上清下曠見天地日月雙輝開大明赫赫皇圖傳萬世陳君曾上廬山巔俯視湖水懷當年聖祖神遊去已逺攀龍為賦烏號篇平生崛奇降不下山名水字費模寫鋪張聖德與神功欲繼商書與周雅詞壇自古多旁蹊毛頴有傳聞昌黎此詩請刻廬山石聖祖勳業天地齊題竹鶴山人畫竹鶴山人有奇癖詩家聲趣畫家跡神營意造入微茫妙處想人應未識此圖是寫𤣥冬圖溪山寂莫雲模糊玉皇宴罷羣仙舞腳底踏翻白玉壺壺中瓊漿化為水柳絮梨花黏不起地面平鋪三尺深何處去尋東郭履林臯髙士布衣單十日不出柴門關蒙頭髙卧僵欲死不肯投刺向人間炮鮮飲醇世情鄙一談清操輒不喜竹鶴山人非畫師獨於象外得其理赤龍歌赤龍攪海海水渾巨鱗細鱗亂紛紛大風播蕩幾寒暑餘腥猶自滿江濆上帝聞之發震怒不使淫威遍下土飛符直取赤龍歸投彼遐荒畀豺虎春雲布滿東南隅疏疏密密雨聲徐桑麻蔽野雞犬靜遙聞擊壤歌唐虞萬竿烟雨圖為廣德葛清修賦葛生家世居桐川開園種竹臨平田時時酒後發豪興凉風疏月落詩篇今年見我容臺署手執紈素三尺許上有瀟湘竹萬竿一半糢糊帶烟雨初疑南國荆山寒卞和入楚猶未還至寶一時收不盡遺此滿地青琅玕又疑西土瑶臺夕秦女吹簫還似昔鳳凰不肯傍人飛參差亂展雲間翼畫竹何如種竹真與可去後誰傳神偶披圖畫識髙賞颯颯寒氣生衣巾皇都六月日如灼金鐵欲流石欲鑠願言與子歸桐川同向竹林置雙腳畫鯉歌為吳都事賦氷解水柔三月節萬頃桃花泛紅雪東風不動晝冥冥雷雨交飛電蛇掣中有文鯉作龍姿金鱗六六含光輝十載沙泥困頭角此時直向龍門飛龍門西望如削壁浪珠濺沫苔花濕天池更在龍門顛萬仞一躍才咫尺昔年湖海匹凡鱗而今化作真龍身上天下地倒洪澍萬物枯槁皆回春吳君此畫千金價畫筆雖真亦是假君家雙璧照清波乃是天池化龍者桃源篇桃源在今桃源縣西南陬其山周遭四圍中有平原廣土可居山之麓有水繞之疑即漁郎泊舟處也想當時林木深阻雖土人鮮有至者故避秦君子相與拔邑居之自後生齒漸繁土地漸闢遂與外境合而為一今傍山有桃源宫道流數輩棲息其中嘗告豫山後有爛柯洲山前有秦人洞今洞閉不開皆非事實因賦此以告好事諸君子秦人法網密如織楚人逃生苦未得一朝拔邑入南山咫尺就與塵寰隔山中風俗何恬然竹籬茆舍臨平田男婚女嫁相代謝歲月無紀誰知年昨日漁郎忽到此杯酒殷勤問鄉里漢龍晉馬相繼興始知世代非秦紀由來靜躁跡不同山人怕與俗人通送得漁郎出山口歸來相與滅其蹤武陵太守好事者謂人可仙官可捨分付漁郎重問津溪山宛在眉睫下初來夾岸皆桃花再來赤壁橫蒼霞千峰萬壑不可辨欲從何處尋人家我聞海鷗識人意機心一動鷗不至山人心事閒於鷗孰謂髙風可強致使君莫厭城市喧澆醨朴醇各有根機心不動爭心息武陵處處皆桃源題黃九霄雜色畫菊陶翁昔年懷隱德手種黃花只一色南山杯酒義熙年北窗枕簟羲皇宅九霄原是儒家子作畫多年胡昧此丹青入手勞心思不極妖艷心不止我聞菊品三十六此畫模寫猶未足世情每自逐時好隱德誰能識幽獨願君筆端改常度剝落繁華反貞素萬里風霜搖落餘一枝秋色長如故題徽州殷氏所藏息齊畫竹平生無計醫凡俗每思開軒學種竹息齊此畫自何來坐覺寒陰滿書屋斷根入地吳蠶僵密葉排雲威鳳翔灑灑清風照長渭濛濛翠霧浮清湘人世韶音久不作有材如此轉零落龍笙鳳管歸何處變作秋聲撼崖壑紫陽山髙白日寒幽人自倚踈簾看秪恐六丁下收拾夜半失却青琅玕髙克明左遷鎮逺府判自號鐵溪主人及內移為賦此鐵溪山水清如許借問何人為作主信陽逐客何處來一棹徘徊秋色裏枕流欲以洗吾耳潄石欲以礪吾齒山深路逺人跡稀此副肝腸向誰理昨夜巖頭西風起匹馬送君乂千里他時何處問浮踪短句長篇鐵山底豫歸自貴藩與何二守健之祁使君致和同游鐵溪入溪既深見路左三山鼎立如畫祁君有作豫和韻同騎瘦馬涉清流濃光潑緑驚詩眸一山却立如寡侔二山前出成朋儔東溟紫雲籠蓬丘南海白日迷羅浮天造地設知幾秋奇勝似為吾人留詩逢勍敵勞冥搜居然智伯忘仇猶飲何二守宅有走索者祁使君作舞絙行依韻奉答長絙橫空誰敢向瞥然見爾騰身上風霜不動鴻鴈飛樹木無聲猿猱往笑隨簫鼓行來前且前且却坐復眠脫胎未换人間骨獻技自比雲中仙東管先生最能賦前褒後戒多警語世情習巧方成癖針石砭人良可取我因停杯呼羣兒人生須悟生殺機萬事只宜平實做平實應無顛撲時豫往平冒相度郡基祁君用前韻簡豫豫仍依韻奉答西漢讀書稱劉向南海讀書君為上楚聲吳語日咿嚶水色山光常獨往東風吹過小樓前楊栁低低起復眠烏帽籠頭看春去瀛洲倣佛疑登仙馬上長歌與短賦篇篇不肯蹈陳語誰言孔聖刪後詩漢唐而下無足取造化小兒真小兒翻來覆去無停機鸞鳳在棘龍在野古來賢哲誰逢時羊腸河弔古羊腸河去清平一舍許正統末西南夷為亂詔征南將軍張軏自南詔移兵討之夷設伏官軍大敗士馬兵仗填委于河至今每陰雨作過者猶隱隱聞炮聲停車走上羊腸坡千山萬山髙峩峩下有長江深不測江水瀰瀰生寒波憶昔王師靖南鄙眼底牛羊欲平噬誰知蜋蟻亦善鬬龍象有力翻為躓至今風雨江上來炮聲隱隱猶鳴雷三軍精魄想未散欲為厲鬼擒其魁古人行師有紀律千里赴敵無敗沒未聞出城一舍許坐使全軍暴骸骨我來感此淚橫流長歌激烈歌不休頗恨當年謀國者不知常武修王猶香爐山懷古和祁使君韻山在清平興隆二衛界中景泰初諸夷為亂據此以拒王師時監軍都御史王來用羣議作襄陽炮以攻遂破之曉出清平門悵望西南天一日二日行不盡千山萬山遙相連香爐一山在雲表巍然獨立無與先上有萬人可居之平地及有四時可飲不竭之清泉欲進須魚貫欲上宜猱緣憶昔蠢苗拒王命白日山壑藏刀鋋嬉戲殺人欲盈野倐忽流血皆成川一朝勢敗不敢出呼羣挈黨據其巔王師攻之久不下居民廢業農廢田有美監軍儒中彥謂此醜虜惡未悛軍門智勇紛如林豈無奇計摧其堅有士設機木如持衡與權扄鐍一以發氣力萬鈞全半空雲霧掣雷電巨石細石聲紛填樹木髙低成虀粉房屋逺近皆傾偏羣苗首鼠走不暇乞哀緩攻施矜憐先縳首惡詣帳下次驅脅從投軍前萬口歡聲百里震四山協氣一時旋古人有茂伐往往勞題鐫馬援標銅柱竇憲勒燕然嵗月無情似流水勳業失記如飄煙東管先生偶有賦我因步韻次其篇非為誇多與鬬靡欲記天子平蠻年題孫氏畫梅孫姬可是梅花精梅花寫出渾天成香魂不逐水雲起老幹絶似氷霜清草堂夜深净如洗月色朦朧照凄楚嚌嘈鳥語酒初醒嗚咽角聲天未曙閨門作畫世應稀何不改學周南詩關雎麟趾亦圖畫畫出周家王化基李長者入祀典歌仙溪詰曲如回腸東流赴海何茫茫慿誰截斷天地紀灌我萬頃桑麻場錢氏四娘長樂女黃金如斗提不起將軍巖下自經營陂潰直隨此陂死偉哉同縣林制科緡錢十萬腰下䭾溫泉隘口重纍趾倐忽顧盼成滄波熙寧天子重農事下詔募人急營治當時闔郡多富家坐視詔書無一至候官長者真仁賢輕財好施閩人傳有僧蹤跡頗詭祕日日貰酒不還錢木蘭山前溪面濶僧為插竹記顛末溪流緩處可立基緩處立基基不拔入海伐石海為空上山伐石山為童三十二門細分布無雲無雨卧長虹昔日溪流皆赴海今日溪流得灌溉雞鳴犬吠萬家村隱隱桑麻相映帶我謂有莆須有陂有莆無陂莆亦隳惟莆與陂相終始莆人思公何盡期昨日恩詔下閭里春秋二祭入新議借問建言者伊誰太平郡守周氏子翠渠摘稿卷六
